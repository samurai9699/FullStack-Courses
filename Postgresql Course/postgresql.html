quiz:[{q:'Why use JSONB for plan features?',opts:['Faster than columns','Flexible varying config per plan','Prevents injection','Auto-validates'],correct:1,explain:'JSONB allows each plan to have different feature configs without schema changes.'}]}
]},

{id:'prisma',title:'Prisma ORM',icon:'◆',lessons:[
{id:'pr1',title:'Getting Started with Prisma',sub:'Installation, schema, and first migration',
content:`<h2>What is Prisma?</h2>
<p><strong>Prisma</strong> is a modern ORM for Node.js/TypeScript. It lets you interact with your database using a type-safe API instead of raw SQL.</p>
<div class="cb"><div class="cb-h"><span class="cb-l">Bash</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code>npm install prisma @prisma/client
npx prisma init
<span class="cmt"># Creates prisma/schema.prisma</span></code></pre></div>
<div class="cb"><div class="cb-h"><span class="cb-l">Prisma</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">// prisma/schema.prisma</span>
<span class="kw">generator</span> client {
  provider = <span class="str">"prisma-client-js"</span>
}
<span class="kw">datasource</span> db {
  provider = <span class="str">"postgresql"</span>
  url      = <span class="fn">env</span>(<span class="str">"DATABASE_URL"</span>)
}
<span class="kw">model</span> <span class="type">User</span> {
  id        <span class="type">Int</span>      <span class="attr">@id</span> <span class="attr">@default</span>(<span class="fn">autoincrement</span>())
  email     <span class="type">String</span>   <span class="attr">@unique</span>
  name      <span class="type">String</span>?
  createdAt <span class="type">DateTime</span> <span class="attr">@default</span>(<span class="fn">now</span>())
  orders    <span class="type">Order</span>[]
}
<span class="kw">model</span> <span class="type">Order</span> {
  id        <span class="type">Int</span>      <span class="attr">@id</span> <span class="attr">@default</span>(<span class="fn">autoincrement</span>())
  total     <span class="type">Decimal</span>
  user      <span class="type">User</span>    <span class="attr">@relation</span>(fields: [userId], references: [id])
  userId    <span class="type">Int</span>
  createdAt <span class="type">DateTime</span> <span class="attr">@default</span>(<span class="fn">now</span>())
}</code></pre></div>
<div class="cb"><div class="cb-h"><span class="cb-l">Bash</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code>npx prisma migrate dev --name init  <span class="cmt"># SQL + apply + generate</span>
npx prisma generate                 <span class="cmt"># Generate client</span>
npx prisma studio                   <span class="cmt"># Visual DB browser</span></code></pre></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Prisma schema defines your model. Migrations sync it to the database. The generated client gives you fully type-safe database access.</p></div>`,
quiz:[{q:'What file defines your data model in Prisma?',opts:['package.json','prisma/schema.prisma','src/models.ts','database.sql'],correct:1,explain:'prisma/schema.prisma is the single source of truth for your data model.'}]},

{id:'pr2',title:'Models & Relations',sub:'Defining types, relationships, and attributes',
content:`<h2>Relations in Prisma</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">Prisma</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">// One-to-Many: User has many Posts</span>
<span class="kw">model</span> <span class="type">User</span> {
  id    <span class="type">Int</span>   <span class="attr">@id</span> <span class="attr">@default</span>(<span class="fn">autoincrement</span>())
  posts <span class="type">Post</span>[]
}
<span class="kw">model</span> <span class="type">Post</span> {
  id       <span class="type">Int</span>  <span class="attr">@id</span> <span class="attr">@default</span>(<span class="fn">autoincrement</span>())
  author   <span class="type">User</span> <span class="attr">@relation</span>(fields: [authorId], references: [id])
  authorId <span class="type">Int</span>
}

<span class="cmt">// Many-to-Many (implicit — Prisma creates junction table!)</span>
<span class="kw">model</span> <span class="type">Post</span> { tags <span class="type">Tag</span>[] }
<span class="kw">model</span> <span class="type">Tag</span>  { posts <span class="type">Post</span>[] }

<span class="cmt">// One-to-One</span>
<span class="kw">model</span> <span class="type">User</span>    { profile <span class="type">Profile</span>? }
<span class="kw">model</span> <span class="type">Profile</span> {
  user   <span class="type">User</span> <span class="attr">@relation</span>(fields: [userId], references: [id])
  userId <span class="type">Int</span>  <span class="attr">@unique</span>  <span class="cmt">// unique = one-to-one</span>
}</code></pre></div>
<h3>Key Attributes</h3>
<div class="tw"><table>
<tr><th>Attribute</th><th>Purpose</th></tr>
<tr><td><code>@id</code></td><td>Primary key</td></tr>
<tr><td><code>@unique</code></td><td>Unique constraint</td></tr>
<tr><td><code>@default(value)</code></td><td>Default value</td></tr>
<tr><td><code>@relation(...)</code></td><td>Define relationship</td></tr>
<tr><td><code>@@index([field])</code></td><td>Database index</td></tr>
</table></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Implicit M:N creates junction tables automatically. @unique on FK = one-to-one. @relation defines all relationships.</p></div>`,
quiz:[{q:'How does Prisma handle many-to-many?',opts:['Manual junction table','Array fields on both models — auto junction','@manyToMany attribute','Separate migration'],correct:1,explain:'Prisma creates the junction table automatically with implicit many-to-many.'}]},

{id:'pr3',title:'Migrations',sub:'Evolving your schema over time',
content:`<h2>Migration Workflow</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">Bash</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt"># 1. Edit schema.prisma</span>
<span class="cmt"># 2. Create migration</span>
npx prisma migrate dev --name add_avatar_url
<span class="cmt"># Generates SQL, applies it, regenerates client</span>

<span class="cmt"># 3. Production (never migrate dev in prod!)</span>
npx prisma migrate deploy</code></pre></div>
<div class="callout callout-warn"><div class="callout-title">⚠️ Production</div>
<p><code>migrate dev</code> is for development only (can reset DB). <code>migrate deploy</code> safely applies pending migrations in production.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p><code>migrate dev</code> for dev, <code>migrate deploy</code> for prod. Migrations are version-controlled SQL files committed to git.</p></div>`,
quiz:[{q:'Which command applies migrations in production?',opts:['migrate dev','migrate deploy','db push','generate'],correct:1,explain:'migrate deploy safely applies pending migrations without resetting.'}]},

{id:'pr4',title:'CRUD Operations',sub:'Reading and writing data with Prisma Client',
content:`<h2>Prisma Client CRUD</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">TypeScript</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">import</span> { PrismaClient } <span class="kw">from</span> <span class="str">'@prisma/client'</span>;
<span class="kw">const</span> prisma = <span class="kw">new</span> <span class="fn">PrismaClient</span>();

<span class="cmt">// CREATE</span>
<span class="kw">const</span> user = <span class="kw">await</span> prisma.user.<span class="fn">create</span>({
  data: { email: <span class="str">'alice@example.com'</span>, name: <span class="str">'Alice'</span> },
});

<span class="cmt">// READ: findUnique (by unique field)</span>
<span class="kw">const</span> user = <span class="kw">await</span> prisma.user.<span class="fn">findUnique</span>({
  where: { email: <span class="str">'alice@example.com'</span> },
});

<span class="cmt">// READ: findMany with filters</span>
<span class="kw">const</span> users = <span class="kw">await</span> prisma.user.<span class="fn">findMany</span>({
  where: { name: { contains: <span class="str">'ali'</span>, mode: <span class="str">'insensitive'</span> } },
  orderBy: { createdAt: <span class="str">'desc'</span> },
  take: <span class="num">10</span>, skip: <span class="num">0</span>,
});

<span class="cmt">// UPDATE</span>
<span class="kw">await</span> prisma.user.<span class="fn">update</span>({
  where: { id: <span class="num">1</span> },
  data: { name: <span class="str">'Alice Smith'</span> },
});

<span class="cmt">// UPSERT (update or create)</span>
<span class="kw">await</span> prisma.user.<span class="fn">upsert</span>({
  where: { email: <span class="str">'alice@example.com'</span> },
  update: { name: <span class="str">'Updated'</span> },
  create: { email: <span class="str">'alice@example.com'</span>, name: <span class="str">'New'</span> },
});

<span class="cmt">// DELETE</span>
<span class="kw">await</span> prisma.user.<span class="fn">delete</span>({ where: { id: <span class="num">1</span> } });

<span class="cmt">// COUNT</span>
<span class="kw">const</span> count = <span class="kw">await</span> prisma.user.<span class="fn">count</span>();</code></pre></div>
<div class="callout callout-info"><div class="callout-title">💡 Type Safety in Action</div>
<p>Try typing <code>prisma.user.findMany({ where: { fakeField: true } })</code> — your IDE immediately shows an error. Prisma catches bugs before runtime.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>create, findUnique, findMany, update, upsert, delete, count — the core operations. All fully type-safe.</p></div>`,
quiz:[{q:'Which method finds a record by unique field?',opts:['findFirst','findUnique','findMany','findSingle'],correct:1,explain:'findUnique uses a unique field like id or email.'}]},

{id:'pr5',title:'Includes & Selects',sub:'Loading related data efficiently',
content:`<h2>Loading Relations</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">TypeScript</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">// Include related data</span>
<span class="kw">const</span> user = <span class="kw">await</span> prisma.user.<span class="fn">findUnique</span>({
  where: { id: <span class="num">1</span> },
  include: {
    orders: { where: { status: <span class="str">'paid'</span> }, take: <span class="num">5</span> },
    profile: <span class="kw">true</span>,
  },
});

<span class="cmt">// Select specific fields + count</span>
<span class="kw">const</span> users = <span class="kw">await</span> prisma.user.<span class="fn">findMany</span>({
  select: {
    id: <span class="kw">true</span>, name: <span class="kw">true</span>,
    _count: { select: { orders: <span class="kw">true</span> } },
  },
});

<span class="cmt">// Nested write</span>
<span class="kw">const</span> user = <span class="kw">await</span> prisma.user.<span class="fn">create</span>({
  data: {
    email: <span class="str">'new@x.com'</span>, name: <span class="str">'New'</span>,
    orders: { create: { total: <span class="num">49.99</span> } },
  },
  include: { orders: <span class="kw">true</span> },
});</code></pre></div>
<div class="callout callout-warn"><div class="callout-title">⚠️ include vs select</div>
<p><code>include</code> returns all scalar fields + relations. <code>select</code> returns only specified fields. Use select for lean API responses.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>include loads relations. select picks fields. _count gets counts. Nested writes create related records atomically.</p></div>`,
quiz:[{q:'What is the difference between include and select?',opts:['Same thing','include adds relations; select returns only chosen fields','include for reads, select for writes','include only works with findMany'],correct:1,explain:'include returns all fields plus relations. select returns only the fields you specify.'}]},

{id:'pr6',title:'Transactions & Raw SQL',sub:'Atomic operations and complex queries',
content:`<h2>Transactions</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">TypeScript</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">// Interactive transaction</span>
<span class="kw">const</span> result = <span class="kw">await</span> prisma.<span class="fn">\$transaction</span>(<span class="kw">async</span> (tx) => {
  <span class="kw">const</span> sender = <span class="kw">await</span> tx.account.<span class="fn">update</span>({
    where: { id: <span class="num">1</span> },
    data: { balance: { decrement: <span class="num">100</span> } },
  });
  <span class="kw">if</span> (sender.balance < <span class="num">0</span>)
    <span class="kw">throw new</span> <span class="fn">Error</span>(<span class="str">'Insufficient funds'</span>);
  <span class="kw">return</span> tx.account.<span class="fn">update</span>({
    where: { id: <span class="num">2</span> },
    data: { balance: { increment: <span class="num">100</span> } },
  });
});</code></pre></div>
<h2>Raw SQL</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">TypeScript</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">// Parameterized (auto prevents SQL injection!)</span>
<span class="kw">const</span> userId = <span class="num">1</span>;
<span class="kw">const</span> results = <span class="kw">await</span> prisma.<span class="fn">\$queryRaw</span><span class="str">\`
  SELECT u.name, COUNT(o.id) as orders
  FROM "User" u
  JOIN "Order" o ON u.id = o."userId"
  WHERE u.id = \${userId}
  GROUP BY u.name
\`</span>;</code></pre></div>
<div class="callout callout-danger"><div class="callout-title">🚫 Always Use Tagged Templates</div>
<p>Prisma's tagged template literals auto-parameterize values. Never concatenate user input into raw SQL.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>\$transaction wraps operations atomically. \$queryRaw handles complex SQL. Always use tagged templates for parameterization.</p></div>`,
quiz:[{q:'How to prevent SQL injection in Prisma raw queries?',opts:['String concatenation','Tagged template literals ($queryRaw`...`)','Escape quotes manually','Prisma always prevents it'],correct:1,explain:'Tagged template literals automatically parameterize interpolated values.'}]},

{id:'pr7',title:'Performance & N+1',sub:'The most common pitfall and how to fix it',
content:`<h2>The N+1 Problem</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">TypeScript</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">// ❌ BAD: N+1 (1 + N queries!)</span>
<span class="kw">const</span> users = <span class="kw">await</span> prisma.user.<span class="fn">findMany</span>();
<span class="kw">for</span> (<span class="kw">const</span> user <span class="kw">of</span> users) {
  user.orders = <span class="kw">await</span> prisma.order.<span class="fn">findMany</span>({
    where: { userId: user.id },  <span class="cmt">// 1 query per user!</span>
  });
}

<span class="cmt">// ✅ GOOD: single query with include</span>
<span class="kw">const</span> users = <span class="kw">await</span> prisma.user.<span class="fn">findMany</span>({
  include: { orders: <span class="kw">true</span> },  <span class="cmt">// 1 query total</span>
});</code></pre></div>
<h3>Pagination</h3>
<div class="cb"><div class="cb-h"><span class="cb-l">TypeScript</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">// Cursor-based (fast for any page, even page 1000)</span>
<span class="kw">const</span> users = <span class="kw">await</span> prisma.user.<span class="fn">findMany</span>({
  take: <span class="num">20</span>,
  skip: <span class="num">1</span>,  <span class="cmt">// skip the cursor</span>
  cursor: { id: lastUserId },
  orderBy: { id: <span class="str">'asc'</span> },
});</code></pre></div>
<h3>Singleton Pattern</h3>
<div class="cb"><div class="cb-h"><span class="cb-l">TypeScript</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">// lib/prisma.ts — reuse one instance</span>
<span class="kw">const</span> globalForPrisma = globalThis <span class="kw">as</span> <span class="kw">any</span>;
<span class="kw">export const</span> prisma = globalForPrisma.prisma ??
  <span class="kw">new</span> <span class="fn">PrismaClient</span>();
<span class="kw">if</span> (process.env.NODE_ENV !== <span class="str">'production'</span>)
  globalForPrisma.prisma = prisma;</code></pre></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Avoid N+1 with include/select. Cursor pagination for large datasets. Singleton client to reuse connections.</p></div>`,
quiz:[{q:'What is the N+1 problem?',opts:['Migration error','Fetching N records then N extra queries for relations','Connection pooling issue','Pagination error'],correct:1,explain:'N+1 occurs when you fetch N records then loop making one query per record. Fix with include.'}]}
]},

/* ═══════════════════════════════════════════════
   SECTION 6 — BACKEND INTEGRATION
   ═══════════════════════════════════════════════ */
{id:'backend',title:'Backend Integration',icon:'🔧',lessons:[
{id:'b1',title:'Express + Prisma Setup',sub:'Project structure and first API',
content:`<h2>Project Structure</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">Text</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code>my-api/
├── prisma/schema.prisma
├── src/
│   ├── index.ts
│   ├── routes/users.ts
│   ├── services/userService.ts
│   └── lib/prisma.ts
└── .env</code></pre></div>
<div class="cb"><div class="cb-h"><span class="cb-l">TypeScript</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">// src/lib/prisma.ts</span>
<span class="kw">import</span> { PrismaClient } <span class="kw">from</span> <span class="str">'@prisma/client'</span>;
<span class="kw">export const</span> prisma = <span class="kw">new</span> <span class="fn">PrismaClient</span>();

<span class="cmt">// src/index.ts</span>
<span class="kw">import</span> express <span class="kw">from</span> <span class="str">'express'</span>;
<span class="kw">const</span> app = <span class="fn">express</span>();
app.<span class="fn">use</span>(express.<span class="fn">json</span>());

app.<span class="fn">get</span>(<span class="str">'/api/users'</span>, <span class="kw">async</span> (req, res) => {
  <span class="kw">const</span> users = <span class="kw">await</span> prisma.user.<span class="fn">findMany</span>({
    select: { id: <span class="kw">true</span>, name: <span class="kw">true</span>, email: <span class="kw">true</span> },
  });
  res.<span class="fn">json</span>(users);
});
app.<span class="fn">listen</span>(<span class="num">3000</span>);</code></pre></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Structure with separate routes, services, and a Prisma singleton. Express Router for clean routes.</p></div>`,
quiz:[{q:'Why create a Prisma Client singleton?',opts:['Save disk space','Avoid exhausting DB connections','Code shorter','Required by Prisma'],correct:1,explain:'Each instance opens a connection pool. A singleton reuses one pool.'}]},

{id:'b2',title:'Authentication with JWT',sub:'Password hashing, tokens, and auth middleware',
content:`<h2>Auth System</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">TypeScript</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">import</span> bcrypt <span class="kw">from</span> <span class="str">'bcrypt'</span>;
<span class="kw">import</span> jwt <span class="kw">from</span> <span class="str">'jsonwebtoken'</span>;

<span class="cmt">// Register: hash password, create user, issue JWT</span>
<span class="kw">const</span> hashed = <span class="kw">await</span> bcrypt.<span class="fn">hash</span>(password, <span class="num">12</span>);
<span class="kw">const</span> user = <span class="kw">await</span> prisma.user.<span class="fn">create</span>({
  data: { email, name, password: hashed },
});
<span class="kw">const</span> token = jwt.<span class="fn">sign</span>(
  { userId: user.id, role: user.role },
  process.env.JWT_SECRET,
  { expiresIn: <span class="str">'7d'</span> }
);

<span class="cmt">// Auth middleware</span>
<span class="kw">function</span> <span class="fn">authenticate</span>(req, res, next) {
  <span class="kw">const</span> token = req.headers.authorization
    ?.<span class="fn">replace</span>(<span class="str">'Bearer '</span>, <span class="str">''</span>);
  <span class="kw">if</span> (!token)
    <span class="kw">return</span> res.<span class="fn">status</span>(<span class="num">401</span>).<span class="fn">json</span>({ error: <span class="str">'No token'</span> });
  <span class="kw">try</span> {
    req.user = jwt.<span class="fn">verify</span>(token, process.env.JWT_SECRET);
    <span class="fn">next</span>();
  } <span class="kw">catch</span> {
    res.<span class="fn">status</span>(<span class="num">401</span>).<span class="fn">json</span>({ error: <span class="str">'Invalid token'</span> });
  }
}</code></pre></div>
<div class="callout callout-danger"><div class="callout-title">🚫 Security Rules</div>
<p>1) Never store plain-text passwords. 2) Don't put sensitive data in JWT. 3) Use HTTPS. 4) bcrypt cost 12+.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Hash with bcrypt. Issue JWTs on login. Verify in middleware. Protect routes with the middleware.</p></div>`,
quiz:[{q:'Why never store plain-text passwords?',opts:['Too much space','DB compromise exposes all passwords','PostgreSQL unsupported','Slows queries'],correct:1,explain:'Plain-text passwords are immediately usable if the database is breached.'}]},

{id:'b3',title:'Service & Repository Patterns',sub:'Organizing backend code for scalability',
content:`<h2>Layered Architecture</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">TypeScript</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">// Repository: data access only</span>
<span class="kw">export const</span> userRepository = {
  <span class="fn">findById</span>(id: <span class="type">number</span>) {
    <span class="kw">return</span> prisma.user.<span class="fn">findUnique</span>({
      where: { id }, include: { profile: <span class="kw">true</span> },
    });
  },
  <span class="fn">findByEmail</span>(email: <span class="type">string</span>) {
    <span class="kw">return</span> prisma.user.<span class="fn">findUnique</span>({ where: { email } });
  },
  <span class="fn">create</span>(data) {
    <span class="kw">return</span> prisma.user.<span class="fn">create</span>({ data });
  },
};

<span class="cmt">// Service: business logic</span>
<span class="kw">export const</span> userService = {
  <span class="kw">async</span> <span class="fn">register</span>(email, name, password) {
    <span class="kw">const</span> existing = <span class="kw">await</span> userRepository.<span class="fn">findByEmail</span>(email);
    <span class="kw">if</span> (existing) <span class="kw">throw new</span> <span class="fn">Error</span>(<span class="str">'Email already in use'</span>);
    <span class="kw">const</span> hashed = <span class="kw">await</span> bcrypt.<span class="fn">hash</span>(password, <span class="num">12</span>);
    <span class="kw">return</span> userRepository.<span class="fn">create</span>({
      email, name, password: hashed
    });
  },
};</code></pre></div>
<div class="callout callout-info"><div class="callout-title">💡 What Companies Actually Do</div>
<p>Most production backends follow some version of this layered architecture. Routes handle HTTP. Services contain business logic. Repositories handle queries.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Separation of concerns makes code testable and maintainable. Each layer has one job.</p></div>`,
quiz:[{q:'Where does "email must be unique" logic belong?',opts:['Routes','Services','Repositories','Database only'],correct:1,explain:'Services orchestrate: check via repo, then decide to proceed or throw.'}]},

{id:'b4',title:'Error Handling & Validation',sub:'Graceful errors and input validation',
content:`<h2>Error Handling</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">TypeScript</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">// Global error handler</span>
app.<span class="fn">use</span>((err, req, res, next) => {
  <span class="kw">if</span> (err.status)
    <span class="kw">return</span> res.<span class="fn">status</span>(err.status).<span class="fn">json</span>({ error: err.message });

  <span class="cmt">// Prisma-specific errors</span>
  <span class="kw">if</span> (err.code === <span class="str">'P2002'</span>)
    <span class="kw">return</span> res.<span class="fn">status</span>(<span class="num">409</span>).<span class="fn">json</span>({ error: <span class="str">'Duplicate value'</span> });
  <span class="kw">if</span> (err.code === <span class="str">'P2025'</span>)
    <span class="kw">return</span> res.<span class="fn">status</span>(<span class="num">404</span>).<span class="fn">json</span>({ error: <span class="str">'Not found'</span> });

  res.<span class="fn">status</span>(<span class="num">500</span>).<span class="fn">json</span>({ error: <span class="str">'Internal server error'</span> });
});</code></pre></div>
<div class="tw"><table>
<tr><th>Prisma Code</th><th>Meaning</th><th>HTTP Status</th></tr>
<tr><td><code>P2002</code></td><td>Unique constraint</td><td>409</td></tr>
<tr><td><code>P2025</code></td><td>Not found</td><td>404</td></tr>
<tr><td><code>P2003</code></td><td>FK constraint</td><td>400</td></tr>
</table></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Validate early. Custom error classes. Handle Prisma codes globally. Never expose raw errors to clients.</p></div>`,
quiz:[{q:'Prisma code P2002 means:',opts:['Not found','Unique constraint violation','FK failure','Connection error'],correct:1,explain:'P2002 indicates a unique constraint was violated.'}]},

{id:'b5',title:'Authorization & RBAC Middleware',sub:'Controlling access with roles and permissions',
content:`<h2>Authorization Middleware</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">TypeScript</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">export function</span> <span class="fn">authorize</span>(...roles: <span class="type">string</span>[]) {
  <span class="kw">return</span> (req, res, next) => {
    <span class="kw">if</span> (!req.user)
      <span class="kw">return</span> res.<span class="fn">status</span>(<span class="num">401</span>).<span class="fn">json</span>({ error: <span class="str">'Not authenticated'</span> });
    <span class="kw">if</span> (!roles.<span class="fn">includes</span>(req.user.role))
      <span class="kw">return</span> res.<span class="fn">status</span>(<span class="num">403</span>).<span class="fn">json</span>({ error: <span class="str">'Forbidden'</span> });
    <span class="fn">next</span>();
  };
}

<span class="cmt">// Usage</span>
app.<span class="fn">delete</span>(<span class="str">'/api/users/:id'</span>,
  authenticate,
  <span class="fn">authorize</span>(<span class="str">'admin'</span>),
  handler
);</code></pre></div>
<div class="callout callout-warn"><div class="callout-title">⚠️ 401 vs 403</div>
<p><strong>401</strong> = "I don't know who you are" (no/invalid token). <strong>403</strong> = "I know you, but you can't do this" (no permission).</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Authenticate = identify. Authorize = permission check. 401 vs 403 is a common interview question.</p></div>`,
quiz:[{q:'HTTP 403 means:',opts:['Not found','Bad request','Forbidden (authenticated, no permission)','Unauthorized'],correct:2,explain:'403 Forbidden: server knows the user but they lack permission.'}]}
]},

{id:'production',title:'Production Engineering',icon:'🚀',lessons:[
{id:'pp1',title:'Docker & Environment',sub:'Containerized setup and configuration management',
content:`<h2>Docker Compose</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">YAML</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt"># docker-compose.yml</span>
<span class="kw">version</span>: <span class="str">'3.8'</span>
<span class="kw">services</span>:
  <span class="fn">db</span>:
    <span class="kw">image</span>: postgres:<span class="num">16</span>
    <span class="kw">environment</span>:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    <span class="kw">ports</span>: [<span class="str">"5432:5432"</span>]
    <span class="kw">volumes</span>: [pgdata:/var/lib/postgresql/data]
  <span class="fn">api</span>:
    <span class="kw">build</span>: .
    <span class="kw">environment</span>:
      DATABASE_URL: postgresql://myuser:mypassword@db:5432/mydb
    <span class="kw">depends_on</span>: [db]
<span class="kw">volumes</span>: <span class="fn">pgdata</span>:</code></pre></div>
<div class="callout callout-danger"><div class="callout-title">🚫 Never Commit .env</div>
<p>Use .env.example as a template. In production, inject via your hosting platform.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Docker Compose makes local PostgreSQL trivial. Volumes persist data. Never commit secrets.</p></div>`,
quiz:[{q:'Why use Docker volumes for PostgreSQL?',opts:['Faster queries','Persist data across restarts','Encrypt data','Enable replication'],correct:1,explain:'Volumes store data outside the container, persisting across restarts.'}]},

{id:'pp2',title:'Connection Pooling & Caching',sub:'PgBouncer, Redis, and monitoring',
content:`<h2>Redis Caching</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">TypeScript</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">async function</span> <span class="fn">getUser</span>(id) {
  <span class="kw">const</span> cached = <span class="kw">await</span> redis.<span class="fn">get</span>(<span class="str">\`user:\${id}\`</span>);
  <span class="kw">if</span> (cached) <span class="kw">return</span> JSON.<span class="fn">parse</span>(cached);
  <span class="kw">const</span> user = <span class="kw">await</span> prisma.user.<span class="fn">findUnique</span>({ where: { id } });
  <span class="kw">await</span> redis.<span class="fn">setex</span>(<span class="str">\`user:\${id}\`</span>, <span class="num">300</span>, JSON.<span class="fn">stringify</span>(user));
  <span class="kw">return</span> user;
}</code></pre></div>
<h2>Monitoring</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">-- Slow queries</span>
<span class="kw">SELECT</span> query, calls, mean_exec_time
<span class="kw">FROM</span> pg_stat_statements
<span class="kw">ORDER BY</span> mean_exec_time <span class="kw">DESC</span> <span class="kw">LIMIT</span> <span class="num">10</span>;

<span class="cmt">-- Active connections</span>
<span class="kw">SELECT count</span>(*) <span class="kw">FROM</span> pg_stat_activity;</code></pre></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>PgBouncer for pooling. Redis for caching. pg_stat_statements for monitoring.</p></div>`,
quiz:[{q:'What does connection pooling solve?',opts:['Slow queries','Too many connections consuming memory','Missing indexes','SQL injection'],correct:1,explain:'Pooling reuses connections, preventing memory exhaustion.'}]},

{id:'pp3',title:'Security Best Practices',sub:'SQL injection, passwords, encryption, and least privilege',
content:`<h2>Security Checklist</h2>
<div class="tw"><table>
<tr><th>Practice</th><th>Why</th></tr>
<tr><td>Parameterized queries</td><td>Prevents SQL injection</td></tr>
<tr><td>Hash passwords (bcrypt)</td><td>Protects credentials</td></tr>
<tr><td>Use HTTPS</td><td>Encrypts data in transit</td></tr>
<tr><td>Limit DB user permissions</td><td>Least privilege</td></tr>
<tr><td>Enable SSL for DB connections</td><td>Encrypts app-to-DB</td></tr>
</table></div>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">-- Limited-privilege app user</span>
<span class="kw">CREATE USER</span> app_user <span class="kw">WITH PASSWORD</span> <span class="str">'secure'</span>;
<span class="kw">GRANT CONNECT ON DATABASE</span> mydb <span class="kw">TO</span> app_user;
<span class="kw">GRANT SELECT, INSERT, UPDATE, DELETE
  ON ALL TABLES IN SCHEMA</span> public <span class="kw">TO</span> app_user;</code></pre></div>
<div class="callout callout-danger"><div class="callout-title">🚫 Never Use Superuser for Apps</div>
<p>Your app should connect with a limited user. Never use the postgres superuser.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Parameterize queries. Hash passwords. Use SSL. Create limited DB users. Security is defense in depth.</p></div>`,
quiz:[{q:'Primary defense against SQL injection?',opts:['Input limits','Parameterized queries','WAF','CAPTCHA'],correct:1,explain:'Parameterized queries separate SQL code from data, preventing injection.'}]}
]},

{id:'interview',title:'Interview Preparation',icon:'🎯',lessons:[
{id:'i1',title:'SQL Interview Questions',sub:'Rankings, duplicates, self-joins, and common patterns',
content:`<h2>Common SQL Patterns</h2>
<h3>Second Highest Salary</h3>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">SELECT DISTINCT</span> salary <span class="kw">FROM</span> (
    <span class="kw">SELECT</span> salary,
           <span class="fn">DENSE_RANK</span>() <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> salary <span class="kw">DESC</span>) <span class="kw">AS</span> rank
    <span class="kw">FROM</span> employees
) ranked <span class="kw">WHERE</span> rank = <span class="num">2</span>;</code></pre></div>
<h3>Duplicate Emails</h3>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">SELECT</span> email, <span class="fn">COUNT</span>(*) <span class="kw">FROM</span> users
<span class="kw">GROUP BY</span> email <span class="kw">HAVING COUNT</span>(*) > <span class="num">1</span>;</code></pre></div>
<h3>Employees Earning More Than Their Manager</h3>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">SELECT</span> e.name <span class="kw">AS</span> employee, m.name <span class="kw">AS</span> manager
<span class="kw">FROM</span> employees e
<span class="kw">JOIN</span> employees m <span class="kw">ON</span> e.manager_id = m.id
<span class="kw">WHERE</span> e.salary > m.salary;</code></pre></div>
<h3>Consecutive Days with Sales</h3>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">WITH</span> dates <span class="kw">AS</span> (
    <span class="kw">SELECT DISTINCT</span> <span class="fn">DATE</span>(created_at) <span class="kw">AS</span> d <span class="kw">FROM</span> orders
), grouped <span class="kw">AS</span> (
    <span class="kw">SELECT</span> d, d - <span class="fn">ROW_NUMBER</span>() <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> d)::int <span class="kw">AS</span> grp
    <span class="kw">FROM</span> dates
)
<span class="kw">SELECT</span> <span class="fn">MIN</span>(d), <span class="fn">MAX</span>(d), <span class="fn">COUNT</span>(*)
<span class="kw">FROM</span> grouped <span class="kw">GROUP BY</span> grp <span class="kw">HAVING COUNT</span>(*) >= <span class="num">3</span>;</code></pre></div>
<div class="callout callout-info"><div class="callout-title">💡 Interview Tips</div>
<p>1) Think out loud. 2) Start simple, then optimize. 3) Ask clarifying questions. 4) Consider edge cases.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Rankings, self-joins, GROUP BY + HAVING, subqueries — these cover 80% of SQL interview questions.</p></div>`,
quiz:[{q:'ROW_NUMBER() vs RANK()?',opts:['Same thing','ROW_NUMBER is unique; RANK gives same rank for ties','RANK is unique; ROW_NUMBER gives same for ties','Neither handles ties'],correct:1,explain:'ROW_NUMBER assigns unique numbers. RANK gives the same rank for tied values, with gaps.'}]},

{id:'i2',title:'Schema Design Challenges',sub:'URL shortener, e-commerce, social media',
content:`<h2>URL Shortener</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">CREATE TABLE</span> urls (
    id <span class="type">BIGSERIAL</span> <span class="kw">PRIMARY KEY</span>,
    short_code <span class="type">VARCHAR</span>(<span class="num">10</span>) <span class="kw">UNIQUE NOT NULL</span>,
    original <span class="type">TEXT</span> <span class="kw">NOT NULL</span>,
    clicks <span class="type">INTEGER</span> <span class="kw">DEFAULT</span> <span class="num">0</span>,
    user_id <span class="type">INTEGER</span> <span class="kw">REFERENCES</span> users(id),
    created_at <span class="type">TIMESTAMP</span> <span class="kw">DEFAULT</span> <span class="fn">NOW</span>()
);
<span class="kw">CREATE INDEX</span> idx_short <span class="kw">ON</span> urls (short_code);</code></pre></div>
<h2>E-Commerce Core</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">CREATE TABLE</span> order_items (
    id <span class="type">SERIAL</span> <span class="kw">PRIMARY KEY</span>,
    order_id <span class="type">INTEGER</span>, product_id <span class="type">INTEGER</span>,
    quantity <span class="type">INTEGER</span>,
    unit_price <span class="type">DECIMAL</span>(<span class="num">10</span>,<span class="num">2</span>)  <span class="cmt">-- snapshot at order time!</span>
);</code></pre></div>
<div class="callout callout-warn"><div class="callout-title">⚠️ Snapshot Prices</div>
<p>Always store unit_price in order_items. Prices change; historical orders must show the original price.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Identify entities, relationships, constraints. Consider indexing. Snapshot mutable data in transactions.</p></div>`,
quiz:[{q:'Why snapshot unit_price in order_items?',opts:['Save space','Prices change; orders need original price','Looks better','No reason'],correct:1,explain:'Historical records must be accurate regardless of future price changes.'}]},

{id:'i3',title:'Prisma & Backend Q&A',sub:'N+1, transactions, raw SQL, migrations',
content:`<h2>Frequently Asked Questions</h2>
<h3>N+1 Problem?</h3><p>Fetching N records then N extra queries for relations. Solve with <code>include</code>.</p>
<h3>Transactions?</h3><p>Interactive: <code>\$transaction(async (tx) => {...})</code>. Batch: <code>\$transaction([...])</code>.</p>
<h3>When Raw SQL?</h3><p>Window functions, CTEs, complex aggregations. Always use tagged templates.</p>
<h3>Production Migrations?</h3><p><code>prisma migrate deploy</code> in CI/CD. Backward-compatible changes for zero downtime.</p>
<h3>findUnique vs findFirst?</h3><p><code>findUnique</code> requires unique field. <code>findFirst</code> works with any filter.</p>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Know N+1, transactions, raw SQL, migration strategies, and Prisma tradeoffs cold.</p></div>`,
quiz:[{q:'When to use findFirst vs findUnique?',opts:['Identical','findUnique requires unique field; findFirst any filter','findFirst is faster','findUnique only for id'],correct:1,explain:'findUnique needs a unique field. findFirst works with any filter.'}]},

{id:'i4',title:'Debugging Scenarios',sub:'Slow queries, connection issues, and data problems',
content:`<h2>API Suddenly Slow</h2>
<ol><li><code>EXPLAIN ANALYZE</code> the slow query</li><li>Look for Seq Scan on large tables</li><li>Check connections: <code>SELECT count(*) FROM pg_stat_activity</code></li><li>Check locks: <code>SELECT * FROM pg_locks WHERE NOT granted</code></li><li>Check bloat: <code>n_dead_tup</code> in <code>pg_stat_user_tables</code></li></ol>
<h2>Data Inconsistency</h2>
<ol><li>Check for missing foreign key constraints</li><li>Look for concurrent writes without transactions</li><li>Check isolation level</li><li>Audit application code for race conditions</li></ol>
<div class="challenge-box"><h3>🧠 Debug This Query</h3><p>This query is slow on a 10M row table:</p>
<p><code>SELECT * FROM orders WHERE EXTRACT(YEAR FROM created_at) = 2024</code></p>
<p><strong>Answer:</strong> The function on the column prevents index usage. Fix: <code>WHERE created_at >= '2024-01-01' AND created_at < '2025-01-01'</code></p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Systematic debugging: execution plans, connections, locks, indexes. EXPLAIN ANALYZE first, always.</p></div>`,
quiz:[{q:'Why is WHERE EXTRACT(YEAR FROM col) = 2024 slow?',opts:['EXTRACT is deprecated','Function on column prevents index usage','Cannot filter by year','Wrong syntax'],correct:1,explain:'Functions on columns prevent standard index usage. Use range conditions instead.'}]}
]},

{id:'projects',title:'Portfolio Projects',icon:'🏗️',lessons:[
{id:'pj1',title:'SaaS Invoicing Platform',sub:'Tenants, invoices, line items, PDF-ready schemas',
content:`<h2>SaaS Invoicing Schema</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">Prisma</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">model</span> <span class="type">Tenant</span> {
  id <span class="type">Int</span> <span class="attr">@id</span> <span class="attr">@default</span>(<span class="fn">autoincrement</span>())
  name <span class="type">String</span>
  clients <span class="type">Client</span>[]
  invoices <span class="type">Invoice</span>[]
}
<span class="kw">model</span> <span class="type">Client</span> {
  id <span class="type">Int</span> <span class="attr">@id</span> <span class="attr">@default</span>(<span class="fn">autoincrement</span>())
  tenant <span class="type">Tenant</span> <span class="attr">@relation</span>(fields: [tenantId], references: [id])
  tenantId <span class="type">Int</span>
  name <span class="type">String</span>
  email <span class="type">String</span>
  invoices <span class="type">Invoice</span>[]
}
<span class="kw">model</span> <span class="type">Invoice</span> {
  id <span class="type">Int</span> <span class="attr">@id</span> <span class="attr">@default</span>(<span class="fn">autoincrement</span>())
  tenant <span class="type">Tenant</span> <span class="attr">@relation</span>(fields: [tenantId], references: [id])
  tenantId <span class="type">Int</span>
  client <span class="type">Client</span> <span class="attr">@relation</span>(fields: [clientId], references: [id])
  clientId <span class="type">Int</span>
  number <span class="type">String</span>
  status <span class="type">String</span> <span class="attr">@default</span>(<span class="str">"draft"</span>)
  subtotal <span class="type">Decimal</span> <span class="attr">@db.Decimal</span>(<span class="num">10</span>, <span class="num">2</span>)
  tax <span class="type">Decimal</span> <span class="attr">@db.Decimal</span>(<span class="num">10</span>, <span class="num">2</span>)
  total <span class="type">Decimal</span> <span class="attr">@db.Decimal</span>(<span class="num">10</span>, <span class="num">2</span>)
  items <span class="type">InvoiceItem</span>[]
  dueDate <span class="type">DateTime</span>
  createdAt <span class="type">DateTime</span> <span class="attr">@default</span>(<span class="fn">now</span>())
  @@index([tenantId, status])
}
<span class="kw">model</span> <span class="type">InvoiceItem</span> {
  id <span class="type">Int</span> <span class="attr">@id</span> <span class="attr">@default</span>(<span class="fn">autoincrement</span>())
  invoice <span class="type">Invoice</span> <span class="attr">@relation</span>(fields: [invoiceId], references: [id])
  invoiceId <span class="type">Int</span>
  description <span class="type">String</span>
  quantity <span class="type">Decimal</span> <span class="attr">@db.Decimal</span>(<span class="num">10</span>, <span class="num">2</span>)
  unitPrice <span class="type">Decimal</span> <span class="attr">@db.Decimal</span>(<span class="num">10</span>, <span class="num">2</span>)
  total <span class="type">Decimal</span> <span class="attr">@db.Decimal</span>(<span class="num">10</span>, <span class="num">2</span>)
}</code></pre></div>
<div class="cb"><div class="cb-h"><span class="cb-l">TypeScript</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">// Create invoice with items atomically</span>
<span class="kw">const</span> invoice = <span class="kw">await</span> prisma.<span class="fn">\$transaction</span>(<span class="kw">async</span> (tx) => {
  <span class="kw">const</span> items = req.body.items;
  <span class="kw">const</span> subtotal = items.<span class="fn">reduce</span>(
    (s, i) => s + i.quantity * i.unitPrice, <span class="num">0</span>
  );
  <span class="kw">return</span> tx.invoice.<span class="fn">create</span>({
    data: {
      tenantId: req.user.tenantId,
      clientId: req.body.clientId,
      number: <span class="kw">await</span> <span class="fn">nextInvoiceNumber</span>(tx),
      subtotal, tax: subtotal * <span class="num">0.1</span>,
      total: subtotal * <span class="num">1.1</span>,
      dueDate: req.body.dueDate,
      items: { create: items.<span class="fn">map</span>(i => ({
        ...i, total: i.quantity * i.unitPrice,
      }))},
    },
    include: { items: <span class="kw">true</span> },
  });
});</code></pre></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Multi-tenant invoices with line items. Transactions for consistency. Composite indexes for tenant queries.</p></div>`,
quiz:[{q:'Why use a transaction for invoice creation?',opts:['Performance','Invoice + items succeed or fail together','Required by Prisma','Saves memory'],correct:1,explain:'Transactions ensure atomicity — the invoice and all items succeed or fail together.'}]},

{id:'pj2',title:'Authentication System',sub:'Registration, login, JWT, refresh tokens',
content:`<h2>Full Auth Schema</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">Prisma</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">model</span> <span class="type">User</span> {
  id <span class="type">Int</span> <span class="attr">@id</span> <span class="attr">@default</span>(<span class="fn">autoincrement</span>())
  email <span class="type">String</span> <span class="attr">@unique</span>
  password <span class="type">String</span>
  role <span class="type">String</span> <span class="attr">@default</span>(<span class="str">"user"</span>)
  refreshTokens <span class="type">RefreshToken</span>[]
}
<span class="kw">model</span> <span class="type">RefreshToken</span> {
  id <span class="type">Int</span> <span class="attr">@id</span> <span class="attr">@default</span>(<span class="fn">autoincrement</span>())
  token <span class="type">String</span> <span class="attr">@unique</span>
  user <span class="type">User</span> <span class="attr">@relation</span>(fields: [userId], references: [id])
  userId <span class="type">Int</span>
  expiresAt <span class="type">DateTime</span>
}</code></pre></div>
<div class="cb"><div class="cb-h"><span class="cb-l">TypeScript</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">// Refresh: validate, rotate, issue new pair</span>
app.<span class="fn">post</span>(<span class="str">'/api/auth/refresh'</span>, <span class="kw">async</span> (req, res) => {
  <span class="kw">const</span> stored = <span class="kw">await</span> prisma.refreshToken
    .<span class="fn">findUnique</span>({
      where: { token: req.body.refreshToken },
      include: { user: <span class="kw">true</span> },
    });
  <span class="kw">if</span> (!stored || stored.expiresAt < <span class="kw">new</span> <span class="fn">Date</span>())
    <span class="kw">return</span> res.<span class="fn">status</span>(<span class="num">401</span>).<span class="fn">json</span>({ error: <span class="str">'Invalid'</span> });
  <span class="kw">await</span> prisma.refreshToken.<span class="fn">delete</span>({
    where: { id: stored.id },
  });
  <span class="kw">const</span> tokens = <span class="kw">await</span> <span class="fn">issueTokenPair</span>(stored.user);
  res.<span class="fn">json</span>(tokens);
});</code></pre></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Access tokens (short-lived) + refresh tokens (long-lived, DB-stored). Rotate refresh tokens on use.</p></div>`,
quiz:[{q:'Why rotate refresh tokens?',opts:['Performance','If stolen, old is invalidated on next use','OAuth requirement','No reason'],correct:1,explain:'Rotating limits vulnerability window if a token is compromised.'}]},

{id:'pj3',title:'E-Commerce Backend',sub:'Products, carts, orders, inventory management',
content:`<h2>E-Commerce Schema</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">Prisma</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>

<div class="cb"><div class="cb-h"><span class="cb-l">TypeScript</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">// Atomic inventory decrement</span>
<span class="kw">const</span> order = <span class="kw">await</span> prisma.<span class="fn">\$transaction</span>(<span class="kw">async</span> (tx) => {
  <span class="kw">for</span> (<span class="kw">const</span> item <span class="kw">of</span> cartItems) {
    <span class="kw">const</span> product = <span class="kw">await</span> tx.product.<span class="fn">update</span>({
      where: { id: item.productId },
      data: { stock: { decrement: item.quantity } },
    });
    <span class="kw">if</span> (product.stock < <span class="num">0</span>)
      <span class="kw">throw new</span> <span class="fn">Error</span>(<span class="str">\`\${product.name} out of stock\`</span>);
  }
  <span class="cmt">// Create order...</span>
});</code></pre></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Slug-based URLs. Atomic inventory decrements prevent overselling. Order items snapshot prices.</p></div>`,
quiz:[{q:'Why decrement stock in a transaction?',opts:['Better performance','Prevents overselling from concurrent orders','Prisma requirement','Saves disk'],correct:1,explain:'Without a transaction, concurrent orders could both see enough stock and both succeed — overselling.'}]},

{id:'pj5',title:'Audit Logging System',sub:'Triggers, change tracking, compliance-ready',
content:`<h2>Complete Audit System</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">CREATE TABLE</span> audit_logs (
    id <span class="type">BIGSERIAL</span> <span class="kw">PRIMARY KEY</span>,
    table_name <span class="type">VARCHAR</span>(<span class="num">100</span>), record_id <span class="type">INTEGER</span>,
    action <span class="type">VARCHAR</span>(<span class="num">10</span>),
    old_data <span class="type">JSONB</span>, new_data <span class="type">JSONB</span>,
    changed_by <span class="type">INTEGER</span>,
    changed_at <span class="type">TIMESTAMP</span> <span class="kw">DEFAULT</span> <span class="fn">NOW</span>()
);

<span class="kw">CREATE OR REPLACE FUNCTION</span> audit_trigger()
<span class="kw">RETURNS TRIGGER AS</span> \$\$
<span class="kw">BEGIN</span>
    <span class="kw">INSERT INTO</span> audit_logs
      (table_name, record_id, action, old_data, new_data)
    <span class="kw">VALUES</span> (
      TG_TABLE_NAME,
      COALESCE(NEW.id, OLD.id),
      TG_OP,
      <span class="kw">CASE WHEN</span> TG_OP <span class="kw">IN</span> (<span class="str">'UPDATE'</span>,<span class="str">'DELETE'</span>)
           <span class="kw">THEN</span> <span class="fn">to_jsonb</span>(OLD) <span class="kw">END</span>,
      <span class="kw">CASE WHEN</span> TG_OP <span class="kw">IN</span> (<span class="str">'INSERT'</span>,<span class="str">'UPDATE'</span>)
           <span class="kw">THEN</span> <span class="fn">to_jsonb</span>(NEW) <span class="kw">END</span>
    );
    <span class="kw">RETURN</span> COALESCE(NEW, OLD);
<span class="kw">END</span>;
\$\$ <span class="kw">LANGUAGE</span> plpgsql;

<span class="kw">CREATE TRIGGER</span> users_audit
<span class="kw">AFTER INSERT OR UPDATE OR DELETE ON</span> users
<span class="kw">FOR EACH ROW EXECUTE FUNCTION</span> audit_trigger();</code></pre></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Triggers + JSONB = automatic comprehensive audit logging. Apply to any table by creating a trigger.</p></div>`,
quiz:[{q:'What PostgreSQL feature auto-logs changes?',opts:['Views','Indexes','Triggers','Sequences'],correct:2,explain:'Triggers fire automatically on INSERT/UPDATE/DELETE, enabling automatic audit logging.'}]},

/* ===== APP STATE & LOGIC ===== */
let currentSection=0,currentLesson=0;
let completed=JSON.parse(localStorage.getItem('pgpr_completed')||'{}');

function allLessons(){let a=[];SECTIONS.forEach((s,si)=>s.lessons.forEach((l,li)=>a.push({si,li,...l})));return a;}
function saveProgress(){localStorage.setItem('pgpr_completed',JSON.stringify(completed));updateProgress();}
function updateProgress(){const all=allLessons();const done=Object.keys(completed).length;const pct=Math.round(done/all.length*100);document.getElementById('prog-pct').textContent=pct+'%';document.getElementById('prog-fill').style.width=pct+'%';}
function toggleComplete(id){if(completed[id]){delete completed[id]}else{completed[id]=true}saveProgress();renderLesson();buildSidebar();}

function buildSidebar(){
  const nav=document.getElementById('sidebar-nav');nav.innerHTML='';
  const overviewDiv = document.createElement('div');
  overviewDiv.className = 'sidebar-section';
  const isActive = currentSection === -1;
  overviewDiv.innerHTML = `<div id="overview-hdr" class="sidebar-section-header${isActive ? ' open' : ''}" style="background: ${isActive ? 'var(--accent-glow)' : 'transparent'}" onclick="renderLanding()"><span class="sec-title" style="color: ${isActive ? 'var(--accent)' : 'var(--text)'}; margin-left: 18px;">🏠 Course Overview</span></div>`;
  nav.appendChild(overviewDiv);
  SECTIONS.forEach((sec,si)=>{
    const done=sec.lessons.filter(l=>completed[l.id]).length;
    const pct=Math.round(done/sec.lessons.length*100);
    const secDiv=document.createElement('div');secDiv.className='sidebar-section';
    secDiv.innerHTML=`<div class="sidebar-section-header${si===currentSection?' open':''}" onclick="toggleSection(${si})"><span class="arrow">▸</span><span class="sec-num">${si+1}</span><span class="sec-title">${sec.icon} ${sec.title}</span><span class="sec-pct">${pct}%</span></div><div class="sidebar-lessons${si===currentSection?' open':''}" id="sec-${si}">${sec.lessons.map((l,li)=>`<div class="sidebar-lesson${si===currentSection&&li===currentLesson?' active':''}" data-si="${si}" data-li="${li}" onclick="goToLesson(${si},${li})"><span class="check${completed[l.id]?' done':''}">${completed[l.id]?'✓':''}</span><span>${l.title}</span></div>`).join('')}</div>`;
    nav.appendChild(secDiv);
  });
}
function toggleSection(si){
  const el=document.getElementById('sec-'+si);if(!el)return;
  const hdr=el.previousElementSibling;
  const isOpen=el.classList.contains('open');
  document.querySelectorAll('.sidebar-lessons').forEach(e=>e.classList.remove('open'));
  document.querySelectorAll('.sidebar-section-header').forEach(e=>e.classList.remove('open'));
  if(!isOpen){el.classList.add('open');hdr.classList.add('open')}
}
function goToLesson(si,li){currentSection=si;currentLesson=li;buildSidebar();renderLesson();closeSidebar();window.scrollTo(0,0);}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebar-overlay').classList.toggle('open');}
function prevLesson(){const all=allLessons();const idx=all.findIndex(l=>l.si===currentSection&&l.li===currentLesson);if(idx>0){const p=all[idx-1];goToLesson(p.si,p.li)}}
function nextLesson(){const all=allLessons();const idx=all.findIndex(l=>l.si===currentSection&&l.li===currentLesson);if(idx<all.length-1){const n=all[idx+1];goToLesson(n.si,n.li)}}


function renderLanding() {
  currentSection = -1;
  document.querySelectorAll('.sidebar-lesson').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.sidebar-section-header').forEach(el => {el.style.background=''; el.querySelector('.sec-title').style.color='';});
  const overviewHdr = document.getElementById('overview-hdr');
  if(overviewHdr) {
    overviewHdr.style.background = 'var(--accent-glow)';
    overviewHdr.querySelector('.sec-title').style.color = 'var(--accent)';
  }
  document.getElementById('breadcrumb').innerHTML = `<span class="bc-s">🏠 Course Overview</span>`;
  
  const all = allLessons();
  const numModules = SECTIONS.length;
  const numLessons = all.length;
  const numQuizzes = all.reduce((acc, l) => acc + (l.quiz ? l.quiz.length : 0), 0);
  
  let html = `<div class="landing animate-in">
    <div style="font-size:0.85rem;color:var(--accent2);font-weight:700;margin-bottom:15px;text-transform:uppercase;letter-spacing:0.05em;">${numModules} Modules · Offline Ready · Job-Focused</div>
    <h1>From zero to PostgreSQL & Prisma master.</h1>
    <p>No padding, no filler. This course takes you from never touching a database to writing clean, production-grade schemas that will land you your first dev job. Every module is dense, practical, and interview-aware.</p>
    
    <div class="landing-stats">
      <div class="landing-stat"><div class="landing-stat-num">${numModules}</div><div class="landing-stat-lbl">Modules</div></div>
      <div class="landing-stat"><div class="landing-stat-num">${numLessons}</div><div class="landing-stat-lbl">Lessons</div></div>
      <div class="landing-stat"><div class="landing-stat-num">50+</div><div class="landing-stat-lbl">Code Examples</div></div>
      <div class="landing-stat"><div class="landing-stat-num">${numQuizzes}</div><div class="landing-stat-lbl">Quizzes</div></div>
    </div>
    
    <button class="btn btn-primary" style="font-size:1.1rem;padding:12px 30px;border-radius:24px;" onclick="goToLesson(0,0)">Begin Module 1 →</button>
    
    <div class="landing-modules">
      <h2>Course Overview</h2>
      <div class="module-grid">
        ${SECTIONS.map((sec, i) => `
          <div class="module-card" onclick="goToLesson(${i},0)">
            <div class="module-icon">${sec.icon}</div>
            <div class="module-info">
              <h3>${sec.title}</h3>
              <p>${sec.lessons[0].sub || ''}</p>
              <div class="module-meta">${sec.lessons.length} lessons</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  </div>`;
  
  document.getElementById('main-inner').innerHTML = html;
  closeSidebar();
}

function renderLesson(){
  const sec=SECTIONS[currentSection];const lesson=sec.lessons[currentLesson];
  const all=allLessons();const idx=all.findIndex(l=>l.si===currentSection&&l.li===currentLesson);
  document.getElementById('breadcrumb').innerHTML=`<span class="bc-s">${sec.icon} ${sec.title}</span> / ${lesson.title}`;
  let html=`<div class="animate-in"><h1 class="lesson-title">${lesson.title}</h1><p class="lesson-subtitle">${lesson.sub||''}</p><div class="lesson-content">${lesson.content}</div>`;
  if(lesson.quiz&&lesson.quiz.length>0){
    html+=`<div class="quiz-section"><div class="quiz-title">📝 Knowledge Check</div>`;
    lesson.quiz.forEach((q,qi)=>{
      html+=`<div class="quiz-block" id="quiz-${qi}"><p class="quiz-q">${qi+1}. ${q.q}</p><div class="quiz-opts">${q.opts.map((o,oi)=>`<div class="quiz-opt" onclick="answerQuiz(${qi},${oi},${q.correct})"><span class="ol">${String.fromCharCode(65+oi)}</span><span>${o}</span></div>`).join('')}</div><div class="quiz-fb" id="fb-${qi}"></div></div>`;
    });
    html+=`</div>`;
  }
  const isDone=completed[lesson.id];
  html+=`<div class="complete-bar"><span class="status ${isDone?'done':''}">${isDone?'✅ Completed':'⬜ Mark as complete'}</span><button class="btn ${isDone?'btn-ghost':'btn-success'}" onclick="toggleComplete('${lesson.id}')">${isDone?'Undo':'✓ Complete'}</button></div>`;
  if(idx>0){const prev=all[idx-1];html+=`<div style="margin-top:20px"><button class="btn btn-ghost" onclick="goToLesson(${prev.si},${prev.li})">← ${prev.title}</button></div>`}
  if(idx<all.length-1){const next=all[idx+1];html+=`<div style="margin-top:10px;text-align:right"><button class="btn btn-primary" onclick="goToLesson(${next.si},${next.li})">${next.title} →</button></div>`}
  html+=`</div>`;
  document.getElementById('main-inner').innerHTML=html;
}

function answerQuiz(qi,selected,correct){
  const block=document.getElementById('quiz-'+qi);
  if(block.querySelector('.disabled'))return;
  const opts=block.querySelectorAll('.quiz-opt');
  opts.forEach((o,i)=>{o.classList.add('disabled');if(i===correct)o.classList.add('correct');if(i===selected&&i!==correct)o.classList.add('wrong')});
  const fb=document.getElementById('fb-'+qi);
  const quiz=SECTIONS[currentSection].lessons[currentLesson].quiz[qi];
  fb.className='quiz-fb show '+(selected===correct?'correct-fb':'wrong-fb');
  fb.innerHTML=(selected===correct?'✅ Correct! ':'❌ Incorrect. ')+quiz.explain;
}

function copyCode(btn){
  const pre=btn.closest('.cb').querySelector('pre');
  navigator.clipboard.writeText(pre.textContent).then(()=>{
    btn.textContent='Copied!';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied')},2000);
  });
}

function searchLessons(q){
  q=q.toLowerCase().trim();
  document.querySelectorAll('.sidebar-lesson').forEach(el=>{
    const si=+el.dataset.si,li=+el.dataset.li;
    const l=SECTIONS[si].lessons[li];
    const match=!q||l.title.toLowerCase().includes(q)||(l.sub&&l.sub.toLowerCase().includes(q));
    el.classList.toggle('hidden',!match);
  });
  if(q){document.querySelectorAll('.sidebar-lessons').forEach(e=>e.classList.add('open'));document.querySelectorAll('.sidebar-section-header').forEach(e=>e.classList.add('open'))}
  else{buildSidebar()}
}

/* Keyboard shortcuts */
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.key==='/'){e.preventDefault();document.getElementById('search-input').focus()}
  if(e.key==='ArrowLeft'&&e.altKey){e.preventDefault();prevLesson()}
  if(e.key==='ArrowRight'&&e.altKey){e.preventDefault();nextLesson()}
});

/* === Download Notes Logic === */
function downloadNotes() {
  let md = "# PostgreSQL + Prisma Mastery Notes\n\n";
  const all = allLessons();
  const done = all.filter(l => completed[l.id]);
  if (done.length === 0) {
    alert("Complete some lessons first to generate notes!");
    return;
  }
  done.forEach(l => {
    md += `## ${l.title}\n${l.sub || ''}\n\n`;
    let text = l.content.replace(/<pre><code.*?>([\s\S]*?)<\/code><\/pre>/g, (m, code) => '\n```\n' + code.replace(/<[^>]+>/g, '') + '\n```\n');
    text = text.replace(/<div class="callout.*?"><div class="callout-title">(.*?)<\/div>([\s\S]*?)<\/div>/g, (m, title, body) => `\n> **${title.replace(/<[^>]+>/g, '')}**\n> ${body.replace(/<[^>]+>/g, '')}\n`);
    text = text.replace(/<h3.*?>(.*?)<\/h3>/g, '### $1\n');
    text = text.replace(/<h2.*?>(.*?)<\/h2>/g, '### $1\n');
    text = text.replace(/<li.*?>(.*?)<\/li>/g, '- $1\n');
    text = text.replace(/<p.*?>(.*?)<\/p>/g, '$1\n\n');
    text = text.replace(/<[^>]+>/g, '');
    md += text.trim() + "\n\n---\n\n";
  });
  const blob = new Blob([md], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'PostgreSQL_Prisma_Notes.md';
  a.click();
}

/* === Spaced Repetition (SRS) Flashcards === */
let srsDeck = JSON.parse(localStorage.getItem('pgpr_srs') || '{}');
let activeCard = null;

function syncSRS() {
  const all = allLessons();
  all.filter(l => completed[l.id] && l.quiz).forEach(l => {
    l.quiz.forEach((q, i) => {
      const cardId = l.id + '_q' + i;
      if (!srsDeck[cardId]) {
        srsDeck[cardId] = { q: q.q, a: q.explain, nextReview: Date.now(), interval: 0, ease: 2.5 };
      }
    });
  });
  localStorage.setItem('pgpr_srs', JSON.stringify(srsDeck));
}

function startFlashcards() {
  syncSRS();
  document.querySelectorAll('.sidebar-lesson').forEach(el => el.classList.remove('active'));
  document.getElementById('breadcrumb').innerHTML = `<span class="bc-s">🧠 Review</span> / Flashcards`;
  renderNextCard();
}

function renderNextCard() {
  const now = Date.now();
  const due = Object.entries(srsDeck).filter(([id, c]) => c.nextReview <= now).sort((a,b) => a[1].nextReview - b[1].nextReview);
  
  if (due.length === 0) {
    const total = Object.keys(srsDeck).length;
    document.getElementById('main-inner').innerHTML = `<div class="flashcard-view animate-in"><div class="fc-empty"><h2>🎉 All caught up!</h2><p>You have reviewed all ${total} flashcards for today. Complete more lessons to unlock more cards.</p></div></div>`;
    return;
  }
  
  const [id, card] = due[0];
  activeCard = id;
  
  let html = `<div class="flashcard-view animate-in">
    <div class="fc-stats">${due.length} cards due for review</div>
    <div class="fc-card" onclick="flipCard()">
      <div class="fc-q">${card.q}</div>
      <div class="fc-a" id="fc-answer">${card.a}</div>
    </div>
    <div class="fc-controls" id="fc-controls">
      <button class="fc-btn fc-hard" onclick="rateCard('hard')">Hard (1d)</button>
      <button class="fc-btn fc-good" onclick="rateCard('good')">Good</button>
      <button class="fc-btn fc-easy" onclick="rateCard('easy')">Easy</button>
    </div>
  </div>`;
  document.getElementById('main-inner').innerHTML = html;
}

function flipCard() {
  document.getElementById('fc-answer').classList.add('show');
  document.getElementById('fc-controls').classList.add('show');
}

function rateCard(rating) {
  const c = srsDeck[activeCard];
  if (rating === 'hard') {
    c.interval = 1;
    c.ease = Math.max(1.3, c.ease - 0.2);
  } else if (rating === 'good') {
    c.interval = c.interval === 0 ? 1 : Math.round(c.interval * c.ease);
  } else if (rating === 'easy') {
    c.interval = c.interval === 0 ? 4 : Math.round(c.interval * c.ease * 1.3);
    c.ease += 0.15;
  }
  c.nextReview = Date.now() + (c.interval * 24 * 60 * 60 * 1000);
  localStorage.setItem('pgpr_srs', JSON.stringify(srsDeck));
  renderNextCard();
}

/* Init */
buildSidebar();updateProgress();syncSRS();
renderLanding();
</script>
