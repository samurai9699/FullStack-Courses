<script>
const SECTIONS=[

/* ═══════════════════════════════════════════════
   SECTION 1 — FOUNDATIONS
   ═══════════════════════════════════════════════ */
{id:'foundations',title:'Foundations',icon:'🏗️',lessons:[
{id:'f1',title:'What Are Databases?',sub:'Why databases exist and why they matter for every application',
content:`<h2>What is a Database?</h2>
<p>Imagine you run a small online shop. You have customers, products, orders, and reviews. Where do you keep all this information? You could use spreadsheets, but as your shop grows to thousands of customers, spreadsheets become slow, messy, and dangerous — what if two people edit the same file at once?</p>
<p>A <strong>database</strong> is an organized, electronic filing system that stores data so it can be easily accessed, managed, and updated. Think of it as a super-powered spreadsheet that:</p>
<ul>
<li>Handles millions (or billions) of records efficiently</li>
<li>Allows multiple users to read and write simultaneously</li>
<li>Protects your data from corruption and loss</li>
<li>Enforces rules so bad data can't sneak in</li>
<li>Provides powerful ways to search, filter, and analyze data</li>
</ul>
<h3>Why Not Just Use Files or Spreadsheets?</h3>
<p>Before databases, programs stored data in plain text files. This created huge problems:</p>
<ul>
<li><strong>Data redundancy</strong> — the same info duplicated everywhere</li>
<li><strong>Inconsistency</strong> — updating one copy but forgetting others</li>
<li><strong>No concurrency</strong> — only one process could write at a time</li>
<li><strong>No safety</strong> — a crash could corrupt everything</li>
<li><strong>Hard to query</strong> — "find all orders over \$100" requires writing custom code every time</li>
</ul>
<div class="callout callout-info"><div class="callout-title">💡 Real-World Analogy</div>
<p>Think of a database like a library. A library doesn't just throw books in a pile — it has a cataloging system (schema), a card catalog for finding books (indexes), librarians who enforce rules (constraints), and security to prevent theft (authentication). A database does all of this electronically for your data.</p></div>
<h3>Types of Databases</h3>
<div class="tw"><table>
<tr><th>Type</th><th>Examples</th><th>Best For</th></tr>
<tr><td><strong>Relational (SQL)</strong></td><td>PostgreSQL, MySQL, SQLite</td><td>Structured data with relationships</td></tr>
<tr><td><strong>Document</strong></td><td>MongoDB, CouchDB</td><td>Flexible, nested data</td></tr>
<tr><td><strong>Key-Value</strong></td><td>Redis, DynamoDB</td><td>Caching, sessions, fast lookups</td></tr>
<tr><td><strong>Graph</strong></td><td>Neo4j, ArangoDB</td><td>Highly connected data (social networks)</td></tr>
<tr><td><strong>Time-Series</strong></td><td>InfluxDB, TimescaleDB</td><td>Metrics, IoT data, monitoring</td></tr>
</table></div>
<p>For this course we focus on <strong>PostgreSQL</strong> — the most powerful open-source relational database. It's used by Apple, Instagram, Spotify, Reddit, and the vast majority of SaaS startups.</p>
<h3>What Companies Actually Do</h3>
<p>Almost every production application you use daily relies on a relational database. When you post on Instagram, that data goes into PostgreSQL. When Spotify tracks your listening history, that's in a database. When you check your bank balance, that's queried from a database with strict ACID guarantees (we'll learn about that later).</p>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>A database is an organized system for storing, retrieving, and managing data. Relational databases like PostgreSQL use tables with rows and columns, enforce data integrity rules, and support powerful queries. They are the backbone of virtually every software application.</p></div>`,
quiz:[
{q:'What is the main advantage of a database over storing data in files?',opts:['Databases use less disk space','Databases handle concurrency, integrity, and efficient querying','Databases are always faster','Databases are free'],correct:1,explain:'Databases solve many problems files have: concurrent access, data integrity enforcement, efficient querying, and crash recovery.'},
{q:'Which type of database is PostgreSQL?',opts:['Document database','Key-Value store','Relational database','Graph database'],correct:2,explain:'PostgreSQL is a relational (SQL) database that stores data in tables with rows and columns.'}]},

{id:'f2',title:'Tables, Rows & Columns',sub:'The fundamental building blocks of every relational database',
content:`<h2>The Building Blocks</h2>
<p>A relational database organizes data into <strong>tables</strong>. If you've ever used a spreadsheet, this will feel familiar. A table is like a spreadsheet sheet with a strict structure.</p>
<h3>Table (Relation)</h3>
<p>A <strong>table</strong> represents an entity — something you want to store data about. Examples: <code>users</code>, <code>products</code>, <code>orders</code>, <code>reviews</code>. Each table has a fixed set of <strong>columns</strong> and can have any number of <strong>rows</strong>.</p>
<h3>Columns (Fields/Attributes)</h3>
<p><strong>Columns</strong> define what kind of data each row holds. Each column has a <strong>name</strong> and a <strong>data type</strong>. For example, <code>name</code> is text, <code>age</code> is a number, <code>created_at</code> is a timestamp.</p>
<h3>Rows (Records/Tuples)</h3>
<p>A <strong>row</strong> is a single record in the table — one specific user, one specific product, one specific order. Each row has a value for every column.</p>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">-- Creating a table in PostgreSQL</span>
<span class="kw">CREATE TABLE</span> users (
    id    <span class="type">INTEGER</span>,
    name  <span class="type">VARCHAR</span>(<span class="num">100</span>),
    email <span class="type">VARCHAR</span>(<span class="num">255</span>),
    age   <span class="type">INTEGER</span>
);

<span class="cmt">-- Inserting rows of data</span>
<span class="kw">INSERT INTO</span> users (id, name, email, age) <span class="kw">VALUES</span>
    (<span class="num">1</span>, <span class="str">'Alice'</span>, <span class="str">'alice@mail.com'</span>, <span class="num">28</span>),
    (<span class="num">2</span>, <span class="str">'Bob'</span>, <span class="str">'bob@mail.com'</span>, <span class="num">34</span>),
    (<span class="num">3</span>, <span class="str">'Carol'</span>, <span class="str">'carol@mail.com'</span>, <span class="num">22</span>);

<span class="cmt">-- Querying all rows</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> users;</code></pre></div>
<h3>What Beginners Usually Misunderstand</h3>
<div class="callout callout-warn"><div class="callout-title">⚠️ Columns vs Rows</div>
<p>Many beginners confuse "columns" and "rows." Remember: <strong>columns go down</strong> (like columns in a building — vertical). <strong>Rows go across</strong> (like rows of seats in a theater — horizontal). A column defines the type of data; a row contains one actual record.</p></div>
<div class="callout callout-info"><div class="callout-title">💡 Analogy</div>
<p>A table is like a filing cabinet drawer labeled "Customers." Inside, each folder (row) represents one customer. Each folder has the same fields: Name, Email, Phone (columns). The drawer defines the structure; the folders hold the actual data.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Tables define structure through columns (with types), rows hold actual data. Think of it as a strict spreadsheet where every row must follow the same rules.</p></div>`,
quiz:[{q:'In a relational database, what defines the structure of data each row must follow?',opts:['Rows','The table and its columns','The first row inserted','The primary key'],correct:1,explain:'Tables define structure through their columns, each with a specific data type. Every row must follow this structure.'}]},

{id:'f3',title:'Primary & Foreign Keys',sub:'How data uniquely identifies itself and relates to other data',
content:`<h2>Primary Keys: Your Data's ID Card</h2>
<p>Every row in a table needs a way to be uniquely identified — like a social security number or a fingerprint. That's what a <strong>primary key</strong> does.</p>
<p>A <strong>primary key</strong> is a column (or combination of columns) that:</p>
<ul>
<li>Uniquely identifies each row — no two rows can have the same value</li>
<li>Is never NULL — every row must have a value</li>
<li>There's only one per table</li>
</ul>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">CREATE TABLE</span> users (
    id    <span class="type">SERIAL</span> <span class="kw">PRIMARY KEY</span>,  <span class="cmt">-- auto-incrementing ID (1, 2, 3...)</span>
    name  <span class="type">VARCHAR</span>(<span class="num">100</span>),
    email <span class="type">VARCHAR</span>(<span class="num">255</span>) <span class="kw">UNIQUE</span>
);</code></pre></div>
<p>The <code>SERIAL</code> type in PostgreSQL automatically generates a new integer for each new row. You don't have to manage it yourself.</p>
<h3>Foreign Keys: Connecting Tables Together</h3>
<p>A <strong>foreign key</strong> is a column in one table that references the primary key of another table. This is how tables <em>relate</em> to each other — hence "relational" database.</p>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">CREATE TABLE</span> orders (
    id       <span class="type">SERIAL</span> <span class="kw">PRIMARY KEY</span>,
    user_id  <span class="type">INTEGER</span> <span class="kw">REFERENCES</span> users(id),  <span class="cmt">-- foreign key!</span>
    total    <span class="type">DECIMAL</span>(<span class="num">10</span>,<span class="num">2</span>),
    created_at <span class="type">TIMESTAMP</span> <span class="kw">DEFAULT</span> <span class="fn">NOW</span>()
);
<span class="cmt">-- user_id can ONLY contain values that exist in users.id</span>
<span class="cmt">-- This prevents "orphan" orders for non-existent users</span></code></pre></div>
<div class="callout callout-info"><div class="callout-title">💡 The Power of References</div>
<p>Foreign keys are the glue of relational databases. They let you answer questions like: "What orders did Alice place?" by joining the <code>users</code> and <code>orders</code> tables. Without foreign keys, your data is just disconnected spreadsheets.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Primary keys uniquely identify rows. Foreign keys create relationships between tables by referencing primary keys. Together they form the backbone of relational database design.</p></div>`,
quiz:[{q:'What is the purpose of a foreign key?',opts:['To make queries faster','To uniquely identify each row','To link data between two tables by referencing a primary key','To encrypt sensitive data'],correct:2,explain:'A foreign key creates a relationship between tables by referencing the primary key of another table, ensuring referential integrity.'}]},

{id:'f4',title:'Relationships: 1:1, 1:N, M:N',sub:'How tables connect to each other in the real world',
content:`<h2>How Tables Talk to Each Other</h2>
<svg class="svg-diagram" viewBox="0 0 600 280" xmlns="http://www.w3.org/2000/svg">
  <!-- Users Table -->
  <g class="svg-clickable" onclick="document.querySelectorAll('.rel-line').forEach(el=>el.classList.toggle('svg-highlight'))">
    <rect x="50" y="40" width="140" height="100" rx="6" fill="var(--bg-elevated)" stroke="var(--border)"/>
    <rect x="50" y="40" width="140" height="25" rx="6" fill="var(--bg-hover)"/>
    <text x="120" y="58" fill="var(--accent)" font-size="12" font-weight="bold" text-anchor="middle">users (1)</text>
    <text x="60" y="80" fill="var(--text)" font-size="11">🔑 id (PK)</text>
    <text x="60" y="100" fill="var(--text-sec)" font-size="11">name</text>
    <text x="60" y="120" fill="var(--text-sec)" font-size="11">email</text>
  </g>

  <!-- Orders Table -->
  <g class="svg-clickable" onclick="document.querySelectorAll('.rel-line').forEach(el=>el.classList.toggle('svg-highlight'))">
    <rect x="400" y="40" width="140" height="100" rx="6" fill="var(--bg-elevated)" stroke="var(--border)"/>
    <rect x="400" y="40" width="140" height="25" rx="6" fill="var(--bg-hover)"/>
    <text x="470" y="58" fill="var(--accent2)" font-size="12" font-weight="bold" text-anchor="middle">orders (N)</text>
    <text x="410" y="80" fill="var(--text)" font-size="11">🔑 id (PK)</text>
    <text x="410" y="100" fill="var(--accent2)" font-size="11">🔗 user_id (FK)</text>
    <text x="410" y="120" fill="var(--text-sec)" font-size="11">total</text>
  </g>

  <!-- Relationship Line -->
  <path class="rel-line" d="M 190 80 L 400 100" stroke="var(--text-muted)" stroke-width="2" fill="none"/>
  
  <text x="295" y="80" fill="var(--text)" font-size="12" font-weight="bold" text-anchor="middle">1:N Relationship</text>
  <text x="295" y="98" fill="var(--text-sec)" font-size="10" text-anchor="middle">One user has many orders</text>
  <text x="295" y="112" fill="var(--text-sec)" font-size="10" text-anchor="middle">(Click tables to highlight)</text>

  <!-- M:N Tables -->
  <g transform="translate(0, 140)">
    <rect x="50" y="0" width="120" height="80" rx="6" fill="var(--bg-elevated)" stroke="var(--border)"/>
    <text x="110" y="20" fill="var(--text)" font-size="12" font-weight="bold" text-anchor="middle">students</text>
    <text x="60" y="45" fill="var(--text-sec)" font-size="11">🔑 id</text>
    
    <rect x="420" y="0" width="120" height="80" rx="6" fill="var(--bg-elevated)" stroke="var(--border)"/>
    <text x="480" y="20" fill="var(--text)" font-size="12" font-weight="bold" text-anchor="middle">courses</text>
    <text x="430" y="45" fill="var(--text-sec)" font-size="11">🔑 id</text>
    
    <rect x="230" y="0" width="140" height="90" rx="6" fill="var(--bg-elevated)" stroke="var(--warning)"/>
    <text x="300" y="20" fill="var(--warning)" font-size="12" font-weight="bold" text-anchor="middle">enrollments</text>
    <text x="240" y="45" fill="var(--text-sec)" font-size="11">🔗 student_id</text>
    <text x="240" y="65" fill="var(--text-sec)" font-size="11">🔗 course_id</text>
    
    <path d="M 170 40 L 230 45" stroke="var(--text-muted)" stroke-width="2" fill="none"/>
    <path d="M 420 40 L 370 65" stroke="var(--text-muted)" stroke-width="2" fill="none"/>
    <text x="300" y="-10" fill="var(--text)" font-size="12" font-weight="bold" text-anchor="middle">M:N with Junction Table</text>
  </g>
</svg>
<p>Real-world data is all about relationships. A customer places orders. A student enrolls in courses. A post has tags. There are three fundamental types.</p>
<h3>One-to-One (1:1)</h3>
<p>One record in Table A corresponds to exactly one record in Table B. Example: a user has one profile.</p>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">CREATE TABLE</span> user_profiles (
    user_id    <span class="type">INTEGER</span> <span class="kw">PRIMARY KEY</span> <span class="kw">REFERENCES</span> users(id),
    bio        <span class="type">TEXT</span>,
    avatar_url <span class="type">VARCHAR</span>(<span class="num">500</span>),
    website    <span class="type">VARCHAR</span>(<span class="num">255</span>)
);</code></pre></div>
<h3>One-to-Many (1:N)</h3>
<p>One record in Table A can have many records in Table B. This is the most common relationship. The "many" side holds the foreign key.</p>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">CREATE TABLE</span> orders (
    id       <span class="type">SERIAL</span> <span class="kw">PRIMARY KEY</span>,
    user_id  <span class="type">INTEGER</span> <span class="kw">REFERENCES</span> users(id),
    total    <span class="type">DECIMAL</span>(<span class="num">10</span>,<span class="num">2</span>)
);
<span class="cmt">-- Alice (id=1) can have 100 orders all pointing to her</span></code></pre></div>
<h3>Many-to-Many (M:N)</h3>
<p>Records in both tables can relate to many records in the other. Requires a <strong>junction table</strong>.</p>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">CREATE TABLE</span> courses (
    id    <span class="type">SERIAL</span> <span class="kw">PRIMARY KEY</span>,
    title <span class="type">VARCHAR</span>(<span class="num">200</span>)
);

<span class="cmt">-- Junction table: sits between the two tables</span>
<span class="kw">CREATE TABLE</span> enrollments (
    student_id <span class="type">INTEGER</span> <span class="kw">REFERENCES</span> users(id),
    course_id  <span class="type">INTEGER</span> <span class="kw">REFERENCES</span> courses(id),
    enrolled_at <span class="type">TIMESTAMP</span> <span class="kw">DEFAULT</span> <span class="fn">NOW</span>(),
    <span class="kw">PRIMARY KEY</span> (student_id, course_id)  <span class="cmt">-- composite key</span>
);</code></pre></div>
<div class="callout callout-warn"><div class="callout-title">⚠️ What Beginners Get Wrong</div>
<p>A common mistake is storing multiple values in a single column (e.g., a comma-separated list of course IDs). This breaks the relational model and makes queries nearly impossible. <strong>Always</strong> use a junction table for many-to-many relationships.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>1:1 — shared key or reference. 1:N — foreign key on the "many" side. M:N — junction table with two foreign keys. These three patterns cover 99% of real-world data relationships.</p></div>`,
quiz:[{q:'A blog post can have many tags, and each tag can be on many posts. What relationship is this?',opts:['One-to-One','One-to-Many','Many-to-Many','Self-referencing'],correct:2,explain:'When both sides can have multiple related records, it is many-to-many, requiring a junction table.'}]},

{id:'f5',title:'Data Types in PostgreSQL',sub:'Choosing the right type for every column',
content:`<h2>Choosing the Right Data Type</h2>
<p>Every column must have a data type. Choosing the right type matters for storage, performance, and data integrity.</p>
<div class="tw"><table>
<tr><th>Category</th><th>Type</th><th>Use For</th><th>Example</th></tr>
<tr><td rowspan="3"><strong>Numbers</strong></td><td><code>INTEGER</code></td><td>Whole numbers</td><td>age, quantity</td></tr>
<tr><td><code>BIGINT</code></td><td>Very large numbers</td><td>views_count, file_size</td></tr>
<tr><td><code>DECIMAL(p,s)</code></td><td>Precise decimals</td><td>price, balance</td></tr>
<tr><td rowspan="3"><strong>Text</strong></td><td><code>VARCHAR(n)</code></td><td>Variable-length with max</td><td>name, email</td></tr>
<tr><td><code>TEXT</code></td><td>Unlimited length</td><td>bio, description</td></tr>
<tr><td><code>CHAR(n)</code></td><td>Fixed-length</td><td>country_code (2 chars)</td></tr>
<tr><td rowspan="2"><strong>Date/Time</strong></td><td><code>TIMESTAMP</code></td><td>Date and time</td><td>created_at</td></tr>
<tr><td><code>DATE</code></td><td>Date only</td><td>birth_date</td></tr>
<tr><td rowspan="2"><strong>Other</strong></td><td><code>BOOLEAN</code></td><td>True/False</td><td>is_active, is_admin</td></tr>
<tr><td><code>JSONB</code></td><td>Flexible JSON data</td><td>settings, metadata</td></tr>
</table></div>
<div class="callout callout-info"><div class="callout-title">💡 Money in PostgreSQL</div>
<p>Never use <code>FLOAT</code> or <code>DOUBLE</code> for money. Floating-point math has rounding errors (0.1 + 0.2 ≠ 0.3 in floating-point). Always use <code>DECIMAL(10,2)</code> or <code>NUMERIC</code> for financial data.</p></div>
<div class="callout callout-warn"><div class="callout-title">⚠️ VARCHAR vs TEXT</div>
<p>In PostgreSQL, there's no performance difference between <code>VARCHAR(n)</code> and <code>TEXT</code>. Many PostgreSQL experts prefer <code>TEXT</code> with a <code>CHECK</code> constraint instead of <code>VARCHAR</code>.</p></div>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">CREATE TABLE</span> products (
    id          <span class="type">SERIAL</span> <span class="kw">PRIMARY KEY</span>,
    name        <span class="type">VARCHAR</span>(<span class="num">200</span>) <span class="kw">NOT NULL</span>,
    description <span class="type">TEXT</span>,
    price       <span class="type">DECIMAL</span>(<span class="num">10</span>,<span class="num">2</span>) <span class="kw">NOT NULL</span>,
    quantity    <span class="type">INTEGER</span> <span class="kw">DEFAULT</span> <span class="num">0</span>,
    is_active   <span class="type">BOOLEAN</span> <span class="kw">DEFAULT</span> <span class="kw">TRUE</span>,
    metadata    <span class="type">JSONB</span>,
    created_at  <span class="type">TIMESTAMP</span> <span class="kw">DEFAULT</span> <span class="fn">NOW</span>()
);</code></pre></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Use the most specific type: INTEGER for counts, DECIMAL for money, TEXT/VARCHAR for strings, TIMESTAMP for dates, BOOLEAN for flags, JSONB for flexible data.</p></div>`,
quiz:[{q:'Why should you avoid FLOAT for storing money?',opts:['FLOAT uses too much space','Floating-point math has rounding errors','FLOAT is slower','PostgreSQL does not support FLOAT'],correct:1,explain:'Floating-point arithmetic can produce rounding errors. Use DECIMAL for exact precision with monetary values.'}]},

{id:'f6',title:'Constraints: Protecting Your Data',sub:'Rules the database enforces to prevent bad data',
content:`<h2>Rules Your Data Must Follow</h2>
<p>Constraints are rules enforced by the database to prevent bad data from being stored. Think of them as bouncers at a club.</p>
<div class="tw"><table>
<tr><th>Constraint</th><th>Purpose</th><th>Example</th></tr>
<tr><td><code>NOT NULL</code></td><td>Must have a value</td><td>name VARCHAR NOT NULL</td></tr>
<tr><td><code>UNIQUE</code></td><td>No duplicate values</td><td>email VARCHAR UNIQUE</td></tr>
<tr><td><code>DEFAULT</code></td><td>Fallback value</td><td>role VARCHAR DEFAULT 'user'</td></tr>
<tr><td><code>CHECK</code></td><td>Custom validation</td><td>CHECK (age >= 13)</td></tr>
<tr><td><code>PRIMARY KEY</code></td><td>NOT NULL + UNIQUE</td><td>id SERIAL PRIMARY KEY</td></tr>
<tr><td><code>FOREIGN KEY</code></td><td>Must exist in referenced table</td><td>REFERENCES users(id)</td></tr>
</table></div>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">CREATE TABLE</span> users (
    id         <span class="type">SERIAL</span> <span class="kw">PRIMARY KEY</span>,
    username   <span class="type">VARCHAR</span>(<span class="num">50</span>) <span class="kw">NOT NULL UNIQUE</span>,
    email      <span class="type">VARCHAR</span>(<span class="num">255</span>) <span class="kw">NOT NULL UNIQUE</span>,
    age        <span class="type">INTEGER</span> <span class="kw">CHECK</span> (age >= <span class="num">13</span>),
    role       <span class="type">VARCHAR</span>(<span class="num">20</span>) <span class="kw">DEFAULT</span> <span class="str">'user'</span>,
    created_at <span class="type">TIMESTAMP</span> <span class="kw">DEFAULT</span> <span class="fn">NOW</span>()
);

<span class="cmt">-- This would FAIL: age must be >= 13</span>
<span class="kw">INSERT INTO</span> users (username, email, age)
<span class="kw">VALUES</span> (<span class="str">'kid'</span>, <span class="str">'kid@mail.com'</span>, <span class="num">8</span>);
<span class="cmt">-- ERROR: new row violates check constraint "users_age_check"</span></code></pre></div>
<div class="callout callout-info"><div class="callout-title">💡 Defense in Depth</div>
<p>You should validate data in your application code AND in the database. Application code can be bypassed (direct API calls, bugs), but database constraints are <strong>always</strong> enforced. Think of it as two locks on your door.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Constraints are your last line of defense for data integrity. Use NOT NULL, UNIQUE, CHECK, and foreign keys generously. They prevent bugs at the database level.</p></div>`,
quiz:[{q:'Which constraint combines NOT NULL and UNIQUE?',opts:['CHECK','FOREIGN KEY','PRIMARY KEY','DEFAULT'],correct:2,explain:'A PRIMARY KEY constraint ensures the column is both NOT NULL and UNIQUE.'}]}
]},

/* ═══════════════════════════════════════════════
   SECTION 2 — SQL MASTERY
   ═══════════════════════════════════════════════ */
{id:'sql',title:'SQL Mastery',icon:'⚡',lessons:[
{id:'s1',title:'SELECT & Filtering',sub:'Querying data with SELECT, WHERE, ORDER BY, LIMIT',
content:`<h2>Your First SQL Queries</h2>
<p>SQL stands for <strong>Structured Query Language</strong>. It's the universal language for talking to relational databases. The most fundamental command is <code>SELECT</code>.</p>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">-- Select all columns, all rows</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> users;

<span class="cmt">-- Select specific columns with alias</span>
<span class="kw">SELECT</span> name <span class="kw">AS</span> full_name, email <span class="kw">FROM</span> users;

<span class="cmt">-- Computed columns</span>
<span class="kw">SELECT</span> name, price, quantity,
       price * quantity <span class="kw">AS</span> line_total
<span class="kw">FROM</span> order_items;</code></pre></div>
<h3>WHERE: Filtering Rows</h3>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">-- Comparison operators: =, !=, <, >, <=, >=</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> users <span class="kw">WHERE</span> age >= <span class="num">18</span>;

<span class="cmt">-- Multiple conditions with AND / OR</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> users
<span class="kw">WHERE</span> age >= <span class="num">18</span> <span class="kw">AND</span> role = <span class="str">'admin'</span>;

<span class="cmt">-- IN: check against a list</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> products
<span class="kw">WHERE</span> category <span class="kw">IN</span> (<span class="str">'electronics'</span>, <span class="str">'books'</span>);

<span class="cmt">-- BETWEEN: range check (inclusive)</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> products
<span class="kw">WHERE</span> price <span class="kw">BETWEEN</span> <span class="num">10</span> <span class="kw">AND</span> <span class="num">100</span>;

<span class="cmt">-- LIKE: pattern matching (% = any chars, _ = one char)</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> users
<span class="kw">WHERE</span> email <span class="kw">LIKE</span> <span class="str">'%@gmail.com'</span>;

<span class="cmt">-- NULL checks (NEVER use = NULL!)</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> users <span class="kw">WHERE</span> phone <span class="kw">IS NULL</span>;
<span class="kw">SELECT</span> * <span class="kw">FROM</span> users <span class="kw">WHERE</span> phone <span class="kw">IS NOT NULL</span>;</code></pre></div>
<h3>Sorting & Limiting</h3>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">-- ORDER BY: sort results</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> products <span class="kw">ORDER BY</span> price <span class="kw">DESC</span>;

<span class="cmt">-- LIMIT & OFFSET (pagination!)</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> products <span class="kw">ORDER BY</span> id
<span class="kw">LIMIT</span> <span class="num">10</span> <span class="kw">OFFSET</span> <span class="num">0</span>;   <span class="cmt">-- Page 1</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> products <span class="kw">ORDER BY</span> id
<span class="kw">LIMIT</span> <span class="num">10</span> <span class="kw">OFFSET</span> <span class="num">10</span>;  <span class="cmt">-- Page 2</span>

<span class="cmt">-- DISTINCT: remove duplicates</span>
<span class="kw">SELECT DISTINCT</span> category <span class="kw">FROM</span> products;</code></pre></div>
<div class="callout callout-danger"><div class="callout-title">🚫 Common Mistake</div>
<p>Never use <code>= NULL</code> or <code>!= NULL</code>. In SQL, NULL represents "unknown," so comparing with = always returns unknown. Always use <code>IS NULL</code> or <code>IS NOT NULL</code>.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>SELECT retrieves data. WHERE filters rows. ORDER BY sorts. LIMIT/OFFSET paginate. DISTINCT removes duplicates. These are the building blocks of every SQL query.</p></div>`,
quiz:[
{q:'Which clause filters rows in a query?',opts:['SELECT','FROM','WHERE','ORDER BY'],correct:2,explain:'The WHERE clause filters which rows are returned based on conditions.'},
{q:'What is wrong with: SELECT * FROM users WHERE phone = NULL?',opts:['Nothing, it works','Should use IS NULL instead of = NULL','NULL must be in quotes','Cannot query for NULL'],correct:1,explain:'NULL represents "unknown" and cannot be compared with =. Always use IS NULL or IS NOT NULL.'}]},

{id:'s2',title:'Aggregate Functions & GROUP BY',sub:'Summarizing data with COUNT, SUM, AVG and grouping',
content:`<h2>Summarizing Data</h2>
<p>Aggregate functions compute a single result from multiple rows — summary questions about your data.</p>
<div class="tw"><table>
<tr><th>Function</th><th>What It Does</th><th>Example Question</th></tr>
<tr><td><code>COUNT(*)</code></td><td>Counts rows</td><td>How many users?</td></tr>
<tr><td><code>SUM(col)</code></td><td>Adds up values</td><td>Total revenue?</td></tr>
<tr><td><code>AVG(col)</code></td><td>Averages values</td><td>Average order value?</td></tr>
<tr><td><code>MIN(col)</code></td><td>Smallest value</td><td>Cheapest product?</td></tr>
<tr><td><code>MAX(col)</code></td><td>Largest value</td><td>Most expensive?</td></tr>
</table></div>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">-- Overall summary</span>
<span class="kw">SELECT</span>
    <span class="fn">COUNT</span>(*) <span class="kw">AS</span> total_orders,
    <span class="fn">SUM</span>(total) <span class="kw">AS</span> revenue,
    <span class="fn">AVG</span>(total) <span class="kw">AS</span> avg_order_value
<span class="kw">FROM</span> orders;

<span class="cmt">-- GROUP BY: break down by category</span>
<span class="kw">SELECT</span>
    user_id,
    <span class="fn">COUNT</span>(*) <span class="kw">AS</span> order_count,
    <span class="fn">SUM</span>(total) <span class="kw">AS</span> total_spent
<span class="kw">FROM</span> orders
<span class="kw">GROUP BY</span> user_id
<span class="kw">ORDER BY</span> total_spent <span class="kw">DESC</span>;

<span class="cmt">-- HAVING: filter groups (after aggregation)</span>
<span class="kw">SELECT</span> user_id, <span class="fn">COUNT</span>(*) <span class="kw">AS</span> order_count
<span class="kw">FROM</span> orders
<span class="kw">GROUP BY</span> user_id
<span class="kw">HAVING COUNT</span>(*) > <span class="num">5</span>
<span class="kw">ORDER BY</span> order_count <span class="kw">DESC</span>;</code></pre></div>
<div class="callout callout-warn"><div class="callout-title">⚠️ WHERE vs HAVING</div>
<p><code>WHERE</code> filters individual rows <em>before</em> grouping. <code>HAVING</code> filters groups <em>after</em> aggregation. If you need to filter on COUNT, SUM, etc., you must use HAVING.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>COUNT, SUM, AVG, MIN, MAX summarize data. GROUP BY splits data into categories. HAVING filters groups. The order: WHERE → GROUP BY → HAVING → ORDER BY → LIMIT.</p></div>`,
quiz:[{q:'Which clause filters groups after aggregation?',opts:['WHERE','GROUP BY','HAVING','ORDER BY'],correct:2,explain:'HAVING filters groups after GROUP BY. WHERE filters individual rows before grouping.'}]},

{id:'s3',title:'JOINs: Combining Tables',sub:'The most important SQL concept for relational data',
content:`<h2>The Most Important SQL Concept</h2>
<p>JOINs combine rows from two or more tables based on a related column. This is how you unlock the power of relational data.</p>
<h3>INNER JOIN</h3>
<p>Returns only rows that have matching values in both tables.</p>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">-- Get each order with the customer's name</span>
<span class="kw">SELECT</span> o.id, u.name, o.total
<span class="kw">FROM</span> orders o
<span class="kw">INNER JOIN</span> users u <span class="kw">ON</span> o.user_id = u.id;
<span class="cmt">-- Note: "INNER" is optional, just "JOIN" works</span></code></pre></div>
<h3>LEFT JOIN</h3>
<p>Returns ALL rows from the left table, matched rows from the right. If no match, right side is NULL.</p>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">-- All users, even those with no orders</span>
<span class="kw">SELECT</span> u.name, <span class="fn">COUNT</span>(o.id) <span class="kw">AS</span> order_count
<span class="kw">FROM</span> users u
<span class="kw">LEFT JOIN</span> orders o <span class="kw">ON</span> u.id = o.user_id
<span class="kw">GROUP BY</span> u.name;</code></pre></div>
<div class="tw"><table>
<tr><th>JOIN Type</th><th>Returns</th><th>Use When</th></tr>
<tr><td><code>INNER JOIN</code></td><td>Only matching rows from both</td><td>You only want related data</td></tr>
<tr><td><code>LEFT JOIN</code></td><td>All left + matching right</td><td>All from main table, even without matches</td></tr>
<tr><td><code>RIGHT JOIN</code></td><td>All right + matching left</td><td>Rare; rewrite as LEFT JOIN</td></tr>
<tr><td><code>FULL JOIN</code></td><td>All rows from both</td><td>Everything, matched or not</td></tr>
</table></div>
<div class="callout callout-info"><div class="callout-title">💡 Pro Tip</div>
<p>Always qualify column names with table aliases when joining: <code>u.name</code> instead of just <code>name</code>. It prevents ambiguity and makes code self-documenting.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>INNER JOIN for related data only. LEFT JOIN when you need all records from the primary table. JOINs are how relational databases become powerful — they connect your normalized data.</p></div>`,
quiz:[{q:'You want ALL customers including those who never ordered. Which JOIN?',opts:['INNER JOIN','LEFT JOIN','CROSS JOIN','RIGHT JOIN'],correct:1,explain:'LEFT JOIN returns all rows from the left table (customers) even if there are no matching orders.'}]},

{id:'s4',title:'Subqueries & CTEs',sub:'Queries inside queries for powerful data analysis',
content:`<h2>Queries Inside Queries</h2>
<h3>Subqueries</h3>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">-- Users who have placed orders</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> users
<span class="kw">WHERE</span> id <span class="kw">IN</span> (
    <span class="kw">SELECT DISTINCT</span> user_id <span class="kw">FROM</span> orders
);

<span class="cmt">-- Subquery in FROM (derived table)</span>
<span class="kw">SELECT</span> avg_data.name, avg_data.avg_total
<span class="kw">FROM</span> (
    <span class="kw">SELECT</span> u.name, <span class="fn">AVG</span>(o.total) <span class="kw">AS</span> avg_total
    <span class="kw">FROM</span> users u
    <span class="kw">JOIN</span> orders o <span class="kw">ON</span> u.id = o.user_id
    <span class="kw">GROUP BY</span> u.name
) <span class="kw">AS</span> avg_data
<span class="kw">WHERE</span> avg_data.avg_total > <span class="num">100</span>;</code></pre></div>
<h3>CTEs (Common Table Expressions)</h3>
<p>CTEs use <code>WITH</code> and make complex queries much more readable. Think of them as temporary named results.</p>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">WITH</span> user_totals <span class="kw">AS</span> (
    <span class="kw">SELECT</span> user_id,
           <span class="fn">SUM</span>(total) <span class="kw">AS</span> total_spent,
           <span class="fn">COUNT</span>(*) <span class="kw">AS</span> order_count
    <span class="kw">FROM</span> orders
    <span class="kw">GROUP BY</span> user_id
)
<span class="kw">SELECT</span> u.name, ut.total_spent, ut.order_count
<span class="kw">FROM</span> users u
<span class="kw">JOIN</span> user_totals ut <span class="kw">ON</span> u.id = ut.user_id
<span class="kw">WHERE</span> ut.total_spent > <span class="num">500</span>
<span class="kw">ORDER BY</span> ut.total_spent <span class="kw">DESC</span>;</code></pre></div>
<div class="callout callout-info"><div class="callout-title">💡 CTEs vs Subqueries</div>
<p>CTEs are preferred because they're more readable, can be referenced multiple times, and show maturity in interviews. A CTE is like defining a variable — you name it once and use it wherever needed.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Subqueries nest one query inside another. CTEs (WITH) name intermediate results for clarity and reusability.</p></div>`,
quiz:[{q:'What keyword starts a Common Table Expression?',opts:['FROM','WITH','SUBQUERY','DEFINE'],correct:1,explain:'CTEs start with the WITH keyword, followed by the name, AS, and the query.'}]},

{id:'s5',title:'Window Functions',sub:'Calculations across rows without collapsing them',
content:`<h2>Calculations Across Rows</h2>
<p>Window functions perform calculations across a set of rows <em>related to the current row</em>, without collapsing them like GROUP BY does.</p>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">-- ROW_NUMBER: rank rows within groups</span>
<span class="kw">SELECT</span> user_id, total,
    <span class="fn">ROW_NUMBER</span>() <span class="kw">OVER</span> (
        <span class="kw">PARTITION BY</span> user_id <span class="kw">ORDER BY</span> total <span class="kw">DESC</span>
    ) <span class="kw">AS</span> order_rank
<span class="kw">FROM</span> orders;

<span class="cmt">-- Running total</span>
<span class="kw">SELECT</span> created_at, total,
    <span class="fn">SUM</span>(total) <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> created_at) <span class="kw">AS</span> running_total
<span class="kw">FROM</span> orders;

<span class="cmt">-- LAG: access previous row's value</span>
<span class="kw">SELECT</span> total,
    <span class="fn">LAG</span>(total) <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> created_at) <span class="kw">AS</span> prev_order,
    total - <span class="fn">LAG</span>(total) <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> created_at) <span class="kw">AS</span> change
<span class="kw">FROM</span> orders;</code></pre></div>
<div class="tw"><table>
<tr><th>Function</th><th>Purpose</th></tr>
<tr><td><code>ROW_NUMBER()</code></td><td>Unique sequential number</td></tr>
<tr><td><code>RANK()</code></td><td>Rank with gaps for ties</td></tr>
<tr><td><code>DENSE_RANK()</code></td><td>Rank without gaps</td></tr>
<tr><td><code>LAG(col, n)</code></td><td>Value from n rows before</td></tr>
<tr><td><code>LEAD(col, n)</code></td><td>Value from n rows after</td></tr>
<tr><td><code>SUM() OVER</code></td><td>Running or partitioned sum</td></tr>
</table></div>
<div class="callout callout-info"><div class="callout-title">💡 GROUP BY vs Window Functions</div>
<p>GROUP BY collapses rows into summary rows. Window functions keep every row and add the calculation as a new column. If you need both detail and summary, use window functions.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Window functions (OVER, PARTITION BY) compute across related rows without losing detail. Essential for rankings, running totals, and comparing rows.</p></div>`,
quiz:[{q:'What is the key difference between GROUP BY and window functions?',opts:['No difference','GROUP BY collapses rows; window functions keep all rows','Window functions are faster','GROUP BY only uses COUNT'],correct:1,explain:'GROUP BY aggregates into summary groups. Window functions add computed columns while preserving all rows.'}]},

{id:'s6',title:'Transactions & ACID',sub:'Keeping data consistent with atomic operations',
content:`<h2>Keeping Data Consistent</h2>
<p>Imagine transferring money between bank accounts. You need to subtract from one and add to another. If the system crashes between steps, money vanishes. Transactions prevent this.</p>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">BEGIN</span>;
<span class="cmt">-- Transfer \$100 from Alice to Bob</span>
<span class="kw">UPDATE</span> accounts <span class="kw">SET</span> balance = balance - <span class="num">100</span> <span class="kw">WHERE</span> id = <span class="num">1</span>;
<span class="kw">UPDATE</span> accounts <span class="kw">SET</span> balance = balance + <span class="num">100</span> <span class="kw">WHERE</span> id = <span class="num">2</span>;
<span class="kw">COMMIT</span>;
<span class="cmt">-- Both succeed or neither does</span>

<span class="cmt">-- If something goes wrong:</span>
<span class="kw">ROLLBACK</span>;  <span class="cmt">-- Everything undone</span></code></pre></div>
<h3>ACID: The Four Guarantees</h3>
<div class="tw"><table>
<tr><th>Property</th><th>Meaning</th><th>Analogy</th></tr>
<tr><td><strong>A</strong>tomicity</td><td>All or nothing</td><td>Letter arrives fully or not at all</td></tr>
<tr><td><strong>C</strong>onsistency</td><td>Rules always hold</td><td>Illegal chess moves rejected</td></tr>
<tr><td><strong>I</strong>solation</td><td>Concurrent txs don't interfere</td><td>Parallel checkout lines</td></tr>
<tr><td><strong>D</strong>urability</td><td>Committed survives crashes</td><td>Permanent marker, not pencil</td></tr>
</table></div>
<div class="callout callout-info"><div class="callout-title">💡 Why ACID Matters</div>
<p>ACID is why banks, healthcare systems, and e-commerce platforms trust relational databases. Without it, you'd need complex error-recovery code for every database operation.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Transactions ensure multiple operations succeed or fail as a unit. Always wrap related operations — especially anything involving money or inventory.</p></div>`,
quiz:[{q:'What does the A in ACID stand for?',opts:['Availability','Atomicity','Accuracy','Aggregation'],correct:1,explain:'Atomicity means a transaction is treated as a single unit — all operations succeed or none do.'}]},

{id:'s7',title:'INSERT, UPDATE, DELETE',sub:'Creating, modifying, and removing data',
content:`<h2>Modifying Data</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">-- INSERT: create records (RETURNING gives you back the row)</span>
<span class="kw">INSERT INTO</span> users (name, email, age)
<span class="kw">VALUES</span> (<span class="str">'Alice'</span>, <span class="str">'alice@mail.com'</span>, <span class="num">28</span>)
<span class="kw">RETURNING</span> *;

<span class="cmt">-- Multiple inserts</span>
<span class="kw">INSERT INTO</span> users (name, email) <span class="kw">VALUES</span>
    (<span class="str">'Bob'</span>, <span class="str">'bob@mail.com'</span>),
    (<span class="str">'Carol'</span>, <span class="str">'carol@mail.com'</span>);

<span class="cmt">-- UPDATE: modify existing records</span>
<span class="kw">UPDATE</span> users <span class="kw">SET</span> age = <span class="num">29</span>
<span class="kw">WHERE</span> email = <span class="str">'alice@mail.com'</span>
<span class="kw">RETURNING</span> *;

<span class="cmt">-- DELETE: remove records</span>
<span class="kw">DELETE FROM</span> users <span class="kw">WHERE</span> id = <span class="num">5</span>;</code></pre></div>
<div class="callout callout-danger"><div class="callout-title">🚫 ALWAYS Use WHERE with UPDATE/DELETE</div>
<p>Without WHERE, <code>UPDATE</code> changes EVERY row and <code>DELETE</code> removes EVERY row. Always double-check. In production, many engineers do a SELECT first to verify which rows will be affected.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>INSERT creates rows. UPDATE modifies existing rows. DELETE removes rows. Always use WHERE with UPDATE and DELETE. Use RETURNING to get back affected rows.</p></div>`,
quiz:[{q:'What happens with DELETE FROM users (no WHERE)?',opts:['Deletes nothing','Deletes ALL rows','Only first row','Gives an error'],correct:1,explain:'Without WHERE, DELETE removes ALL rows from the table.'}]},

{id:'s8',title:'Views & Indexes',sub:'Saved queries and making things fast',
content:`<h2>Views: Saved Queries</h2>
<p>A <strong>view</strong> is a saved SELECT query that acts like a virtual table. It doesn't store data — it runs the query each time you access it.</p>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">CREATE VIEW</span> active_user_orders <span class="kw">AS</span>
<span class="kw">SELECT</span> u.name, u.email, o.id <span class="kw">AS</span> order_id, o.total
<span class="kw">FROM</span> users u
<span class="kw">JOIN</span> orders o <span class="kw">ON</span> u.id = o.user_id
<span class="kw">WHERE</span> u.is_active = <span class="kw">TRUE</span>;

<span class="cmt">-- Query the view like a table</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> active_user_orders <span class="kw">WHERE</span> total > <span class="num">100</span>;</code></pre></div>
<h2>Indexes: Making Queries Fast</h2>
<p>An <strong>index</strong> is like the index at the back of a book — instead of reading every page, you jump directly to the right one.</p>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">-- Single column index</span>
<span class="kw">CREATE INDEX</span> idx_users_email <span class="kw">ON</span> users (email);

<span class="cmt">-- Composite index (multiple columns)</span>
<span class="kw">CREATE INDEX</span> idx_orders_user_date
<span class="kw">ON</span> orders (user_id, created_at <span class="kw">DESC</span>);

<span class="cmt">-- Unique index (enforces uniqueness + speeds lookups)</span>
<span class="kw">CREATE UNIQUE INDEX</span> idx_users_email_uniq
<span class="kw">ON</span> users (email);</code></pre></div>
<div class="callout callout-warn"><div class="callout-title">⚠️ The Cost of Indexes</div>
<p>Indexes speed reads but slow writes (INSERT, UPDATE, DELETE must also update the index). Only index columns used in WHERE, JOIN, and ORDER BY. Start with primary keys and foreign keys.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Views simplify complex queries. Indexes speed up lookups at the cost of write performance. Use indexes strategically on frequently queried columns.</p></div>`,
quiz:[{q:'What is the trade-off of adding more indexes?',opts:['No extra space','Faster reads but slower writes','Slower reads','No trade-off'],correct:1,explain:'Indexes speed up read queries but add overhead to write operations because the index must be updated.'}]}
]},

/* ═══════════════════════════════════════════════
   SECTION 3 — POSTGRESQL DEEP DIVE
   ═══════════════════════════════════════════════ */
{id:'pg',title:'PostgreSQL Deep Dive',icon:'🐘',lessons:[
{id:'p1',title:'PostgreSQL Architecture',sub:'How PostgreSQL works under the hood',
content:`<h2>Process Model</h2>
<svg class="svg-diagram" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:var(--accent);stop-opacity:1" />
      <stop offset="100%" style="stop-color:var(--accent2);stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect x="50" y="20" width="120" height="40" rx="6" fill="url(#grad1)"/>
  <text x="110" y="45" fill="white" font-size="14" font-weight="bold" text-anchor="middle">Client Application</text>
  
  <path d="M 110 60 L 110 100" stroke="var(--text-sec)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="250" y="20" width="300" height="260" rx="8" fill="var(--bg-main)" stroke="var(--border)" stroke-width="2"/>
  <text x="400" y="45" fill="var(--text)" font-size="16" font-weight="bold" text-anchor="middle">PostgreSQL Server</text>
  
  <rect x="270" y="70" width="120" height="40" rx="6" fill="var(--bg-elevated)" stroke="var(--border)"/>
  <text x="330" y="95" fill="var(--text)" font-size="12" font-weight="bold" text-anchor="middle">Postmaster</text>
  
  <rect x="270" y="140" width="120" height="40" rx="6" fill="var(--bg-elevated)" stroke="var(--accent)"/>
  <text x="330" y="165" fill="var(--accent)" font-size="12" font-weight="bold" text-anchor="middle">Backend Process</text>
  
  <path d="M 330 110 L 330 140" stroke="var(--text-sec)" stroke-width="2" stroke-dasharray="4"/>
  <path d="M 110 100 L 110 160 L 270 160" stroke="var(--accent2)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="420" y="70" width="110" height="90" rx="6" fill="var(--bg-elevated)" stroke="var(--border)"/>
  <text x="475" y="95" fill="var(--text)" font-size="12" font-weight="bold" text-anchor="middle">Shared Memory</text>
  <rect x="430" y="110" width="90" height="20" rx="4" fill="var(--bg-hover)"/>
  <text x="475" y="124" fill="var(--text-sec)" font-size="10" text-anchor="middle">Shared Buffers</text>
  <rect x="430" y="135" width="90" height="20" rx="4" fill="var(--bg-hover)"/>
  <text x="475" y="149" fill="var(--text-sec)" font-size="10" text-anchor="middle">WAL Buffers</text>
  
  <path d="M 390 160 L 420 160" stroke="var(--text-sec)" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  
  <rect x="270" y="210" width="260" height="50" rx="6" fill="var(--bg-elevated)" stroke="var(--border)"/>
  <text x="400" y="230" fill="var(--text)" font-size="12" font-weight="bold" text-anchor="middle">Disk Storage</text>
  <text x="400" y="248" fill="var(--text-sec)" font-size="10" text-anchor="middle">Data Files &amp; WAL Files</text>
  
  <path d="M 475 160 L 475 210" stroke="var(--text-sec)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="var(--text-sec)" />
    </marker>
  </defs>
</svg>
<p>PostgreSQL uses a <strong>process-per-connection</strong> model. When a client connects, PostgreSQL forks a new process (a "backend process") to handle that connection.</p>
<h3>Key Components</h3>
<ul>
<li><strong>Postmaster</strong> — main process that accepts connections and forks backends</li>
<li><strong>Shared Buffers</strong> — memory area caching data pages (default 128MB)</li>
<li><strong>WAL (Write-Ahead Log)</strong> — logs all changes before applying them. Enables crash recovery.</li>
<li><strong>Background Workers</strong> — autovacuum, stats collection, replication</li>
</ul>
<h3>How a Query Gets Executed</h3>
<ol>
<li><strong>Parser</strong> — checks SQL syntax</li>
<li><strong>Rewriter</strong> — applies rules/views</li>
<li><strong>Planner/Optimizer</strong> — finds the cheapest execution plan</li>
<li><strong>Executor</strong> — runs the plan and returns results</li>
</ol>
<div class="callout callout-info"><div class="callout-title">💡 Why This Matters</div>
<p>Process-per-connection means each connection uses ~5-10MB RAM. With 1000 concurrent users, that's 10GB just for connections. This is why <strong>connection pooling</strong> is essential.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>PostgreSQL uses process-per-connection with shared buffers for caching and WAL for crash recovery. The query planner optimizes every query before executing it.</p></div>`,
quiz:[{q:'What does WAL stand for?',opts:['Write-After Logging','Write-Ahead Log','Wide Area Lookup','Web Access Layer'],correct:1,explain:'Write-Ahead Log ensures changes are logged before being applied, enabling crash recovery.'}]},

{id:'p2',title:'MVCC & Isolation Levels',sub:'How PostgreSQL handles concurrent reads and writes',
content:`<h2>MVCC: Multi-Version Concurrency Control</h2>
<p>Instead of locking rows during reads, PostgreSQL keeps <strong>multiple versions</strong> of each row. When you update a row, PostgreSQL creates a new version. Readers see the old version; the writer sees the new one.</p>
<div class="callout callout-info"><div class="callout-title">💡 Analogy</div>
<p>Imagine a shared document where each person sees a snapshot at the moment they opened it. Changes by others don't affect your view until you refresh. No locking needed.</p></div>
<h3>Isolation Levels</h3>
<div class="tw"><table>
<tr><th>Level</th><th>What You See</th><th>Use When</th></tr>
<tr><td><code>READ COMMITTED</code> (default)</td><td>Only committed data</td><td>Most applications</td></tr>
<tr><td><code>REPEATABLE READ</code></td><td>Snapshot from start of tx</td><td>Consistent reads needed</td></tr>
<tr><td><code>SERIALIZABLE</code></td><td>As if txs ran one at a time</td><td>Complex invariants</td></tr>
</table></div>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">BEGIN</span>;
<span class="kw">SET TRANSACTION ISOLATION LEVEL SERIALIZABLE</span>;
<span class="cmt">-- your queries here</span>
<span class="kw">COMMIT</span>;</code></pre></div>
<div class="callout callout-warn"><div class="callout-title">⚠️ Default Is Enough (Usually)</div>
<p>READ COMMITTED works for most apps. Only use SERIALIZABLE when you have complex invariants that concurrent transactions could violate.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>MVCC lets readers and writers work without blocking each other by keeping multiple row versions. READ COMMITTED is the practical default.</p></div>`,
quiz:[{q:'How does MVCC prevent readers from blocking writers?',opts:['By using locks','By keeping multiple row versions','By queuing operations','By allowing one tx at a time'],correct:1,explain:'MVCC maintains multiple versions so readers see consistent snapshots without locks.'}]},

{id:'p3',title:'Index Types Deep Dive',sub:'B-tree, GIN, GiST and composite indexes',
content:`<h2>PostgreSQL Index Types</h2>
<div class="tw"><table>
<tr><th>Type</th><th>Best For</th><th>Created How</th></tr>
<tr><td><code>B-tree</code> (default)</td><td>Equality, range, sort</td><td><code>CREATE INDEX</code></td></tr>
<tr><td><code>GIN</code></td><td>JSONB, arrays, full-text</td><td><code>USING GIN</code></td></tr>
<tr><td><code>GiST</code></td><td>Geometric, range types</td><td><code>USING GiST</code></td></tr>
<tr><td><code>Hash</code></td><td>Pure equality (rare)</td><td><code>USING HASH</code></td></tr>
</table></div>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">-- GIN index for JSONB queries</span>
<span class="kw">CREATE INDEX</span> idx_metadata <span class="kw">ON</span> users <span class="kw">USING GIN</span> (metadata);

<span class="cmt">-- Composite index (column order matters!)</span>
<span class="kw">CREATE INDEX</span> idx_orders_comp
<span class="kw">ON</span> orders (user_id, status, created_at <span class="kw">DESC</span>);
<span class="cmt">-- Works for: WHERE user_id=1</span>
<span class="cmt">-- Works for: WHERE user_id=1 AND status='active'</span>
<span class="cmt">-- WON'T help: WHERE status='active' (alone)</span></code></pre></div>
<div class="callout callout-warn"><div class="callout-title">⚠️ Column Order Matters!</div>
<p>In composite index (a, b, c), it works for queries on (a), (a,b), or (a,b,c) — but NOT for (b) alone or (b,c). Put the most-filtered column first.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>B-tree for most cases. GIN for JSONB and arrays. Composite indexes: most selective column first. Always verify with EXPLAIN ANALYZE.</p></div>`,
quiz:[{q:'Which index type is best for JSONB queries?',opts:['B-tree','Hash','GIN','GiST'],correct:2,explain:'GIN is designed for composite values like JSONB, arrays, and full-text search.'}]},

{id:'p4',title:'EXPLAIN ANALYZE',sub:'Reading and understanding query execution plans',
content:`<h2>Reading Query Plans</h2>
<p><code>EXPLAIN ANALYZE</code> is your most powerful tool for understanding and optimizing queries.</p>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">EXPLAIN ANALYZE</span>
<span class="kw">SELECT</span> u.name, <span class="fn">COUNT</span>(o.id)
<span class="kw">FROM</span> users u
<span class="kw">JOIN</span> orders o <span class="kw">ON</span> u.id = o.user_id
<span class="kw">WHERE</span> u.is_active = <span class="kw">TRUE</span>
<span class="kw">GROUP BY</span> u.name;</code></pre></div>
<div class="tw"><table>
<tr><th>Node Type</th><th>What It Means</th><th>Good/Bad?</th></tr>
<tr><td><code>Seq Scan</code></td><td>Reads every row</td><td>Bad on large tables</td></tr>
<tr><td><code>Index Scan</code></td><td>Uses an index</td><td>Good</td></tr>
<tr><td><code>Index Only Scan</code></td><td>Reads only from index</td><td>Best</td></tr>
<tr><td><code>Hash Join</code></td><td>Hash table for joining</td><td>Good for large data</td></tr>
<tr><td><code>Nested Loop</code></td><td>For each in A, scan B</td><td>Bad if outer is large</td></tr>
</table></div>
<div class="callout callout-info"><div class="callout-title">💡 Pro Tip</div>
<p>Use <code>EXPLAIN (ANALYZE, BUFFERS)</code> for the most detail. BUFFERS shows disk vs cache reads.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>EXPLAIN ANALYZE shows how PostgreSQL executes your query. Look for Seq Scans on large tables and add indexes to eliminate them.</p></div>`,
quiz:[{q:'Which scan type reads every row in a table?',opts:['Index Scan','Index Only Scan','Seq Scan','Bitmap Scan'],correct:2,explain:'Sequential Scan reads every row. On large tables, this usually indicates a missing index.'}]},

{id:'p5',title:'Performance Tuning',sub:'Configuration, vacuum, and query optimization',
content:`<h2>Key Configuration</h2>
<div class="tw"><table>
<tr><th>Setting</th><th>Default</th><th>Recommended</th><th>Purpose</th></tr>
<tr><td><code>shared_buffers</code></td><td>128MB</td><td>25% of RAM</td><td>Data cache</td></tr>
<tr><td><code>work_mem</code></td><td>4MB</td><td>16-64MB</td><td>Sort/hash memory</td></tr>
<tr><td><code>effective_cache_size</code></td><td>4GB</td><td>75% of RAM</td><td>Planner hints</td></tr>
<tr><td><code>maintenance_work_mem</code></td><td>64MB</td><td>256MB-1GB</td><td>VACUUM, CREATE INDEX</td></tr>
</table></div>
<h3>Query Optimization Tips</h3>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">-- 1. Select only what you need</span>
<span class="kw">SELECT</span> id, name <span class="kw">FROM</span> users;  <span class="cmt">-- Good</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> users;          <span class="cmt">-- Wasteful</span>

<span class="cmt">-- 2. Use EXISTS instead of IN for subqueries</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> users u
<span class="kw">WHERE EXISTS</span> (
    <span class="kw">SELECT</span> <span class="num">1</span> <span class="kw">FROM</span> orders o <span class="kw">WHERE</span> o.user_id = u.id
);

<span class="cmt">-- 3. Avoid functions on indexed columns</span>
<span class="cmt">-- BAD: can't use index</span>
<span class="kw">WHERE</span> <span class="fn">LOWER</span>(email) = <span class="str">'alice@mail.com'</span>;
<span class="cmt">-- GOOD: functional index</span>
<span class="kw">CREATE INDEX</span> idx_email_lower <span class="kw">ON</span> users (<span class="fn">LOWER</span>(email));

<span class="cmt">-- 4. Monitor table bloat (dead rows from MVCC)</span>
<span class="kw">SELECT</span> relname, n_dead_tup, n_live_tup
<span class="kw">FROM</span> pg_stat_user_tables
<span class="kw">WHERE</span> n_dead_tup > <span class="num">10000</span>;</code></pre></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Tune shared_buffers (25% RAM). Use EXISTS over IN. Avoid functions on indexed columns. Trust autovacuum but monitor it.</p></div>`,
quiz:[{q:'What percentage of RAM should shared_buffers typically be?',opts:['5%','25%','75%','100%'],correct:1,explain:'General recommendation: ~25% of total system RAM for shared_buffers.'}]},

{id:'p6',title:'JSONB & Full-Text Search',sub:'PostgreSQL is more than just relational tables',
content:`<h2>JSONB: Flexible Schema</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">CREATE TABLE</span> events (
    id <span class="type">SERIAL</span> <span class="kw">PRIMARY KEY</span>,
    data <span class="type">JSONB</span> <span class="kw">NOT NULL</span>
);

<span class="kw">INSERT INTO</span> events (data) <span class="kw">VALUES</span>
(<span class="str">'{"type": "click", "page": "/pricing", "user_id": 42}'</span>);

<span class="cmt">-- Query JSONB with ->> (get text value)</span>
<span class="kw">SELECT</span> data->><span class="str">'type'</span> <span class="kw">AS</span> event_type <span class="kw">FROM</span> events;

<span class="cmt">-- Containment check with @></span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> events
<span class="kw">WHERE</span> data @> <span class="str">'{"type": "click"}'</span>;

<span class="cmt">-- GIN index for fast JSONB queries</span>
<span class="kw">CREATE INDEX</span> idx_events_data <span class="kw">ON</span> events <span class="kw">USING GIN</span> (data);</code></pre></div>
<h2>Full-Text Search</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">-- Add search vector column</span>
<span class="kw">ALTER TABLE</span> articles
<span class="kw">ADD COLUMN</span> search_vector <span class="type">tsvector</span>;

<span class="cmt">-- Populate from title + body</span>
<span class="kw">UPDATE</span> articles <span class="kw">SET</span> search_vector =
    <span class="fn">to_tsvector</span>(<span class="str">'english'</span>, title || <span class="str">' '</span> || body);

<span class="cmt">-- GIN index for fast search</span>
<span class="kw">CREATE INDEX</span> idx_fts <span class="kw">ON</span> articles <span class="kw">USING GIN</span> (search_vector);

<span class="cmt">-- Search!</span>
<span class="kw">SELECT</span> title, <span class="fn">ts_rank</span>(search_vector, query) <span class="kw">AS</span> relevance
<span class="kw">FROM</span> articles,
     <span class="fn">to_tsquery</span>(<span class="str">'english'</span>, <span class="str">'database & postgres'</span>) query
<span class="kw">WHERE</span> search_vector @@ query
<span class="kw">ORDER BY</span> relevance <span class="kw">DESC</span>;</code></pre></div>
<div class="callout callout-info"><div class="callout-title">💡 When to Use JSONB vs Columns</div>
<p>JSONB for truly flexible data (settings, event payloads, API responses). Regular columns for data you frequently query, constrain, or join on. Don't use JSONB as an excuse to avoid schema design.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>JSONB stores flexible data with @> and ->> operators. Full-text search uses tsvector + tsquery with GIN indexes. Both eliminate the need for separate tools.</p></div>`,
quiz:[{q:'Which operator checks if JSONB contains a specific value?',opts:['->>','@@','@>','||'],correct:2,explain:'The @> (containment) operator checks if the left JSONB value contains all keys from the right.'}]},

{id:'p7',title:'Backup & Recovery',sub:'Protecting your data with proper backup strategies',
content:`<h2>Backup Strategies</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">Bash</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt"># Logical backup (SQL statements)</span>
pg_dump -U postgres -d mydb -f backup.sql

<span class="cmt"># Custom format (compressed, selective restore)</span>
pg_dump -U postgres -Fc -d mydb -f backup.dump

<span class="cmt"># Restore</span>
psql -U postgres -d mydb < backup.sql
pg_restore -U postgres -d mydb backup.dump

<span class="cmt"># Physical backup (for large databases + PITR)</span>
pg_basebackup -U postgres -D /backup/base -Ft -z</code></pre></div>
<div class="tw"><table>
<tr><th>Method</th><th>Pros</th><th>Best For</th></tr>
<tr><td><code>pg_dump</code></td><td>Simple, portable</td><td>Small-medium databases</td></tr>
<tr><td><code>pg_basebackup</code></td><td>Fast, supports PITR</td><td>Production databases</td></tr>
<tr><td>WAL archiving</td><td>Point-in-time recovery</td><td>Mission-critical systems</td></tr>
</table></div>
<div class="callout callout-danger"><div class="callout-title">🚫 Don't Be That Person</div>
<p>A backup you can't restore is not a backup. Test your restore process regularly. The most common mistake is setting up backups but never testing restoration.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Use pg_dump for simple backups, pg_basebackup + WAL archiving for production PITR. Always test restoration.</p></div>`,
quiz:[{q:'Which tool supports point-in-time recovery?',opts:['pg_dump','pg_basebackup with WAL archiving','COPY command','pgAdmin export'],correct:1,explain:'PITR requires a base backup plus continuous WAL archiving.'}]}
]},

/* ═══════════════════════════════════════════════
   SECTION 4 — DATABASE DESIGN
   ═══════════════════════════════════════════════ */
{id:'design',title:'Database Design',icon:'📐',lessons:[
{id:'d1',title:'Normalization (1NF, 2NF, 3NF)',sub:'Organizing data to reduce redundancy and improve integrity',
content:`<h2>Normalization</h2>
<p>Normalization organizes tables to minimize data redundancy. The simple rule: if you're copying the same data into multiple rows, split it into a separate table.</p>
<h3>1NF: Atomic Values</h3>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">-- ❌ BAD: violates 1NF</span>
phones <span class="type">VARCHAR</span>(<span class="num">200</span>)  <span class="cmt">-- "555-1234, 555-5678"</span>

<span class="cmt">-- ✅ GOOD: 1NF</span>
<span class="kw">CREATE TABLE</span> student_phones (
    student_id <span class="type">INTEGER</span> <span class="kw">REFERENCES</span> students(id),
    phone <span class="type">VARCHAR</span>(<span class="num">20</span>),
    <span class="kw">PRIMARY KEY</span> (student_id, phone)
);</code></pre></div>
<h3>3NF: No Transitive Dependencies</h3>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="cmt">-- ❌ BAD: city depends on zip, not on id</span>
city <span class="type">VARCHAR</span>(<span class="num">100</span>)  <span class="cmt">-- transitive dependency</span>

<span class="cmt">-- ✅ GOOD: 3NF</span>
<span class="kw">CREATE TABLE</span> zip_codes (
    zip <span class="type">VARCHAR</span>(<span class="num">10</span>) <span class="kw">PRIMARY KEY</span>,
    city <span class="type">VARCHAR</span>(<span class="num">100</span>)
);</code></pre></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Normalize first: 1NF = atomic values, 3NF = no transitive dependencies. Denormalize only when performance demands it.</p></div>`,
quiz:[{q:'Which normal form eliminates transitive dependencies?',opts:['1NF','2NF','3NF','BCNF'],correct:2,explain:'3NF requires no non-key column depends on another non-key column.'}]},

{id:'d2',title:'Denormalization',sub:'When speed wins over purity',
content:`<h2>Breaking the Rules Strategically</h2>
<h3>Materialized Views</h3>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">CREATE MATERIALIZED VIEW</span> monthly_revenue <span class="kw">AS</span>
<span class="kw">SELECT</span>
    <span class="fn">DATE_TRUNC</span>(<span class="str">'month'</span>, created_at) <span class="kw">AS</span> month,
    <span class="fn">SUM</span>(total) <span class="kw">AS</span> revenue, <span class="fn">COUNT</span>(*) <span class="kw">AS</span> orders
<span class="kw">FROM</span> orders <span class="kw">GROUP BY</span> <span class="num">1</span>;

<span class="kw">REFRESH MATERIALIZED VIEW</span> monthly_revenue;</code></pre></div>
<div class="callout callout-warn"><div class="callout-title">⚠️ Golden Rule</div>
<p>Normalize first. Only denormalize when you have a <strong>proven</strong> performance problem.</p></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Materialized views store expensive query results on disk. Denormalization trades write complexity for read speed.</p></div>`,
quiz:[{q:'When should you denormalize?',opts:['Always','Only after proven performance bottlenecks','Never','When first designing'],correct:1,explain:'Start normalized. Only denormalize when specific queries are too slow for indexes.'}]},

{id:'d3',title:'Soft Deletes & Audit Logs',sub:'Never actually deleting data in production',
content:`<h2>Soft Deletes</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">ALTER TABLE</span> users
<span class="kw">ADD COLUMN</span> deleted_at <span class="type">TIMESTAMP</span> <span class="kw">DEFAULT NULL</span>;

<span class="cmt">-- Soft delete</span>
<span class="kw">UPDATE</span> users <span class="kw">SET</span> deleted_at = <span class="fn">NOW</span>() <span class="kw">WHERE</span> id = <span class="num">42</span>;

<span class="cmt">-- Query only active</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> users <span class="kw">WHERE</span> deleted_at <span class="kw">IS NULL</span>;

<span class="cmt">-- Partial index (only active rows)</span>
<span class="kw">CREATE INDEX</span> idx_active <span class="kw">ON</span> users (id) <span class="kw">WHERE</span> deleted_at <span class="kw">IS NULL</span>;</code></pre></div>
<h2>Audit Logs</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">CREATE TABLE</span> audit_logs (
    id <span class="type">BIGSERIAL</span> <span class="kw">PRIMARY KEY</span>,
    table_name <span class="type">VARCHAR</span>(<span class="num">100</span>), record_id <span class="type">INTEGER</span>,
    action <span class="type">VARCHAR</span>(<span class="num">10</span>),  <span class="cmt">-- INSERT/UPDATE/DELETE</span>
    old_data <span class="type">JSONB</span>, new_data <span class="type">JSONB</span>,
    changed_by <span class="type">INTEGER</span>, changed_at <span class="type">TIMESTAMP</span> <span class="kw">DEFAULT</span> <span class="fn">NOW</span>()
);</code></pre></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Use deleted_at for soft deletes. Audit logs track who changed what. Both are standard in production SaaS.</p></div>`,
quiz:[{q:'What is the standard column pattern for soft deletes?',opts:['is_deleted BOOLEAN','deleted_at TIMESTAMP','Any work, but TIMESTAMP records when'],correct:2,explain:'TIMESTAMP is most common because it records when deletion happened and works with IS NULL.'}]},

{id:'d4',title:'Multi-Tenant Design',sub:'One database, many customers',
content:`<h2>Multi-Tenancy</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">CREATE TABLE</span> products (
    id <span class="type">SERIAL</span> <span class="kw">PRIMARY KEY</span>,
    tenant_id <span class="type">INTEGER</span> <span class="kw">NOT NULL REFERENCES</span> tenants(id),
    name <span class="type">VARCHAR</span>(<span class="num">200</span>), price <span class="type">DECIMAL</span>(<span class="num">10</span>,<span class="num">2</span>)
);
<span class="kw">CREATE INDEX</span> idx_tenant <span class="kw">ON</span> products (tenant_id);

<span class="cmt">-- Row-Level Security (defense in depth)</span>
<span class="kw">ALTER TABLE</span> products <span class="kw">ENABLE ROW LEVEL SECURITY</span>;
<span class="kw">CREATE POLICY</span> tenant_isolation <span class="kw">ON</span> products
<span class="kw">USING</span> (tenant_id = <span class="fn">current_setting</span>(<span class="str">'app.tenant_id'</span>)::<span class="type">INTEGER</span>);</code></pre></div>
<div class="tw"><table>
<tr><th>Strategy</th><th>Isolation</th><th>Best For</th></tr>
<tr><td>Shared schema + tenant_id</td><td>Low</td><td>Most SaaS apps</td></tr>
<tr><td>Separate schemas</td><td>Medium</td><td>Custom per-tenant</td></tr>
<tr><td>Separate databases</td><td>High</td><td>Regulated industries</td></tr>
</table></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>Shared schema + tenant_id + Row-Level Security is the pragmatic choice for most SaaS. Always index tenant_id.</p></div>`,
quiz:[{q:'Most common multi-tenancy strategy?',opts:['Separate databases','Shared schema with tenant_id','No separation','File-based'],correct:1,explain:'Shared schema with tenant_id is cost-effective and scales well.'}]},

{id:'d5',title:'RBAC Schema',sub:'Role-based access control database design',
content:`<h2>RBAC Schema</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">CREATE TABLE</span> roles (
    id <span class="type">SERIAL</span> <span class="kw">PRIMARY KEY</span>,
    name <span class="type">VARCHAR</span>(<span class="num">50</span>) <span class="kw">UNIQUE NOT NULL</span>
);
<span class="kw">CREATE TABLE</span> permissions (
    id <span class="type">SERIAL</span> <span class="kw">PRIMARY KEY</span>,
    name <span class="type">VARCHAR</span>(<span class="num">100</span>) <span class="kw">UNIQUE NOT NULL</span>
);
<span class="kw">CREATE TABLE</span> role_permissions (
    role_id <span class="type">INTEGER</span> <span class="kw">REFERENCES</span> roles(id),
    permission_id <span class="type">INTEGER</span> <span class="kw">REFERENCES</span> permissions(id),
    <span class="kw">PRIMARY KEY</span> (role_id, permission_id)
);
<span class="kw">CREATE TABLE</span> user_roles (
    user_id <span class="type">INTEGER</span> <span class="kw">REFERENCES</span> users(id),
    role_id <span class="type">INTEGER</span> <span class="kw">REFERENCES</span> roles(id),
    <span class="kw">PRIMARY KEY</span> (user_id, role_id)
);</code></pre></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>RBAC: users → user_roles → roles → role_permissions → permissions. Five tables for complete access control.</p></div>`,
quiz:[{q:'How do you check if a user has a permission?',opts:['Only users and permissions','Join user_roles → roles → role_permissions → permissions','Only roles','Direct lookup'],correct:1,explain:'Traverse through user_roles and role_permissions to connect users to permissions.'}]},

{id:'d6',title:'SaaS Architecture Patterns',sub:'Subscriptions, feature flags, and usage metering',
content:`<h2>SaaS Tables</h2>
<div class="cb"><div class="cb-h"><span class="cb-l">SQL</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
<pre><code><span class="kw">CREATE TABLE</span> plans (
    id <span class="type">SERIAL</span> <span class="kw">PRIMARY KEY</span>,
    name <span class="type">VARCHAR</span>(<span class="num">50</span>), price_monthly <span class="type">DECIMAL</span>(<span class="num">10</span>,<span class="num">2</span>),
    features <span class="type">JSONB</span> <span class="kw">DEFAULT</span> <span class="str">'{}'</span>
);
<span class="kw">CREATE TABLE</span> subscriptions (
    id <span class="type">SERIAL</span> <span class="kw">PRIMARY KEY</span>,
    tenant_id <span class="type">INTEGER</span>, plan_id <span class="type">INTEGER</span>,
    status <span class="type">VARCHAR</span>(<span class="num">20</span>) <span class="kw">DEFAULT</span> <span class="str">'active'</span>,
    expires_at <span class="type">TIMESTAMP</span>
);
<span class="kw">CREATE TABLE</span> usage_events (
    id <span class="type">BIGSERIAL</span> <span class="kw">PRIMARY KEY</span>,
    tenant_id <span class="type">INTEGER</span>, event_type <span class="type">VARCHAR</span>(<span class="num">50</span>),
    quantity <span class="type">INTEGER</span> <span class="kw">DEFAULT</span> <span class="num">1</span>,
    created_at <span class="type">TIMESTAMP</span> <span class="kw">DEFAULT</span> <span class="fn">NOW</span>()
);</code></pre></div>
<div class="callout callout-success"><div class="callout-title">✅ Key Takeaway</div>
<p>SaaS databases need plans, subscriptions, feature flags, and usage metering. JSONB for flexible configs.</p></div>`,
