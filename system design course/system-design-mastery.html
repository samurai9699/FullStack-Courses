  {
    id:7,
    tag:'APIs & Communication',
    title:'API Design: REST, GraphQL & gRPC',
    desc:'How services talk to each other and to clients — and when to choose which protocol.',
    content:`
<h2>The API Layer</h2>
<p>APIs are the contracts between systems. Choose the wrong protocol and you pay a tax on every interaction — in latency, payload size, developer experience, or flexibility. Choose correctly and communication becomes invisible.</p>

<h2>REST — The Workhorse</h2>
<p>REST (Representational State Transfer) uses HTTP methods (GET, POST, PUT, PATCH, DELETE) and resource-based URLs. It's the dominant style for public APIs and client-server communication.</p>

<h3>REST Design Principles</h3>
<ul>
  <li><strong>Resources, not actions</strong>: <code>/users/42</code> not <code>/getUser?id=42</code></li>
  <li><strong>HTTP verbs carry intent</strong>: GET=read, POST=create, PUT=replace, PATCH=update, DELETE=remove</li>
  <li><strong>Stateless</strong>: Each request carries all needed context (auth token, etc.)</li>
  <li><strong>Status codes matter</strong>: 200/201/204 success. 400 client error. 401 unauth. 403 forbidden. 404 not found. 409 conflict. 422 validation. 429 rate limited. 500 server error.</li>
</ul>

<div class="code-block">
  <div class="code-label">REST API — Pylaxis Compliance Endpoints</div>
  <pre><span class="cm"># Good REST design</span>
GET    /api/v1/manufacturers              <span class="cm"># List manufacturers</span>
POST   /api/v1/manufacturers              <span class="cm"># Create manufacturer</span>
GET    /api/v1/manufacturers/:id          <span class="cm"># Get one</span>
PATCH  /api/v1/manufacturers/:id          <span class="cm"># Partial update</span>
DELETE /api/v1/manufacturers/:id          <span class="cm"># Delete</span>

GET    /api/v1/manufacturers/:id/products <span class="cm"># Nested resource</span>

<span class="cm"># Filtering, pagination, sorting via query params</span>
GET /api/v1/products?status=compliant&page=2&limit=20&sort=-created_at</pre>
</div>

<h3>REST Versioning</h3>
<p>APIs change. Versioning prevents breaking existing clients. Three common strategies:</p>
<ul>
  <li><strong>URL versioning</strong>: <code>/api/v1/</code> → <code>/api/v2/</code>. Most explicit, easiest to route. Most common.</li>
  <li><strong>Header versioning</strong>: <code>Accept: application/vnd.pylaxis.v2+json</code>. Cleaner URLs, harder to test in browser.</li>
  <li><strong>Query param</strong>: <code>?version=2</code>. Easiest to implement, considered bad practice.</li>
</ul>

<h2>GraphQL — Flexible Queries</h2>
<p>GraphQL lets clients request exactly the fields they need in a single request. One endpoint, client-controlled queries. Solves over-fetching (too much data) and under-fetching (multiple roundtrips).</p>

<div class="code-block">
  <div class="code-label">GraphQL Query Example</div>
  <pre><span class="cm"># Client requests exactly what it needs</span>
query <span class="fn">GetManufacturer</span>($id: ID!) {
  manufacturer(id: $id) {
    name
    complianceStatus
    products {        <span class="cm"># Nested in one request (no N+1 with DataLoader)</span>
      id
      batteryRegId
      passportStatus
    }
  }
}

<span class="cm"># Response only has requested fields — no over-fetching</span></pre>
</div>

<h3>GraphQL Trade-offs</h3>
<table class="compare-table">
  <tr><th></th><th>GraphQL</th><th>REST</th></tr>
  <tr><td>Flexibility</td><td><span class="tag tag-green">High</span> — client controls shape</td><td><span class="tag tag-blue">Fixed</span> — server defines response</td></tr>
  <tr><td>Caching</td><td><span class="tag tag-red">Hard</span> — POST queries aren't cacheable by default</td><td><span class="tag tag-green">Easy</span> — HTTP cache + CDN</td></tr>
  <tr><td>N+1 Problem</td><td>Requires DataLoader (batching)</td><td>Controlled by server</td></tr>
  <tr><td>Learning Curve</td><td>Higher — schema, resolvers</td><td>Lower — just HTTP</td></tr>
  <tr><td>Best For</td><td>Complex UIs, mobile (save bandwidth)</td><td>Public APIs, simple services</td></tr>
</table>

<h2>gRPC — High Performance Internal APIs</h2>
<p>gRPC uses Protocol Buffers (binary serialization) over HTTP/2. It's <strong>10x smaller payload, streaming support, and type-safe contracts</strong>. The standard for internal microservice communication at Google, Netflix, and Uber.</p>

<div class="code-block">
  <div class="code-label">Protocol Buffer Definition</div>
  <pre><span class="cm">// compliance.proto</span>
syntax = <span class="str">"proto3"</span>;

<span class="kw">service</span> <span class="type">ComplianceService</span> {
  rpc <span class="fn">CheckCompliance</span>(ComplianceRequest) <span class="kw">returns</span> (ComplianceResponse);
  rpc <span class="fn">StreamUpdates</span>(StreamRequest) <span class="kw">returns</span> <span class="kw">stream</span> StatusUpdate;
}

<span class="kw">message</span> <span class="type">ComplianceRequest</span> {
  string product_id = <span class="num">1</span>;
  string regulation = <span class="num">2</span>;
}

<span class="kw">message</span> <span class="type">ComplianceResponse</span> {
  bool is_compliant = <span class="num">1</span>;
  repeated string missing_fields = <span class="num">2</span>;
  int64 checked_at = <span class="num">3</span>;
}</pre>
</div>

<h2>WebSockets — Real-time Bidirectional</h2>
<p>WebSockets maintain a persistent connection between client and server, enabling real-time push updates. Use for: live dashboards, chat, collaborative editing, live notifications.</p>

<div class="diagram">
  <div class="diagram-title">HTTP vs WebSocket Communication</div>
<pre>
HTTP (Request-Response):
  Client ──GET /data──► Server
  Client ◄──200 OK────  Server
  Client ──GET /data──► Server   (must poll for updates)

WebSocket (Full-duplex):
  Client ──Upgrade request──► Server
  Client ◄──101 Switching──   Server
  ═══════ Persistent connection ═══════
  Server ──► Client  (push any time)
  Client ──► Server  (send any time)
  ═════════════════════════════════════
</pre>
</div>

<div class="callout interview">
<div class="callout-title">🎙️ When to Use What</div>
<strong>REST</strong>: Public APIs, CRUD operations, simple client-server. <strong>GraphQL</strong>: Complex frontends needing flexible data, mobile apps with bandwidth constraints. <strong>gRPC</strong>: Internal microservices, streaming, high-performance backends. <strong>WebSocket</strong>: Anything that needs real-time push (chat, live updates, collaborative tools).
</div>

<div class="quiz-section">
  <div class="quiz-title">⚡ Knowledge Check</div>
  <div class="quiz-subtitle">API design decisions.</div>
  <div class="quiz-q" data-answer="2">
    <div class="quiz-question">Pylaxis has a React dashboard that fetches manufacturer data + their products + compliance status all at once. REST requires 3 API calls. What's the best alternative?</div>
    <div class="quiz-options">
      <div class="quiz-opt" onclick="answerQuiz(this,0)"><span class="quiz-opt-letter">A</span>gRPC — binary protocol is faster</div>
      <div class="quiz-opt" onclick="answerQuiz(this,1)"><span class="quiz-opt-letter">B</span>WebSocket — persistent connection</div>
      <div class="quiz-opt" onclick="answerQuiz(this,2)"><span class="quiz-opt-letter">C</span>GraphQL — client specifies exact data needed in one request</div>
      <div class="quiz-opt" onclick="answerQuiz(this,3)"><span class="quiz-opt-letter">D</span>Batch REST endpoint that returns everything</div>
    </div>
    <div class="quiz-explanation">GraphQL is designed for exactly this scenario — the "under-fetching" problem where multiple round trips are needed. The client declares the shape of data it needs. gRPC would work too but is better for internal services, not browser clients. The batch REST endpoint is valid but inflexible and custom per use-case.</div>
  </div>
</div>
`
  },

  // ===================== MODULE 8 =====================
  {
    id:8,
    tag:'Reliability',
    title:'Fault Tolerance, Resilience & Observability',
    desc:'Systems fail. The question is whether you built yours to fail gracefully — and whether you can see it failing.',
    content:`
<h2>Everything Fails</h2>
<p>At scale, everything fails: networks partition, disks fill up, memory leaks grow, dependencies go down, deployments introduce bugs. Resilient systems expect failure and are designed to <strong>degrade gracefully</strong> rather than catastrophically.</p>

<h2>Circuit Breaker Pattern</h2>
<p>Prevent cascading failures. When a service is failing, stop calling it immediately rather than flooding it with requests that will all fail anyway. Like a physical circuit breaker — trips on overload, resets when clear.</p>

<div class="diagram">
  <div class="diagram-title">Circuit Breaker State Machine</div>
<pre>
         ┌──── Requests succeed ────────────────────┐
         │                                          │
CLOSED ──┴── [Normal operation] ──fail threshold──► OPEN
                                                     │
                                              timeout period
                                                     │
                                                     ▼
                                               HALF-OPEN
                                           [Allow 1 test request]
                                                     │
                                    ┌────────────────┴──────────────┐
                                  fail                           success
                                    │                               │
                                    ▼                               ▼
                                  OPEN                           CLOSED
</pre>
</div>

<div class="code-block">
  <div class="code-label">Circuit Breaker — TypeScript Implementation</div>
  <pre><span class="kw">class</span> <span class="type">CircuitBreaker</span> {
  <span class="kw">private</span> failures = <span class="num">0</span>;
  <span class="kw">private</span> state: <span class="str">'CLOSED'</span> | <span class="str">'OPEN'</span> | <span class="str">'HALF_OPEN'</span> = <span class="str">'CLOSED'</span>;
  <span class="kw">private</span> nextAttempt = <span class="num">0</span>;

  <span class="kw">async</span> <span class="fn">call</span>&lt;T&gt;(fn: () => Promise&lt;T&gt;): Promise&lt;T&gt; {
    <span class="kw">if</span> (<span class="kw">this</span>.state === <span class="str">'OPEN'</span>) {
      <span class="kw">if</span> (Date.<span class="fn">now</span>() < <span class="kw">this</span>.nextAttempt)
        <span class="kw">throw new</span> <span class="type">Error</span>(<span class="str">'Circuit OPEN — service unavailable'</span>);
      <span class="kw">this</span>.state = <span class="str">'HALF_OPEN'</span>;
    }

    <span class="kw">try</span> {
      <span class="kw">const</span> result = <span class="kw">await</span> <span class="fn">fn</span>();
      <span class="kw">this</span>.failures = <span class="num">0</span>;
      <span class="kw">this</span>.state = <span class="str">'CLOSED'</span>;
      <span class="kw">return</span> result;
    } <span class="kw">catch</span> (err) {
      <span class="kw">this</span>.failures++;
      <span class="kw">if</span> (<span class="kw">this</span>.failures >= <span class="num">5</span>) {
        <span class="kw">this</span>.state = <span class="str">'OPEN'</span>;
        <span class="kw">this</span>.nextAttempt = Date.<span class="fn">now</span>() + <span class="num">30000</span>; <span class="cm">// 30s timeout</span>
      }
      <span class="kw">throw</span> err;
    }
  }
}</pre>
</div>

<h2>Rate Limiting</h2>
<p>Protect your system from abuse, runaway clients, and accidental DDoS. Rate limiting enforces usage quotas per user, IP, or API key.</p>

<h3>Rate Limiting Algorithms</h3>
<table class="compare-table">
  <tr><th>Algorithm</th><th>How</th><th>Pro</th><th>Con</th></tr>
  <tr><td>Fixed Window</td><td>100 req/min, counter resets every minute</td><td>Simple</td><td>Burst at window boundary (100 at :59, 100 at :01)</td></tr>
  <tr><td>Sliding Window</td><td>Count requests in last 60s rolling window</td><td>No boundary burst</td><td>More memory (store timestamps)</td></tr>
  <tr><td>Token Bucket</td><td>Tokens refill at constant rate. Spend 1 per request.</td><td>Allows short bursts</td><td>Slightly complex</td></tr>
  <tr><td>Leaky Bucket</td><td>Queue requests, process at fixed rate</td><td>Smooth output rate</td><td>Introduces latency, queue fills up</td></tr>
</table>

<div class="code-block">
  <div class="code-label">Redis Sliding Window Rate Limiter</div>
  <pre><span class="kw">async function</span> <span class="fn">isRateLimited</span>(userId: <span class="type">string</span>, limit: <span class="type">number</span>) {
  <span class="kw">const</span> key = <span class="str">&#96;ratelimit:&#36;{userId}&#96;</span>;
  <span class="kw">const</span> now = Date.<span class="fn">now</span>();
  <span class="kw">const</span> windowMs = <span class="num">60_000</span>; <span class="cm">// 1 minute</span>

  <span class="kw">const</span> pipeline = redis.<span class="fn">pipeline</span>();
  pipeline.<span class="fn">zremrangebyscore</span>(key, <span class="num">0</span>, now - windowMs); <span class="cm">// Remove old</span>
  pipeline.<span class="fn">zadd</span>(key, now, <span class="str">&#96;&#36;{now}&#96;</span>);              <span class="cm">// Add current</span>
  pipeline.<span class="fn">zcard</span>(key);                               <span class="cm">// Count window</span>
  pipeline.<span class="fn">expire</span>(key, <span class="num">60</span>);
  <span class="kw">const</span> results = <span class="kw">await</span> pipeline.<span class="fn">exec</span>();

  <span class="kw">const</span> count = results[<span class="num">2</span>][<span class="num">1</span>] <span class="kw">as</span> <span class="type">number</span>;
  <span class="kw">return</span> count > limit;
}</pre>
</div>

<h2>Observability — The Three Pillars</h2>
<p>You can't fix what you can't see. Observability answers: <strong>"What is my system doing right now?"</strong></p>

<div class="scenario-grid">
  <div class="scenario-card">
    <h4>📋 Logs</h4>
    <p>Discrete events with context. Structured JSON logs enable querying. Use log levels (DEBUG/INFO/WARN/ERROR). Tools: Datadog, Loki, CloudWatch.</p>
  </div>
  <div class="scenario-card">
    <h4>📊 Metrics</h4>
    <p>Numeric measurements over time. RED: Rate, Errors, Duration. USE: Utilization, Saturation, Errors. Tools: Prometheus + Grafana, Datadog.</p>
  </div>
  <div class="scenario-card">
    <h4>🔍 Traces</h4>
    <p>Follow a single request across multiple services. Shows where time is spent, where errors originate. Tools: Jaeger, Tempo, Datadog APM.</p>
  </div>
  <div class="scenario-card">
    <h4>🚨 Alerts</h4>
    <p>Trigger on symptoms, not causes. Alert on SLO breach, not just "CPU > 80%". PagerDuty, Opsgenie. Avoid alert fatigue.</p>
  </div>
</div>

<h2>Health Checks & SLOs</h2>
<ul>
  <li><strong>Liveness probe</strong>: "Is the process alive?" — if no, restart it. Simple HTTP 200.</li>
  <li><strong>Readiness probe</strong>: "Is the service ready to serve traffic?" — if no, remove from load balancer. Checks DB connection, cache, dependencies.</li>
  <li><strong>SLO (Service Level Objective)</strong>: Target you commit to internally. "99.9% of requests < 200ms"</li>
  <li><strong>SLA (Service Level Agreement)</strong>: External contract with penalties. Never commit SLA > SLO.</li>
  <li><strong>Error Budget</strong>: If SLO is 99.9%, you have 0.1% = 43.8 min/month to spend on downtime. Track burn rate.</li>
</ul>

<div class="callout interview">
<div class="callout-title">🎙️ Interview Tip</div>
When asked "how do you ensure reliability?", mention circuit breakers for dependencies, rate limiting for protection, retries with exponential backoff, and observability (logs/metrics/traces). Mention health checks and SLOs to show you think about operational excellence, not just code.
</div>

<div class="quiz-section">
  <div class="quiz-title">⚡ Knowledge Check</div>
  <div class="quiz-subtitle">Reliability patterns.</div>
  <div class="quiz-q" data-answer="0">
    <div class="quiz-question">Your payment service calls an external tax calculation API. The tax API goes down. Without a circuit breaker, what happens?</div>
    <div class="quiz-options">
      <div class="quiz-opt" onclick="answerQuiz(this,0)"><span class="quiz-opt-letter">A</span>All payment requests queue up and timeout, overwhelming both services and potentially crashing your system too</div>
      <div class="quiz-opt" onclick="answerQuiz(this,1)"><span class="quiz-opt-letter">B</span>Requests fail gracefully and users are notified</div>
      <div class="quiz-opt" onclick="answerQuiz(this,2)"><span class="quiz-opt-letter">C</span>The load balancer automatically reroutes to a healthy instance</div>
      <div class="quiz-opt" onclick="answerQuiz(this,3)"><span class="quiz-opt-letter">D</span>Nothing — your service is unaffected by external dependencies</div>
    </div>
    <div class="quiz-explanation">Without a circuit breaker, your service keeps hammering the downed dependency, accumulating timeout threads. Your connection pool exhausts. Your service starts failing too — a cascading failure. A circuit breaker trips after N failures, immediately returning an error (fail fast) instead of waiting for timeouts. This prevents cascading failures from propagating through your system.</div>
  </div>
</div>
`

  {
    id:9,
    tag:'Security',
    title:'Security in System Design',
    desc:'Threat modeling, authentication architecture, and securing distributed systems from first principles.',
    content:`
<h2>Security Is Architecture</h2>
<p>Security isn't a feature you bolt on — it's a property of the system's architecture. The decisions you make about data flow, service boundaries, and authentication propagate through every component.</p>

<h2>Authentication vs. Authorization</h2>
<ul>
  <li><strong>Authentication (AuthN)</strong>: Who are you? — Verify identity via password, OAuth, biometric</li>
  <li><strong>Authorization (AuthZ)</strong>: What can you do? — Verify permission to access a resource</li>
</ul>

<h3>JWT — Stateless Auth Architecture</h3>
<div class="diagram">
  <div class="diagram-title">JWT Auth Flow</div>
<pre>
1. Client sends credentials (POST /auth/login)
2. Server validates → generates JWT (signed with secret)
3. JWT returned to client
4. Client sends JWT in every request: Authorization: Bearer &lt;token&gt;
5. Any server can verify JWT signature — no session store needed

JWT Structure:
  Header.Payload.Signature
  {"alg":"HS256"}.{"userId":"42","role":"admin","exp":1735000000}.&lt;sig&gt;
</pre>
</div>

<div class="callout warn">
<div class="callout-title">⚠️ JWT Pitfalls</div>
<strong>Store JWTs in HttpOnly cookies</strong>, not localStorage — XSS can steal localStorage tokens. <strong>Short expiry + refresh tokens</strong>: access token 15min, refresh token 30 days. <strong>Never put sensitive data in JWT payload</strong> — it's base64 encoded, not encrypted. Anyone can decode it.
</div>

<h2>OAuth 2.0 — Delegated Authorization</h2>
<p>OAuth lets users grant your app access to their data on another service (Google, GitHub) without sharing their credentials. The "Sign in with Google" flow is OAuth.</p>

<div class="diagram">
  <div class="diagram-title">OAuth 2.0 Authorization Code Flow</div>
<pre>
User clicks "Sign in with Google"
        │
        ▼
Your App redirects to Google with:
  client_id, redirect_uri, scope, state (CSRF token)
        │
        ▼
User authenticates at Google + grants permission
        │
        ▼
Google redirects back to your redirect_uri with ?code=XYZ
        │
        ▼
Your server exchanges code for access_token (server-to-server)
  POST /token  client_id + client_secret + code
        │
        ▼
Access token → call Google APIs on user's behalf
</pre>
</div>

<h2>The Principle of Least Privilege</h2>
<p>Every service, user, and process should have exactly the minimum permissions needed — nothing more. Apply this everywhere:</p>
<ul>
  <li><strong>Database users</strong>: Your API service gets SELECT/INSERT/UPDATE only. Never GRANT ALL on production.</li>
  <li><strong>IAM roles</strong>: Lambda functions only get access to the specific S3 bucket they need.</li>
  <li><strong>Service mesh</strong>: Services can only call services they're explicitly allowed to call.</li>
  <li><strong>RBAC</strong>: Users get roles (admin, editor, viewer). Roles get permissions. Not users→permissions directly.</li>
</ul>

<div class="code-block">
  <div class="code-label">RBAC Implementation (Pylaxis Multi-tenant)</div>
  <pre><span class="cm">// Role-based access control with tenant isolation</span>
<span class="kw">const</span> permissions = {
  admin:   [<span class="str">'read'</span>, <span class="str">'write'</span>, <span class="str">'delete'</span>, <span class="str">'manage_users'</span>],
  editor:  [<span class="str">'read'</span>, <span class="str">'write'</span>],
  viewer:  [<span class="str">'read'</span>]
};

<span class="kw">function</span> <span class="fn">canAccess</span>(user: User, resource: string, action: string): boolean {
  <span class="cm">// Tenant isolation — can never access other tenant's data</span>
  <span class="kw">if</span> (resource.tenantId !== user.tenantId) <span class="kw">return false</span>;

  <span class="cm">// Role check</span>
  <span class="kw">return</span> permissions[user.role]?.<span class="fn">includes</span>(action) ?? <span class="kw">false</span>;
}</pre>
</div>

<h2>Transport & Data Security</h2>
<ul>
  <li><strong>TLS everywhere</strong>: All traffic encrypted in transit. Even internal service-to-service (mTLS in service mesh).</li>
  <li><strong>Encryption at rest</strong>: DB-level encryption (PostgreSQL TDE, AWS RDS encryption). Sensitive fields (PII, keys) encrypted at column level.</li>
  <li><strong>Secret management</strong>: Never hardcode secrets. Use AWS Secrets Manager, Vault, or environment variables (not committed to git). Rotate regularly.</li>
</ul>

<h2>Common Attack Vectors</h2>
<table class="compare-table">
  <tr><th>Attack</th><th>What It Is</th><th>Defense</th></tr>
  <tr><td>SQL Injection</td><td>User input executed as SQL</td><td>Parameterized queries. ORMs. Never string concat SQL.</td></tr>
  <tr><td>XSS</td><td>Malicious scripts injected into your page</td><td>Sanitize output. CSP headers. HttpOnly cookies.</td></tr>
  <tr><td>CSRF</td><td>Forged requests from other sites</td><td>CSRF tokens. SameSite cookie attribute. CORS.</td></tr>
  <tr><td>SSRF</td><td>Server makes requests to internal services</td><td>Validate/allowlist URLs. Block internal IP ranges.</td></tr>
  <tr><td>Broken Auth</td><td>Weak tokens, no expiry, guessable IDs</td><td>Strong token entropy. Short expiry. UUIDs not sequential IDs.</td></tr>
</table>

<div class="callout interview">
<div class="callout-title">🎙️ Security in Interviews</div>
When designing any system, proactively mention: "I'd use JWT with short expiry for auth, mTLS between internal services, encrypt PII at rest, and run least-privilege IAM roles." Mentioning security without being asked shows senior maturity.
</div>

<div class="quiz-section">
  <div class="quiz-title">⚡ Knowledge Check</div>
  <div class="quiz-subtitle">Security architecture.</div>
  <div class="quiz-q" data-answer="3">
    <div class="quiz-question">A developer stores the refresh token in localStorage. What's the specific risk?</div>
    <div class="quiz-options">
      <div class="quiz-opt" onclick="answerQuiz(this,0)"><span class="quiz-opt-letter">A</span>The token is not encrypted</div>
      <div class="quiz-opt" onclick="answerQuiz(this,1)"><span class="quiz-opt-letter">B</span>LocalStorage is too slow for token retrieval</div>
      <div class="quiz-opt" onclick="answerQuiz(this,2)"><span class="quiz-opt-letter">C</span>The token will expire immediately</div>
      <div class="quiz-opt" onclick="answerQuiz(this,3)"><span class="quiz-opt-letter">D</span>An XSS attack can read localStorage and steal the token</div>
    </div>
    <div class="quiz-explanation">localStorage is accessible via JavaScript. An XSS vulnerability (injected script from user input) can execute &#96;localStorage.getItem('refresh_token')&#96; and exfiltrate the token. Refresh tokens are long-lived (30 days), making theft catastrophic. HttpOnly cookies cannot be read by JavaScript — even a successful XSS cannot steal them. This is why all auth tokens should live in HttpOnly, Secure, SameSite=Strict cookies.</div>
  </div>
</div>
`

    title:'Designing Real Systems: 4 Full Case Studies',
    desc:'Walk through complete system designs for URL Shortener, Twitter Feed, Netflix Video, and Ride-sharing.',
    content:`
<h2>Case Study Framework</h2>
<p>Every real system design starts with the same four questions. Apply them before touching any architecture.</p>
<ol>
  <li><strong>Clarify requirements</strong>: What does it do? What doesn't it do? Who uses it?</li>
  <li><strong>Estimate scale</strong>: Users, QPS, storage, bandwidth. This drives every decision.</li>
  <li><strong>Define the data model</strong>: What entities? What access patterns?</li>
  <li><strong>Design the architecture</strong>: Draw the components. Justify each choice.</li>
</ol>

<div class="design-case">
  <div class="design-case-header">
    <h3>🔗 Design #1: URL Shortener (bit.ly)</h3>
    <p>Classic interview starter — tests fundamentals in under 30 minutes.</p>
  </div>
  <div class="design-case-body">
    <h3>Requirements</h3>
    <ul>
      <li>Shorten a long URL → 6-char short code</li>
      <li>Redirect short URL to original in &lt;50ms</li>
      <li>100M new URLs/day, 10B redirects/day (100:1 read:write)</li>
      <li>URLs expire after 1 year</li>
    </ul>
    <h3>Scale Estimation</h3>
    <ul>
      <li>Write QPS: 100M / 86400s ≈ 1,160/s</li>
      <li>Read QPS: 10B / 86400s ≈ 115,700/s</li>
      <li>Storage: 100M URLs/day × 365 days × ~500 bytes ≈ 18TB/year</li>
    </ul>
    <h3>Key Design Decisions</h3>
    <div class="diagram"><pre>
Client → CDN → Load Balancer → URL Service (stateless, N nodes)
                                      │
                    ┌─────────────────┤
                    ▼                 ▼
              Redis Cache        PostgreSQL
              (hot URLs)         (all URLs)

Short code generation:
  Option 1: hash(longURL) → take 6 chars (collision risk)
  Option 2: Base62 encode auto-increment ID (1,000,000 = "4c92")
  Option 3: Pre-generate codes in batch, store in Redis pool

Redirect flow:
  GET /abc123
  1. Redis.get('abc123') → hit? → 301 redirect (cached by browser)
  2. Miss → DB lookup → Redis.set('abc123', url, TTL) → redirect
</pre></div>
    <div class="callout info"><div class="callout-title">301 vs 302</div>301 Permanent = browser caches, no future requests to your server. 302 Temporary = browser always asks your server. For analytics (track clicks), use 302. For pure performance, use 301.</div>
  </div>
</div>

<div class="design-case">
  <div class="design-case-header">
    <h3>🐦 Design #2: Twitter News Feed</h3>
    <p>Tests fanout, caching, and real-time at scale.</p>
  </div>
  <div class="design-case-body">
    <h3>Requirements</h3>
    <ul>
      <li>Post tweets (text, images)</li>
      <li>Follow/unfollow users</li>
      <li>See timeline of followed users' tweets, reverse-chronological</li>
      <li>300M users, celebrities with 100M followers</li>
    </ul>
    <h3>The Fanout Problem</h3>
    <p>When a celebrity tweets, do you push it to 100M followers' feeds (write-heavy) or do you pull and merge at read time (read-heavy)?</p>
    <div class="diagram"><pre>
FANOUT ON WRITE (Push):
  Tweet created → queue → worker pushes to all follower timelines
  Pro: Read is instant (pre-built)
  Con: 100M writes on every celebrity tweet

FANOUT ON READ (Pull):
  Timeline request → fetch all followees' tweets → merge → sort
  Pro: No write amplification
  Con: High read latency (100 DB queries merged in real-time)

HYBRID (Twitter's actual approach):
  Normal users: fanout on write (< 1k followers)
  Celebrities: fanout on read — fetched and merged at timeline request
  Most timelines pre-built in Redis. Celebrity tweets injected at serve time.
</pre></div>
    <div class="callout success"><div class="callout-title">The Hybrid Pattern</div>Use different strategies for different user segments. This is a senior-level insight interviewers love. Don't apply one strategy globally when workload differs drastically by user type.</div>
  </div>
</div>

<div class="design-case">
  <div class="design-case-header">
    <h3>🎬 Design #3: Netflix Video Streaming</h3>
    <p>Tests CDN architecture, storage, and encoding pipelines.</p>
  </div>
  <div class="design-case-body">
    <h3>Key Insight: Upload vs. Streaming Are Different Problems</h3>
    <div class="diagram"><pre>
UPLOAD PIPELINE:
  Creator uploads raw video
  → S3 (raw storage)
  → Encoding Service (FFmpeg workers)
      → 360p, 720p, 1080p, 4K variants
      → Multiple codecs (H.264, H.265, AV1)
  → Processed videos → S3
  → CDN origin pushed to edge PoPs globally

STREAMING PIPELINE:
  User clicks play
  → API returns manifest file (m3u8 / DASH)
  → Client fetches video segments from NEAREST CDN PoP
  → Adaptive Bitrate Streaming (ABR):
      Bad connection → drops to 360p automatically
      Good connection → upgrades to 4K

Why CDN is critical:
  Netflix uses ~15% of internet traffic globally.
  Without CDN edge servers, all traffic would hit origin — impossible.
  Netflix Open Connect: Netflix's own CDN embedded in ISPs.
</pre></div>
  </div>
</div>

<div class="design-case">
  <div class="design-case-header">
    <h3>🚗 Design #4: Ride-sharing (Uber)</h3>
    <p>Tests geospatial systems, real-time updates, and matching algorithms.</p>
  </div>
  <div class="design-case-body">
    <h3>Key Components</h3>
    <div class="diagram"><pre>
DRIVER LOCATION UPDATES:
  Driver app → Location Service (WebSocket) → Redis Geo
  Redis: GEOADD drivers:active lng lat driverId
  Update every 4 seconds → Redis expiry 8s (gone if offline)

RIDER MATCH REQUEST:
  POST /rides → Ride Service
  → GEORADIUS drivers:active lat lng 5km
  → Rank by ETA (distance + traffic)
  → Notify top 3 drivers (WebSocket/Push)
  → First to accept wins

SURGE PRICING:
  Demand (riders) / Supply (available drivers) > threshold
  → Apply surge multiplier
  → Real-time demand calculated per geographic cell (S2/H3 library)

TRIP TRACKING:
  Driver sends location → Kafka → Location consumers
  → Rider's app updates in real-time (WebSocket push)
  → Route deviation detection
  → ETA recalculation
</pre></div>
    <div class="callout info"><div class="callout-title">Geospatial Key: S2/H3 Cells</div>The world is divided into hexagonal cells (H3 by Uber, S2 by Google). Every location maps to a cell at different precision levels. Finding nearby drivers = finding drivers in the same or adjacent cells. Redis Geo commands implement this efficiently.</div>
  </div>
</div>

<div class="quiz-section">
  <div class="quiz-title">⚡ Knowledge Check</div>
  <div class="quiz-subtitle">Real system design reasoning.</div>
  <div class="quiz-q" data-answer="2">
    <div class="quiz-question">Twitter uses a hybrid fanout strategy. For a user with 500 followers, which approach is used?</div>
    <div class="quiz-options">
      <div class="quiz-opt" onclick="answerQuiz(this,0)"><span class="quiz-opt-letter">A</span>Fanout on read — pull tweets at timeline request</div>
      <div class="quiz-opt" onclick="answerQuiz(this,1)"><span class="quiz-opt-letter">B</span>No caching — always query the database</div>
      <div class="quiz-opt" onclick="answerQuiz(this,2)"><span class="quiz-opt-letter">C</span>Fanout on write — push tweet to all 500 followers' pre-built timelines</div>
      <div class="quiz-opt" onclick="answerQuiz(this,3)"><span class="quiz-opt-letter">D</span>Batch fanout once per hour</div>
    </div>
    <div class="quiz-explanation">Regular users (< ~1k followers) use fanout on write. When they tweet, it's pushed to all followers' pre-built Redis timeline caches immediately. 500 Redis writes is trivial. For celebrities with millions of followers, this would be catastrophic — so they switch to fanout on read, injecting celebrity tweets at serve time.</div>
  </div>
</div>
`
  },

  {
    id:11,
    tag:'Interview Mastery',
    title:'The System Design Interview Playbook',
    desc:'The exact framework, communication strategies, and common traps — used in real FAANG interviews.',
    content:`
<h2>What Interviewers Actually Evaluate</h2>
<p>System design interviews are not about correct answers. They evaluate:</p>
<ul>
  <li><strong>Problem decomposition</strong>: Can you break ambiguity into concrete requirements?</li>
  <li><strong>Breadth of knowledge</strong>: Do you know the landscape of solutions?</li>
  <li><strong>Trade-off thinking</strong>: Do you understand the pros/cons of your choices?</li>
  <li><strong>Communication</strong>: Can you explain complex ideas clearly?</li>
  <li><strong>Prioritization</strong>: Do you focus on what matters most?</li>
</ul>

<h2>The 45-Minute Interview Framework</h2>

<div class="framework-step">
  <div class="step-num">1</div>
  <div class="step-body">
    <h4>Clarify Requirements (5 min)</h4>
    <p>Never start designing immediately. Ask: Who uses this? What are the core features? What's out of scope? What scale are we targeting? What are the latency requirements? Are there regulatory constraints?</p>
    <div class="tip-box"><strong>Say:</strong> "Before I start, I want to make sure I understand the requirements. Can I ask a few clarifying questions?"</div>
  </div>
</div>
<div class="framework-step">
  <div class="step-num">2</div>
  <div class="step-body">
    <h4>Estimate Scale (5 min)</h4>
    <p>Do back-of-envelope math. Users, QPS, storage, bandwidth. These numbers drive your architecture. State your assumptions explicitly.</p>
    <div class="tip-box"><strong>Say:</strong> "Let me estimate the scale. If we have 10M daily active users, and each makes 10 requests per day, that's about 1,200 QPS average, maybe 5x peak = 6,000 QPS. Let me design for 10,000 QPS to be safe."</div>
  </div>
</div>
<div class="framework-step">
  <div class="step-num">3</div>
  <div class="step-body">
    <h4>Define APIs (5 min)</h4>
    <p>What are the key API endpoints? What do they accept and return? This forces clarity on what the system actually does.</p>
  </div>
</div>
<div class="framework-step">
  <div class="step-num">4</div>
  <div class="step-body">
    <h4>Data Model (5 min)</h4>
    <p>What tables/collections? What are the key relationships? What indexes do you need? What access patterns drive the schema?</p>
  </div>
</div>
<div class="framework-step">
  <div class="step-num">5</div>
  <div class="step-body">
    <h4>High-Level Architecture (10 min)</h4>
    <p>Draw the system. Client → LB → Services → DB → Cache. Explain every box. Justify every connection. This is the core of the interview.</p>
  </div>
</div>
<div class="framework-step">
  <div class="step-num">6</div>
  <div class="step-body">
    <h4>Deep Dive on Critical Components (10 min)</h4>
    <p>Pick 1-2 hard problems in your design. Dive deep. Show you can reason about consistency, failure modes, and scale in detail.</p>
  </div>
</div>
<div class="framework-step">
  <div class="step-num">7</div>
  <div class="step-body">
    <h4>Bottlenecks & Scaling (5 min)</h4>
    <p>What's the weakest part of your design? How would you scale it? This is where senior candidates shine — proactively identifying weaknesses.</p>
  </div>
</div>

<h2>The Numbers You Must Memorize</h2>
<div class="code-block">
  <div class="code-label">Back-of-Envelope Reference Card</div>
  <pre><span class="cm">/* TIME */</span>
L1 cache:           ~0.5 ns
L2 cache:           ~7 ns
RAM access:         ~100 ns
SSD read:           ~150 µs
HDD read:           ~10 ms
LAN roundtrip:      ~0.5 ms
Same DC roundtrip:  ~0.5 ms
Cross-country:      ~30–100 ms
Cross-continent:    ~150–300 ms

<span class="cm">/* SCALE */</span>
1 server:           ~1,000–10,000 QPS (depending on work)
PostgreSQL:         ~10,000 QPS with good indexes
Redis:              ~100,000 QPS
Kafka:              ~1,000,000 msg/s per partition

<span class="cm">/* STORAGE */</span>
1 char =            1 byte
1 int =             4 bytes
1 UUID =            36 bytes (string) or 16 bytes (binary)
1 tweet =           ~280 bytes
1 photo =           ~3 MB
1 minute HD video = ~100 MB

<span class="cm">/* MATH SHORTCUTS */</span>
1 day  = 86,400 s  (≈ 10^5)
1 year = 31M s     (≈ 3 × 10^7)
1M users × 10 req/day = ~100 QPS
1B users × 10 req/day = ~100,000 QPS</pre>
</div>

<h2>Common Traps to Avoid</h2>
<table class="compare-table">
  <tr><th>Trap</th><th>What It Looks Like</th><th>What to Do Instead</th></tr>
  <tr><td>Premature optimization</td><td>Jumping to sharding + microservices for a 10k user app</td><td>Start simple. Add complexity only when scale demands it.</td></tr>
  <tr><td>Ignoring failures</td><td>No mention of what happens when DB goes down</td><td>Always discuss failure modes for critical components.</td></tr>
  <tr><td>No trade-off discussion</td><td>"I'll use Kafka because it's scalable"</td><td>"Kafka adds operational overhead. For this scale, SQS is simpler. I'd switch to Kafka at 10M events/day."</td></tr>
  <tr><td>Buzzword engineering</td><td>Microservices, blockchain, ML for everything</td><td>Choose the simplest solution that meets requirements.</td></tr>
  <tr><td>Ignoring consistency</td><td>No discussion of data guarantees</td><td>Always clarify what data must be strongly consistent vs. eventually consistent.</td></tr>
</table>

<h2>Interview Phrases That Signal Seniority</h2>
<div class="callout success">
<div class="callout-title">✅ High-Signal Phrases</div>
<ul>
  <li>"Given the 100:1 read-to-write ratio, I'd prioritize read performance..."</li>
  <li>"The trade-off here is: X gives us better consistency but higher latency. Given the requirement for [X], I'd choose..."</li>
  <li>"This is a potential single point of failure. I'd add a replica to handle..."</li>
  <li>"At this scale, the bottleneck would likely be the database. Here's how I'd address that..."</li>
  <li>"I'm simplifying here — in production I'd also add rate limiting, circuit breakers, and monitoring."</li>
</ul>
</div>

<div class="callout danger">
<div class="callout-title">🚫 Low-Signal Phrases</div>
<ul>
  <li>"I'd use microservices." (without justification)</li>
  <li>"This would scale infinitely." (nothing scales infinitely)</li>
  <li>"I don't know — what do you think?" (lead, then ask for feedback)</li>
  <li>Silence for long periods without explaining your reasoning</li>
</ul>
</div>

<div class="callout interview">
<div class="callout-title">🎙️ Final Advice</div>
<p>You won't always have perfect answers. What matters is that you <strong>think out loud</strong>, <strong>make defensible decisions</strong>, and <strong>proactively identify trade-offs</strong>. A candidate who says "I'm choosing X, which has this trade-off, and here's how I'd mitigate it" beats one who silently delivers a "perfect" architecture.</p>
<p style="margin-top:.5rem">Practice out loud. With a timer. Draw boxes and arrows as you talk. That's the skill.</p>

  <div class="quiz-subtitle">Interview simulation.</div>
  <div class="quiz-q" data-answer="3">
    <div class="quiz-question">You're asked to design Instagram. Your first step should be:</div>
    <div class="quiz-options">
      <div class="quiz-opt" onclick="answerQuiz(this,0)"><span class="quiz-opt-letter">A</span>Start drawing the architecture immediately to show technical knowledge</div>

      <div class="quiz-opt" onclick="answerQuiz(this,2)"><span class="quiz-opt-letter">C</span>Estimate how many users Instagram has</div>
      <div class="quiz-opt" onclick="answerQuiz(this,3)"><span class="quiz-opt-letter">D</span>Ask clarifying questions: what features are in scope, what scale are we targeting, any special constraints?</div>
    </div>
    <div class="quiz-explanation">Always clarify before building. Is it just feed + photos? Stories? DMs? Video? What scale — 10k or 1B users? The architecture is completely different. Jumping to solutions before understanding requirements is the most common and costly interview mistake. Interviewers penalize it because real engineers who do this ship the wrong thing.</div>

// =================== NAV STRUCTURE ===================
const navSections = [
  { label: 'Foundations', range: [0,0] },
  { label: 'Building Blocks', range: [1,2] },
  { label: 'Scalability', range: [3,4] },
  { label: 'Async & Distribution', range: [5,6] },
  { label: 'APIs & Reliability', range: [7,8] },
  { label: 'Security', range: [9,9] },
  { label: 'Advanced', range: [10,11] },
];

// ── in-memory state (no localStorage — not available in this sandbox) ──
let currentModule = 0;
let completedModules = new Set();

// Expose every function called via inline onclick on window so dynamically
// injected HTML can reach them even inside a sandboxed iframe.
window.startCourse = function () {
  document.getElementById('splash').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  buildNav();
  renderModule(0);
  updateProgress();
};

function buildNav() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = '';
  navSections.forEach(function (section) {
    const label = document.createElement('div');
    label.className = 'nav-section-label';
    label.textContent = section.label;
    nav.appendChild(label);
    for (let i = section.range[0]; i <= section.range[1]; i++) {
      const m = modules[i];
      const el = document.createElement('div');
      el.className = 'nav-module' + (completedModules.has(i) ? ' completed' : '');
      el.id = 'nav-' + i;
      el.dataset.idx = i;
      el.innerHTML =
        '<span class="nav-module-num">' + String(i + 1).padStart(2, '0') + '</span>' +
        '<span class="nav-module-title">' + m.title + '</span>' +
        '<span class="nav-check">' + (completedModules.has(i) ? '✓' : '') + '</span>';
      el.onclick = (function (idx) { return function () { renderModule(idx); }; })(i);
      nav.appendChild(el);
    }
  });
}

window.renderModule = function (idx) {
  currentModule = idx;
  const m = modules[idx];
  const container = document.getElementById('moduleContainer');

  const prevBtn = idx > 0
    ? '<button class="nav-btn" onclick="renderModule(' + (idx - 1) + ')">← Previous</button>'
    : '<button class="nav-btn" disabled>← Previous</button>';

  const nextBtn = idx < modules.length - 1
    ? '<button class="nav-btn primary" onclick="renderModule(' + (idx + 1) + ')">Next Module →</button>'
    : '<button class="nav-btn primary" onclick="alert(\'🎉 You completed the full course!\')">Course Complete 🎓</button>';

  container.innerHTML =
    '<div class="module-content">' +
      '<div class="module-header">' +
        '<div class="module-tag">' + m.tag + ' · Module ' + (idx + 1) + ' of ' + modules.length + '</div>' +
        '<h1 class="module-title">' + m.title + '</h1>' +
        '<div class="module-desc">' + m.desc + '</div>' +
      '</div>' +
      m.content +
      '<div class="complete-btn">' +
        '<button onclick="markComplete(' + idx + ')">✓ Mark Complete & Continue</button>' +
      '</div>' +
      '<div class="module-nav">' + prevBtn + nextBtn + '</div>' +
    '</div>';

  document.querySelectorAll('.nav-module').forEach(function (el) {
    el.classList.remove('active');
  });
  const navEl = document.getElementById('nav-' + idx);
  if (navEl) {
    navEl.classList.add('active');
    navEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
  document.getElementById('main').scrollTo({ top: 0, behavior: 'smooth' });
};

window.markComplete = function (idx) {
  completedModules.add(idx);
  updateProgress();
  buildNav();
  if (idx < modules.length - 1) renderModule(idx + 1);
};

function updateProgress() {
  const pct = Math.round((completedModules.size / modules.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent =
    completedModules.size + ' / ' + modules.length + ' modules complete';
}

window.answerQuiz = function (el, selected) {
  const qBlock = el.closest('.quiz-q');
  if (qBlock.dataset.answered) return;
  qBlock.dataset.answered = '1';
  const correct = parseInt(qBlock.dataset.answer, 10);
  const opts = qBlock.querySelectorAll('.quiz-opt');
  opts.forEach(function (opt, i) {
    opt.classList.add('disabled');
    if (i === correct) opt.classList.add('correct');
    else if (i === selected && selected !== correct) opt.classList.add('wrong');
  });
  qBlock.querySelector('.quiz-explanation').classList.add('show');
};

window.switchTab = function (btn, paneId) {
  const tabs = btn.closest('.tabs');
  tabs.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
  tabs.querySelectorAll('.tab-pane').forEach(function (p) { p.classList.remove('active'); });
  btn.classList.add('active');
  tabs.querySelector('#' + paneId).classList.add('active');
};

window.filterModules = function (query) {
  const q = query.toLowerCase();
  document.querySelectorAll('.nav-module').forEach(function (el) {
    const title = el.querySelector('.nav-module-title').textContent.toLowerCase();
    el.style.display = title.includes(q) ? '' : 'none';
  });
};
</script>
