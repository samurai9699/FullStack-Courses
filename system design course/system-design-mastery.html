<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Design Mastery</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;600&display=swap');

:root {
  --bg: #080c12;
  --bg2: #0d1420;
  --bg3: #111827;
  --border: #1e2d45;
  --accent: #00d4ff;
  --accent2: #7c3aed;
  --accent3: #10b981;
  --warn: #f59e0b;
  --danger: #ef4444;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --card: #0f1929;
  --card2: #131e30;
  --glow: 0 0 20px rgba(0,212,255,0.15);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* GRID NOISE TEXTURE */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image: 
    linear-gradient(rgba(0,212,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.015) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events:none;
  z-index:0;
}

/* SPLASH */
#splash {
  position:fixed;
  inset:0;
  background: var(--bg);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:1000;
  transition: opacity .6s, visibility .6s;
}
#splash.hidden { opacity:0; visibility:hidden; }

.splash-badge {
  font-family: 'Space Mono', monospace;
  font-size:.75rem;
  color: var(--accent);
  letter-spacing:.2em;
  text-transform:uppercase;
  margin-bottom:1.5rem;
  opacity:.7;
}

.splash-title {
  font-size:clamp(2.5rem,6vw,5rem);
  font-weight:800;
  line-height:1;
  text-align:center;
  background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--accent2) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:1rem;
}

.splash-sub {
  font-family: 'Space Mono', monospace;
  color: var(--text2);
  font-size:.9rem;
  text-align:center;
  margin-bottom:3rem;
  max-width:500px;
  line-height:1.8;
}

.splash-btn {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color:#fff;
  border:none;
  padding:1rem 3rem;
  border-radius:4px;
  font-family:'Syne',sans-serif;
  font-weight:700;
  font-size:1rem;
  cursor:pointer;
  letter-spacing:.05em;
  position:relative;
  overflow:hidden;
  transition:transform .2s, box-shadow .2s;
}
.splash-btn:hover { transform:translateY(-2px); box-shadow:0 0 40px rgba(0,212,255,0.4); }
.splash-btn::after {
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,transparent,rgba(255,255,255,.1),transparent);
  transform:translateX(-100%);
  transition: transform .4s;
}
.splash-btn:hover::after { transform:translateX(100%); }

.splash-stats {
  display:flex;
  gap:3rem;
  margin-top:3rem;
  font-family:'Space Mono',monospace;
}
.splash-stat { text-align:center; }
.splash-stat-num { font-size:1.8rem; font-weight:700; color:var(--accent); display:block; }
.splash-stat-label { font-size:.7rem; color:var(--text3); letter-spacing:.1em; text-transform:uppercase; }

/* LAYOUT */
#app { display:none; height:100vh; overflow:hidden; position:relative; z-index:1; }
#app.visible { display:flex; }

/* SIDEBAR */
#sidebar {
  width:280px;
  min-width:280px;
  background: var(--bg2);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  height:100vh;
  overflow:hidden;
}

.sidebar-header {
  padding:1.5rem;
  border-bottom:1px solid var(--border);
}

.sidebar-logo {
  font-weight:800;
  font-size:1.1rem;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  display:block;
  margin-bottom:.5rem;
}

.progress-bar-wrap {
  height:3px;
  background: var(--border);
  border-radius:99px;
  overflow:hidden;
  margin-top:.75rem;
}
.progress-bar-fill {
  height:100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius:99px;
  transition: width .5s ease;
}
.progress-text {
  font-family:'Space Mono',monospace;
  font-size:.7rem;
  color:var(--text3);
  margin-top:.4rem;
}

.sidebar-search {
  padding:.75rem 1.5rem;
  border-bottom:1px solid var(--border);
}
.sidebar-search input {
  width:100%;
  background: var(--bg3);
  border:1px solid var(--border);
  border-radius:4px;
  padding:.5rem .75rem;
  color:var(--text);
  font-family:'Space Mono',monospace;
  font-size:.8rem;
  outline:none;
}
.sidebar-search input:focus { border-color: var(--accent); }
.sidebar-search input::placeholder { color:var(--text3); }

.sidebar-nav {
  flex:1;
  overflow-y:auto;
  padding:.5rem 0;
  scrollbar-width:thin;
  scrollbar-color: var(--border) transparent;
}

.nav-module {
  padding:.4rem 1.5rem;
  cursor:pointer;
  border-left:3px solid transparent;
  transition:all .2s;
  display:flex;
  align-items:center;
  gap:.75rem;
}
.nav-module:hover { background: var(--bg3); }
.nav-module.active { border-left-color: var(--accent); background: rgba(0,212,255,.05); }
.nav-module.completed .nav-check { color: var(--accent3); }

.nav-module-num {
  font-family:'Space Mono',monospace;
  font-size:.65rem;
  color:var(--text3);
  min-width:24px;
}
.nav-module-title {
  font-size:.85rem;
  font-weight:600;
  flex:1;
  line-height:1.3;
}
.nav-module.active .nav-module-title { color:var(--accent); }
.nav-check { font-size:.9rem; }

.nav-section-label {
  font-family:'Space Mono',monospace;
  font-size:.65rem;
  color:var(--text3);
  letter-spacing:.15em;
  text-transform:uppercase;
  padding:.75rem 1.5rem .25rem;
}

/* MAIN CONTENT */
#main {
  flex:1;
  overflow-y:auto;
  padding:0;
  scrollbar-width:thin;
  scrollbar-color: var(--border) transparent;
}

.module-content {
  max-width:860px;
  margin:0 auto;
  padding:3rem 2.5rem 6rem;
}

.module-header {
  margin-bottom:3rem;
  padding-bottom:2rem;
  border-bottom:1px solid var(--border);
}

.module-tag {
  font-family:'Space Mono',monospace;
  font-size:.7rem;
  color:var(--accent);
  letter-spacing:.2em;
  text-transform:uppercase;
  margin-bottom:.75rem;
  display:flex;
  align-items:center;
  gap:.5rem;
}
.module-tag::before {
  content:'';
  display:inline-block;
  width:20px;
  height:1px;
  background:var(--accent);
}

.module-title {
  font-size:clamp(1.8rem,3vw,2.8rem);
  font-weight:800;
  line-height:1.1;
  margin-bottom:1rem;
}

.module-desc {
  font-family:'Space Mono',monospace;
  font-size:.85rem;
  color:var(--text2);
  line-height:1.8;
}

/* CONTENT ELEMENTS */
h2 {
  font-size:1.5rem;
  font-weight:700;
  margin:2.5rem 0 1rem;
  color:#fff;
  display:flex;
  align-items:center;
  gap:.75rem;
}
h2::before {
  content:'';
  display:inline-block;
  width:4px;
  height:1.5rem;
  background: linear-gradient(var(--accent), var(--accent2));
  border-radius:2px;
}

h3 {
  font-size:1.15rem;
  font-weight:700;
  margin:2rem 0 .75rem;
  color: var(--accent);
}

p {
  font-family:'Space Mono',monospace;
  font-size:.85rem;
  line-height:1.9;
  color: var(--text2);
  margin-bottom:1rem;
}

ul, ol {
  margin:.5rem 0 1rem 1.5rem;
}
li {
  font-family:'Space Mono',monospace;
  font-size:.85rem;
  color:var(--text2);
  line-height:1.9;
  margin-bottom:.25rem;
}
li strong { color:var(--text); }

strong { color:var(--text); font-weight:700; }

/* CODE BLOCKS */
.code-block {
  background: var(--bg3);
  border:1px solid var(--border);
  border-radius:6px;
  margin:1.5rem 0;
  overflow:hidden;
}
.code-label {
  font-family:'Space Mono',monospace;
  font-size:.7rem;
  color:var(--text3);
  padding:.5rem 1rem;
  border-bottom:1px solid var(--border);
  background: var(--bg2);
  letter-spacing:.1em;
}
pre {
  padding:1.25rem;
  overflow-x:auto;
  font-family:'JetBrains Mono',monospace;
  font-size:.8rem;
  line-height:1.7;
  color: #e2e8f0;
}
.kw { color:#7c3aed; }
.str { color:#10b981; }
.cm { color:#475569; font-style:italic; }
.num { color:#f59e0b; }
.fn { color:#00d4ff; }
.type { color:#f472b6; }

/* CALLOUT BOXES */
.callout {
  border-radius:6px;
  padding:1.25rem 1.5rem;
  margin:1.5rem 0;
  border-left:4px solid;
  font-family:'Space Mono',monospace;
  font-size:.82rem;
  line-height:1.8;
}
.callout-title {
  font-weight:700;
  font-size:.8rem;
  letter-spacing:.1em;
  text-transform:uppercase;
  margin-bottom:.5rem;
  display:flex;
  align-items:center;
  gap:.5rem;
}
.callout.info { background:rgba(0,212,255,.06); border-color:var(--accent); color:var(--text2); }
.callout.info .callout-title { color:var(--accent); }
.callout.warn { background:rgba(245,158,11,.06); border-color:var(--warn); color:var(--text2); }
.callout.warn .callout-title { color:var(--warn); }
.callout.success { background:rgba(16,185,129,.06); border-color:var(--accent3); color:var(--text2); }
.callout.success .callout-title { color:var(--accent3); }
.callout.danger { background:rgba(239,68,68,.06); border-color:var(--danger); color:var(--text2); }
.callout.danger .callout-title { color:var(--danger); }
.callout.interview { background:rgba(124,58,237,.08); border-color:var(--accent2); color:var(--text2); }
.callout.interview .callout-title { color:var(--accent2); }

/* DIAGRAMS */
.diagram {
  background: var(--bg3);
  border:1px solid var(--border);
  border-radius:6px;
  padding:1.5rem;
  margin:1.5rem 0;
  overflow-x:auto;
}
.diagram pre {
  padding:0;
  color:var(--accent);
  font-size:.78rem;
  line-height:1.6;
}
.diagram-title {
  font-family:'Space Mono',monospace;
  font-size:.7rem;
  color:var(--text3);
  letter-spacing:.1em;
  text-transform:uppercase;
  margin-bottom:.75rem;
}

/* COMPARISON TABLE */
.compare-table {
  width:100%;
  border-collapse:collapse;
  margin:1.5rem 0;
  font-family:'Space Mono',monospace;
  font-size:.78rem;
}
.compare-table th {
  background: var(--bg3);
  padding:.75rem 1rem;
  text-align:left;
  color:var(--accent);
  font-size:.72rem;
  letter-spacing:.1em;
  text-transform:uppercase;
  border:1px solid var(--border);
}
.compare-table td {
  padding:.7rem 1rem;
  border:1px solid var(--border);
  color:var(--text2);
  vertical-align:top;
  line-height:1.6;
}
.compare-table tr:nth-child(even) td { background:rgba(255,255,255,.02); }
.tag { display:inline-block; padding:.15rem .5rem; border-radius:3px; font-size:.7rem; font-weight:700; }
.tag-green { background:rgba(16,185,129,.15); color:var(--accent3); }
.tag-red { background:rgba(239,68,68,.15); color:var(--danger); }
.tag-blue { background:rgba(0,212,255,.15); color:var(--accent); }
.tag-purple { background:rgba(124,58,237,.15); color:#a78bfa; }

/* QUIZ */
.quiz-section {
  background: var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:2rem;
  margin:2.5rem 0;
}
.quiz-title {
  font-size:1rem;
  font-weight:700;
  color: var(--accent);
  margin-bottom:.25rem;
  display:flex;
  align-items:center;
  gap:.5rem;
}
.quiz-subtitle {
  font-family:'Space Mono',monospace;
  font-size:.75rem;
  color:var(--text3);
  margin-bottom:1.5rem;
}
.quiz-q {
  margin-bottom:1.5rem;
  padding-bottom:1.5rem;
  border-bottom:1px solid var(--border);
}
.quiz-q:last-child { border-bottom:none; margin-bottom:0; padding-bottom:0; }
.quiz-question {
  font-family:'Space Mono',monospace;
  font-size:.85rem;
  color:var(--text);
  margin-bottom:1rem;
  line-height:1.7;
}
.quiz-options { display:flex; flex-direction:column; gap:.5rem; }
.quiz-opt {
  background: var(--bg3);
  border:1px solid var(--border);
  border-radius:4px;
  padding:.7rem 1rem;
  cursor:pointer;
  font-family:'Space Mono',monospace;
  font-size:.8rem;
  color:var(--text2);
  transition:all .2s;
  display:flex;
  gap:.75rem;
  align-items:flex-start;
}
.quiz-opt:hover { border-color:var(--accent); color:var(--text); }
.quiz-opt.correct { background:rgba(16,185,129,.1); border-color:var(--accent3); color:var(--accent3); }
.quiz-opt.wrong { background:rgba(239,68,68,.1); border-color:var(--danger); color:var(--danger); }
.quiz-opt.disabled { cursor:not-allowed; pointer-events:none; }
.quiz-opt-letter {
  min-width:22px;
  height:22px;
  border-radius:3px;
  background: var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:.7rem;
  font-weight:700;
}
.quiz-explanation {
  margin-top:.75rem;
  padding:.75rem 1rem;
  background:rgba(0,212,255,.05);
  border-left:3px solid var(--accent);
  border-radius:0 4px 4px 0;
  font-family:'Space Mono',monospace;
  font-size:.78rem;
  color:var(--text2);
  line-height:1.7;
  display:none;
}
.quiz-explanation.show { display:block; }

/* SCENARIO CARDS */
.scenario-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1rem;
  margin:1.5rem 0;
}
.scenario-card {
  background: var(--card2);
  border:1px solid var(--border);
  border-radius:6px;
  padding:1.25rem;
  transition:border-color .2s;
}
.scenario-card:hover { border-color:var(--accent); }
.scenario-card h4 {
  font-size:.9rem;
  font-weight:700;
  color:var(--text);
  margin-bottom:.5rem;
  display:flex;
  align-items:center;
  gap:.5rem;
}
.scenario-card p { font-size:.78rem; margin:0; }

/* METRIC CARDS */
.metric-row {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:1rem;
  margin:1.5rem 0;
}
.metric-card {
  background: var(--card2);
  border:1px solid var(--border);
  border-radius:6px;
  padding:1rem;
  text-align:center;
}
.metric-val {
  font-family:'Space Mono',monospace;
  font-size:1.4rem;
  font-weight:700;
  color:var(--accent);
  display:block;
}
.metric-label {
  font-family:'Space Mono',monospace;
  font-size:.7rem;
  color:var(--text3);
  text-transform:uppercase;
  letter-spacing:.1em;
  margin-top:.25rem;
}

/* TABS */
.tabs { margin:1.5rem 0; }
.tab-headers { display:flex; border-bottom:1px solid var(--border); gap:0; }
.tab-btn {
  font-family:'Space Mono',monospace;
  font-size:.78rem;
  padding:.6rem 1.2rem;
  background:none;
  border:none;
  border-bottom:2px solid transparent;
  color:var(--text3);
  cursor:pointer;
  transition:all .2s;
  margin-bottom:-1px;
}
.tab-btn:hover { color:var(--text2); }
.tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
.tab-pane { display:none; padding-top:1rem; }
.tab-pane.active { display:block; }

/* NAV BUTTONS */
.module-nav {
  display:flex;
  justify-content:space-between;
  margin-top:3rem;
  padding-top:2rem;
  border-top:1px solid var(--border);
  gap:1rem;
}
.nav-btn {
  background: var(--card2);
  border:1px solid var(--border);
  border-radius:4px;
  padding:.75rem 1.5rem;
  color:var(--text2);
  font-family:'Syne',sans-serif;
  font-weight:600;
  font-size:.85rem;
  cursor:pointer;
  transition:all .2s;
  display:flex;
  align-items:center;
  gap:.5rem;
}
.nav-btn:hover { border-color:var(--accent); color:var(--accent); }
.nav-btn.primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color:#fff;
  border-color:transparent;
}
.nav-btn.primary:hover { box-shadow: var(--glow); }
.nav-btn:disabled { opacity:.3; cursor:not-allowed; }

.complete-btn {
  display:flex;
  align-items:center;
  justify-content:center;
}
.complete-btn button {
  background: linear-gradient(135deg, var(--accent3), #059669);
  color:#fff;
  border:none;
  border-radius:4px;
  padding:.75rem 2rem;
  font-family:'Syne',sans-serif;
  font-weight:700;
  font-size:.9rem;
  cursor:pointer;
  transition:all .2s;
}
.complete-btn button:hover { box-shadow:0 0 20px rgba(16,185,129,.3); transform:translateY(-1px); }

/* INTERVIEW FRAMEWORK */
.framework-step {
  display:flex;
  gap:1.25rem;
  padding:1.25rem;
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:6px;
  margin:.75rem 0;
  transition: border-color .2s;
}
.framework-step:hover { border-color: var(--accent); }
.step-num {
  min-width:36px;
  height:36px;
  border-radius:50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:.85rem;
  color:#fff;
  flex-shrink:0;
}
.step-body h4 {
  font-size:.95rem;
  font-weight:700;
  color:var(--text);
  margin-bottom:.35rem;
}
.step-body p { font-size:.8rem; margin:0; }

/* REAL DESIGN SECTION */
.design-case {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  overflow:hidden;
  margin:2rem 0;
}
.design-case-header {
  background: linear-gradient(135deg, rgba(0,212,255,.1), rgba(124,58,237,.1));
  padding:1.25rem 1.5rem;
  border-bottom:1px solid var(--border);
}
.design-case-header h3 { margin:0; color:var(--text); }
.design-case-header p { margin:.25rem 0 0; font-size:.78rem; }
.design-case-body { padding:1.5rem; }

/* SCROLLBAR */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }
::-webkit-scrollbar-thumb:hover { background:var(--text3); }

/* RESPONSIVE */
@media(max-width:768px) {
  #sidebar { display:none; }
  .scenario-grid { grid-template-columns:1fr; }
  .module-content { padding:2rem 1.25rem 4rem; }
}

.hidden { display:none !important; }

/* ANIMATIONS */
@keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.module-content { animation: fadeIn .4s ease; }

/* CHECKPOINT badge */
.checkpoint {
  display:inline-flex;
  align-items:center;
  gap:.4rem;
  background: linear-gradient(135deg, var(--accent2), #6d28d9);
  color:#fff;
  padding:.3rem .8rem;
  border-radius:99px;
  font-family:'Space Mono',monospace;
  font-size:.72rem;
  font-weight:700;
  margin:.5rem 0;
}

.tip-box {
  background: linear-gradient(135deg, rgba(124,58,237,.08), rgba(0,212,255,.08));
  border:1px solid rgba(124,58,237,.3);
  border-radius:6px;
  padding:1rem 1.25rem;
  margin:1rem 0;
  font-family:'Space Mono',monospace;
  font-size:.8rem;
  color:var(--text2);
  line-height:1.8;
}
.tip-box strong { color:var(--accent2); }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-badge">⚡ Founder Series</div>
  <div class="splash-title">System Design<br>Mastery</div>
  <div class="splash-sub">From zero to interview-ready.<br>Learn how to architect systems that scale to millions.</div>
  <button class="splash-btn" onclick="startCourse()">Begin Course →</button>

<h2>The Request Journey</h2>
<p>Before a single line of your application code executes, a user's request travels through several critical infrastructure components. Understanding these is foundational to every system design conversation.</p>

<div class="diagram">
  <div class="diagram-title">Request Flow: Browser → Your App</div>
<pre>
Browser
   │
   ▼ DNS Lookup
DNS Resolver ──────────► Returns IP address of your service
   │
   ▼ TCP connection to IP
Load Balancer (Reverse Proxy)
   │
   ├──► App Server 1
   ├──► App Server 2
   └──► App Server 3
             │
             ▼
        Database / Cache
</pre>
</div>

<h2>DNS — Domain Name System</h2>
<p>DNS translates human-readable domain names (<code>api.yourapp.com</code>) into IP addresses. It's a distributed, hierarchical system — think of it as the internet's phone book.</p>

<h3>Key DNS Concepts</h3>
<ul>
  <li><strong>TTL (Time-to-Live)</strong>: How long a DNS record is cached. Short TTL = faster failover, more DNS queries. Long TTL = faster resolution, slower recovery from IP changes.</li>
  <li><strong>A Record</strong>: Domain → IPv4 address</li>
  <li><strong>CNAME</strong>: Domain → another domain (aliasing)</li>
  <li><strong>DNS Failover</strong>: Route53, Cloudflare DNS can automatically switch to a backup IP if health checks fail.</li>
</ul>

<div class="callout warn">
<div class="callout-title">⚠️ DNS is NOT a Load Balancer</div>
DNS round-robin distributes across IPs but has no health awareness. If one server dies, DNS still routes traffic to it until TTL expires. Use a proper load balancer for health-aware routing.
</div>

<h2>Load Balancers</h2>
<p>A load balancer distributes incoming traffic across multiple backend servers. This achieves <strong>horizontal scalability</strong> and <strong>high availability</strong>.</p>

<h3>Load Balancing Algorithms</h3>
<table class="compare-table">
  <tr><th>Algorithm</th><th>How It Works</th><th>Best For</th></tr>
  <tr><td>Round Robin</td><td>Requests cycle through servers 1→2→3→1...</td><td>Uniform requests, similar server capacity</td></tr>
  <tr><td>Least Connections</td><td>Route to server with fewest active connections</td><td>Long-lived connections (WebSockets)</td></tr>
  <tr><td>Weighted Round Robin</td><td>Servers get traffic proportional to their weight</td><td>Heterogeneous server capacity</td></tr>
  <tr><td>IP Hash</td><td>Hash client IP → always same server</td><td>Session affinity (sticky sessions)</td></tr>
  <tr><td>Least Response Time</td><td>Route to fastest server</td><td>Latency-sensitive services</td></tr>
</table>

<h3>Layer 4 vs Layer 7 Load Balancers</h3>
<div class="tabs">
  <div class="tab-headers">
    <button class="tab-btn active" onclick="switchTab(this,'l4')">Layer 4 (Transport)</button>
    <button class="tab-btn" onclick="switchTab(this,'l7')">Layer 7 (Application)</button>
  </div>
  <div class="tab-pane active" id="l4">
    <p>Routes based on <strong>IP + TCP/UDP port</strong>. Doesn't inspect payload. Very fast, low overhead. Can't route based on URL path or HTTP headers. Think: AWS NLB, HAProxy in TCP mode.</p>
    <div class="callout info"><div class="callout-title">Use When</div>Raw performance matters. Non-HTTP traffic (databases, gaming). Ultra-low latency requirements.</div>
  </div>
  <div class="tab-pane" id="l7">
    <p>Routes based on <strong>HTTP headers, URL paths, cookies</strong>. Can do SSL termination, A/B testing, request rewriting. Slight overhead vs L4. Think: AWS ALB, Nginx, Traefik, Envoy.</p>
    <div class="callout info"><div class="callout-title">Use When</div>Microservices routing (/api/users → user-service, /api/orders → order-service). HTTP-based apps. Content-based routing.</div>
  </div>
</div>

<h2>CDN — Content Delivery Network</h2>
<p>A CDN is a globally distributed network of servers that cache static content (images, CSS, JS, videos) close to users. Instead of hitting your origin server in <em>us-east-1</em> from Nairobi, the user gets content from a Nairobi PoP (Point of Presence).</p>

<div class="diagram">
  <div class="diagram-title">CDN Architecture</div>
<pre>
             Origin Server (us-east-1)
                    │
         ┌──────────┼──────────┐
         ▼          ▼          ▼
    PoP London  PoP Nairobi  PoP Tokyo
    [Cache]     [Cache]      [Cache]
         │          │          │
    EU Users   EA Users    APAC Users
    ~15ms      ~8ms        ~12ms
</pre>
</div>

<h3>CDN Cache Behavior</h3>
<ul>
  <li><strong>Cache Hit</strong>: File exists in PoP → served instantly. No origin load.</li>
  <li><strong>Cache Miss</strong>: File not in PoP → fetched from origin, cached, returned to user.</li>
  <li><strong>Cache-Control headers</strong>: Your origin controls TTL. <code>Cache-Control: max-age=86400</code> = cache for 1 day.</li>
  <li><strong>Cache Invalidation</strong>: Force-purge stale assets after deployments (or use content-addressed URLs: <code>bundle.a3f2b1.js</code>).</li>
</ul>

<div class="callout success">
<div class="callout-title">✅ CDN Best Practice</div>
For versioned static assets, set <code>Cache-Control: max-age=31536000, immutable</code>. The hash in the filename guarantees uniqueness, so you never need to invalidate — just deploy a new URL. This is how Vite/Next.js builds work.
</div>

<h2>Reverse Proxies</h2>
<p>A reverse proxy sits between clients and your servers. It handles <strong>SSL termination, compression, authentication, rate limiting, and caching</strong> — offloading work from your app servers.</p>

<div class="code-block">
  <div class="code-label">NGINX — Reverse Proxy Config</div>
  <pre><span class="cm"># Upstream pool of app servers</span>
<span class="kw">upstream</span> app_servers {
    least_conn;
    <span class="fn">server</span> 10.0.0.1:<span class="num">3000</span>;
    <span class="fn">server</span> 10.0.0.2:<span class="num">3000</span>;
    <span class="fn">server</span> 10.0.0.3:<span class="num">3000</span> backup;
}

<span class="kw">server</span> {
    listen <span class="num">443</span> ssl;
    server_name api.yourapp.com;

    <span class="cm"># SSL termination here — app servers get plain HTTP</span>
    ssl_certificate /etc/ssl/cert.pem;

    location / {
        <span class="fn">proxy_pass</span> http://app_servers;
        <span class="fn">proxy_set_header</span> X-Real-IP $remote_addr;
        <span class="fn">proxy_set_header</span> X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /static/ {
        <span class="fn">expires</span> 1y;
        add_header Cache-Control <span class="str">"public, immutable"</span>;
    }
}</pre>
</div>

<div class="callout interview">
<div class="callout-title">🎙️ Interview Framing</div>
When asked to design a system, always mention the load balancer and CDN early. Interviewers look for you to identify that static content should be cached globally and that app servers need distribution. It signals you understand real infrastructure, not just application code.
</div>

<div class="quiz-section">
  <div class="quiz-title">⚡ Knowledge Check</div>
  <div class="quiz-subtitle">Solidify your understanding.</div>
  <div class="quiz-q" data-answer="1">
    <div class="quiz-question">A chat application with long-lived WebSocket connections would be best served by which load balancing algorithm?</div>
    <div class="quiz-options">
      <div class="quiz-opt" onclick="answerQuiz(this,0)"><span class="quiz-opt-letter">A</span>Round Robin</div>
      <div class="quiz-opt" onclick="answerQuiz(this,1)"><span class="quiz-opt-letter">B</span>Least Connections</div>
      <div class="quiz-opt" onclick="answerQuiz(this,2)"><span class="quiz-opt-letter">C</span>IP Hash</div>
      <div class="quiz-opt" onclick="answerQuiz(this,3)"><span class="quiz-opt-letter">D</span>Weighted Round Robin</div>
    </div>
    <div class="quiz-explanation">Least Connections routes new connections to the least-loaded server. For long-lived WebSockets, one server can accumulate many connections while others are idle. Least Connections balances this properly. Round Robin ignores connection count entirely.</div>
  </div>
  <div class="quiz-q" data-answer="3">
    <div class="quiz-question">You deploy a React app via CDN. After a production bug fix, users still see the old JS bundle. What's the most robust solution?</div>
    <div class="quiz-options">
      <div class="quiz-opt" onclick="answerQuiz(this,0)"><span class="quiz-opt-letter">A</span>Set TTL to 1 second</div>
      <div class="quiz-opt" onclick="answerQuiz(this,1)"><span class="quiz-opt-letter">B</span>Manually purge CDN cache on every deploy</div>
      <div class="quiz-opt" onclick="answerQuiz(this,2)"><span class="quiz-opt-letter">C</span>Ask users to clear their browser cache</div>
      <div class="quiz-opt" onclick="answerQuiz(this,3)"><span class="quiz-opt-letter">D</span>Use content-hashed filenames so each deploy gets a unique URL</div>
    </div>
    <div class="quiz-explanation">Content-hashed filenames (bundle.abc123.js) are the gold standard. Since the URL changes with content, you never need cache invalidation. The old URL keeps its long TTL. The new URL gets its own cache entry. This is exactly how Vite and Next.js work.</div>
  </div>
</div>
`

    desc:'The most critical architectural decision in any system. Get this wrong and no amount of scaling helps.',
    content:`
<h2>The Database Decision</h2>
<p>The database choice is the most consequential architectural decision you make. It's expensive to reverse. Understand the trade-offs before you commit.</p>

<h2>Relational Databases (SQL)</h2>
<p>SQL databases (PostgreSQL, MySQL, SQLite) store data in tables with strict schemas. Relationships between tables are expressed via foreign keys. They enforce <strong>ACID</strong> guarantees.</p>

<h3>ACID Properties</h3>
<div class="scenario-grid">
  <div class="scenario-card">
    <h4>⚛️ Atomicity</h4>
    <p>A transaction either fully succeeds or fully rolls back. No partial state. Transfer $100: debit AND credit happen together or neither does.</p>
  </div>
  <div class="scenario-card">
    <h4>🔒 Consistency</h4>
    <p>Data always moves from one valid state to another. Constraints (foreign keys, NOT NULL) are always enforced.</p>
  </div>
  <div class="scenario-card">
    <h4>🏝️ Isolation</h4>
    <p>Concurrent transactions don't interfere. You can set isolation levels (READ COMMITTED, SERIALIZABLE) based on your needs.</p>
  </div>
  <div class="scenario-card">
    <h4>💾 Durability</h4>
    <p>Committed data survives crashes. Written to disk (WAL — Write-Ahead Log) before confirming success.</p>
  </div>
</div>

<div class="code-block">
  <div class="code-label">PostgreSQL — ACID Transaction Example</div>
  <pre><span class="cm">-- This entire block is atomic</span>
<span class="kw">BEGIN</span>;

<span class="kw">UPDATE</span> accounts <span class="kw">SET</span> balance = balance - <span class="num">100</span>
<span class="kw">WHERE</span> id = <span class="num">1</span>;

<span class="kw">UPDATE</span> accounts <span class="kw">SET</span> balance = balance + <span class="num">100</span>
<span class="kw">WHERE</span> id = <span class="num">2</span>;

<span class="cm">-- If anything fails, ROLLBACK is automatic</span>
<span class="kw">COMMIT</span>;</pre>
</div>

<h2>NoSQL Databases</h2>
<p>NoSQL is a broad category. The key difference: they trade strict consistency for <strong>scale, flexibility, or speed</strong>. There are four main types:</p>

<table class="compare-table">
  <tr><th>Type</th><th>Example</th><th>Data Model</th><th>Best For</th></tr>
  <tr><td>Document</td><td>MongoDB, Firestore</td><td>JSON-like documents</td><td>Flexible schemas, content management, user profiles</td></tr>
  <tr><td>Key-Value</td><td>Redis, DynamoDB</td><td>Hash map</td><td>Caching, sessions, leaderboards, rate limiting</td></tr>
  <tr><td>Wide-Column</td><td>Cassandra, BigTable</td><td>Rows + dynamic columns</td><td>Time-series, IoT, write-heavy at massive scale</td></tr>
  <tr><td>Graph</td><td>Neo4j, Neptune</td><td>Nodes + Edges</td><td>Social networks, fraud detection, recommendations</td></tr>
</table>

<h2>CAP Theorem — The Fundamental Trade-off</h2>
<p>In a distributed system, during a <strong>network partition</strong> (nodes can't communicate), you can choose at most two of three guarantees:</p>

<div class="diagram">
  <div class="diagram-title">CAP Theorem Triangle</div>
<pre>
              Consistency
             (C)
              /\
             /  \
            /    \
           /  CA  \
          /--------\
         / CP   AP  \
        /____________\
  Availability    Partition
      (A)         Tolerance (P)

 CP → Strong consistency, sacrifice availability (Zookeeper, HBase)
 AP → Always available, eventual consistency (Cassandra, DynamoDB)
 CA → Not realistic in distributed systems (single-node PostgreSQL)
</pre>
</div>

<div class="callout info">
<div class="callout-title">💡 Real-world Nuance</div>
Network partitions always happen eventually. So CA (Consistency + Availability without Partition Tolerance) is not realistic for distributed systems. The real choice is: when a partition occurs, do you want CP (stop serving rather than serve stale data) or AP (keep serving, reconcile later)?
</div>

<h3>BASE vs ACID</h3>
<table class="compare-table">
  <tr><th>ACID (SQL)</th><th>BASE (NoSQL)</th></tr>
  <tr><td>Strong Consistency</td><td><strong>B</strong>asically Available</td></tr>
  <tr><td>Isolation</td><td><strong>S</strong>oft state (data may change)</td></tr>
  <tr><td>Durability</td><td><strong>E</strong>ventual consistency</td></tr>
</table>

<h2>How to Choose</h2>

<div class="callout success">
<div class="callout-title">✅ Use SQL When</div>
You need ACID (payments, orders, inventory). Data is relational with complex joins. Schema is stable. Compliance requires audit trails. PostgreSQL handles 100k+ QPS with proper indexing — don't reach for NoSQL prematurely.
</div>

<div class="callout warn">
<div class="callout-title">⚡ Use NoSQL When</div>
Schema is dynamic or unknown upfront. You need horizontal sharding from day one (Cassandra, DynamoDB). You're storing massive unstructured data. Key-value access patterns dominate. You need sub-millisecond latency (Redis).
</div>

<h2>Indexing — The Most Impactful Optimization</h2>
<p>An index is a data structure (B-tree by default in PostgreSQL) that speeds up reads at the cost of write overhead and storage. <strong>Missing indexes on commonly-queried columns is the #1 cause of slow databases.</strong></p>

<div class="code-block">
  <div class="code-label">PostgreSQL — Indexing Strategies</div>
  <pre><span class="cm">-- Single column index — fast WHERE email = ?</span>
<span class="kw">CREATE INDEX</span> idx_users_email <span class="kw">ON</span> users(email);

<span class="cm">-- Composite index — fast WHERE tenant_id = ? AND created_at > ?</span>
<span class="kw">CREATE INDEX</span> idx_orders_tenant_created
  <span class="kw">ON</span> orders(tenant_id, created_at <span class="kw">DESC</span>);

<span class="cm">-- Partial index — only index active users (smaller, faster)</span>
<span class="kw">CREATE INDEX</span> idx_active_users
  <span class="kw">ON</span> users(email) <span class="kw">WHERE</span> status = <span class="str">'active'</span>;

<span class="cm">-- Explain analyze — see if index is being used</span>
<span class="kw">EXPLAIN ANALYZE</span>
  <span class="kw">SELECT</span> * <span class="kw">FROM</span> users <span class="kw">WHERE</span> email = <span class="str">'sam@pylaxis.io'</span>;</pre>
</div>

<div class="callout danger">
<div class="callout-title">🚫 Index Anti-patterns</div>
<strong>Over-indexing</strong>: Every write must update all indexes. Tables with 20+ indexes become write-bottlenecks. Index what you query. <strong>Low-cardinality indexes</strong>: Indexing a boolean column (true/false) is useless — the DB reads half the table anyway.

<div class="quiz-section">

    content:`
<h2>Scaling Is a Journey, Not a Decision</h2>
<p>No system is built for a billion users on day one. Scaling happens in stages. The art is knowing <strong>when to scale what</strong> — over-engineering kills startups, under-engineering kills products at growth inflection points.</p>

<h2>Vertical vs. Horizontal Scaling</h2>
<table class="compare-table">
  <tr><th></th><th>Vertical Scaling (Scale Up)</th><th>Horizontal Scaling (Scale Out)</th></tr>
  <tr><td><strong>What</strong></td><td>Bigger machine (more CPU, RAM)</td><td>More machines (add servers)</td></tr>
  <tr><td><strong>Limit</strong></td><td>Hardware ceiling exists. Single point of failure.</td><td>Theoretically unlimited. No SPOF.</td></tr>
  <tr><td><strong>Cost</strong></td><td>Exponential cost at high specs</td><td>Linear cost scaling</td></tr>
  <tr><td><strong>Complexity</strong></td><td>Low — no code changes needed</td><td>High — must handle distributed state</td></tr>
  <tr><td><strong>Use</strong></td><td>Databases (often easier to scale up first)</td><td>Stateless app servers, APIs</td></tr>
</table>

<div class="callout info">
<div class="callout-title">💡 The Pragmatic Rule</div>
Scale vertically first — it's simpler. Migrate to horizontal when you hit the limit or SPOF becomes unacceptable. Most startups don't need horizontal scaling until they're past 10k users/day.
</div>

<h2>The Scaling Stages (Real Architecture Evolution)</h2>

<div class="framework-step">
  <div class="step-num">1</div>
  <div class="step-body">
    <h4>Stage 1: Single Server (0–1k users)</h4>
    <p>App + DB on one machine. Simple, fast to ship. Acceptable for MVP. Zero fault tolerance.</p>
  </div>
</div>
<div class="framework-step">
  <div class="step-num">2</div>
  <div class="step-body">
    <h4>Stage 2: Separate DB (1k–10k users)</h4>
    <p>Move DB to its own server. Scale app and DB independently. Can now have read replicas.</p>
  </div>
</div>
<div class="framework-step">
  <div class="step-num">3</div>
  <div class="step-body">
    <h4>Stage 3: Load Balancer + Multiple App Servers (10k–100k users)</h4>
    <p>App servers are stateless. Add a load balancer. Session state moves to Redis. Now you're horizontal.</p>
  </div>
</div>
<div class="framework-step">
  <div class="step-num">4</div>
  <div class="step-body">
    <h4>Stage 4: Database Read Replicas + Cache (100k–1M users)</h4>
    <p>Primary DB for writes. Read replicas for read traffic. Add caching layer (Redis/Memcached) for hot data.</p>
  </div>
</div>
<div class="framework-step">
  <div class="step-num">5</div>
  <div class="step-body">
    <h4>Stage 5: CDN + Global Distribution (1M+ users)</h4>
    <p>Static assets via CDN. Multiple regions. Database sharding or federation. Microservices for independent scaling.</p>
  </div>
</div>

<h2>Stateless vs. Stateful Services</h2>
<p><strong>The golden rule of horizontal scaling: make services stateless.</strong> A stateless service holds no session data — any server can handle any request. State lives in Redis, the DB, or cookies (JWTs).</p>

<div class="code-block">
  <div class="code-label">Stateless Auth — JWT Pattern (Node.js)</div>
  <pre><span class="cm">// Server doesn't store sessions — token IS the state</span>

<span class="cm">// Any server can verify this — no session store needed</span>
<span class="kw">const</span> <span class="fn">verifyToken</span> = (token) => {
  <span class="kw">return</span> jwt.<span class="fn">verify</span>(token, process.env.JWT_SECRET);
};</pre>
</div>

<h2>Database Replication</h2>
<p>Replication copies data from a <strong>primary</strong> (write) to one or more <strong>replicas</strong> (read). This scales read traffic and adds redundancy.</p>

<div class="diagram">
  <div class="diagram-title">Primary-Replica Replication</div>
<pre>
              ┌──────────────┐
Writes ──────►│   PRIMARY DB  │──── WAL (Write-Ahead Log)
              └──────────────┘          │
                                   ┌────┴────┐
                              ┌────▼──┐  ┌───▼───┐
Reads ─────────────────────► │Replica│  │Replica│
                              └───────┘  └───────┘

Replication Lag: There's always a delay between primary write
and replica sync. Don't read your own writes from a replica!
</pre>
</div>

<h2>Database Sharding</h2>
<p>Sharding partitions a database horizontally — each shard holds a subset of rows. This is for <strong>write scaling</strong>, which replication alone cannot solve.</p>

<h3>Sharding Strategies</h3>
<table class="compare-table">
  <tr><th>Strategy</th><th>How</th><th>Pro</th><th>Con</th></tr>
  <tr><td>Range-based</td><td>Shard by date range or ID range</td><td>Range queries efficient</td><td>Hot shards (all new data goes to latest shard)</td></tr>
  <tr><td>Hash-based</td><td>hash(user_id) % num_shards</td><td>Even distribution</td><td>Range queries require all shards; resharding is painful</td></tr>
  <tr><td>Directory-based</td><td>Lookup table: user → shard</td><td>Flexible routing</td><td>Lookup table is a SPOF; overhead on every query</td></tr>
  <tr><td>Geographic</td><td>EU users → EU shard</td><td>Data locality; GDPR compliance</td><td>Uneven growth across regions</td></tr>
</table>

<div class="callout danger">
<div class="callout-title">🚫 Sharding is a Last Resort</div>
Sharding adds enormous operational complexity: cross-shard joins are impossible, transactions span shards poorly, and resharding is painful. Exhaust vertical scaling, read replicas, and caching first. Many large products (Shopify, GitHub) run single-shard PostgreSQL for years.
</div>

<div class="callout interview">
<div class="callout-title">🎙️ Interview Framing</div>
When asked "how would you scale X to 100M users?", walk through the stages. Don't jump to "microservices and sharding" immediately. Interviewers are impressed when you say "I'd start with vertical scaling, add read replicas, add a cache layer, and only shard if absolutely necessary." This shows pragmatic judgment.
</div>

<div class="quiz-section">

  <div class="quiz-q" data-answer="2">
    <div class="quiz-question">Your app servers crash during a deploy and lose all user session data. What architectural change prevents this?</div>
    <div class="quiz-options">

      <div class="quiz-opt" onclick="answerQuiz(this,1)"><span class="quiz-opt-letter">B</span>Use sticky sessions in the load balancer</div>
      <div class="quiz-opt" onclick="answerQuiz(this,2)"><span class="quiz-opt-letter">C</span>Move sessions to Redis so servers are stateless</div>
      <div class="quiz-opt" onclick="answerQuiz(this,3)"><span class="quiz-opt-letter">D</span>Increase deploy timeout</div>
    </div>
    <div class="quiz-explanation">Stateless app servers store no local session state. Sessions in Redis (or as JWTs) survive server restarts. Sticky sessions are a workaround that creates uneven load and still breaks when the target server restarts. This is a critical concept for horizontal scaling.</div>
  </div>
</div>
`

    title:'Caching: The Biggest Performance Win in Systems',
    desc:'Cache correctly and your system feels 10x faster. Cache incorrectly and you get silent data corruption.',
    content:`
<h2>Why Cache?</h2>
<p>Cache exploits a fundamental truth: <strong>most data is read far more than it's written</strong>. Instead of hitting the database on every request, you serve frequently-accessed data from memory — orders of magnitude faster.</p>

<div class="metric-row">
  <div class="metric-card"><span class="metric-val">~1ns</span><span class="metric-label">L1 Cache (CPU)</span></div>
  <div class="metric-card"><span class="metric-val">~100µs</span><span class="metric-label">Redis (in-memory)</span></div>
  <div class="metric-card"><span class="metric-val">~1ms</span><span class="metric-label">SSD (local disk)</span></div>
  <div class="metric-card"><span class="metric-val">~10ms</span><span class="metric-label">PostgreSQL (indexed)</span></div>
  <div class="metric-card"><span class="metric-val">~150ms</span><span class="metric-label">Cross-continent network</span></div>
</div>

<h2>Cache Placement Strategies</h2>

<div class="tabs">
  <div class="tab-headers">
    <button class="tab-btn active" onclick="switchTab(this,'cache-aside')">Cache-Aside</button>
    <button class="tab-btn" onclick="switchTab(this,'write-through')">Write-Through</button>
    <button class="tab-btn" onclick="switchTab(this,'write-back')">Write-Back</button>
    <button class="tab-btn" onclick="switchTab(this,'read-through')">Read-Through</button>
  </div>
  <div class="tab-pane active" id="cache-aside">
    <p><strong>Application manages cache explicitly.</strong> On read: check cache → miss → query DB → populate cache → return. On write: update DB, invalidate cache. Also called "lazy loading."</p>
    <div class="code-block"><div class="code-label">Cache-Aside Pattern (TypeScript)</div><pre><span class="kw">async function</span> <span class="fn">getUser</span>(id: <span class="type">string</span>) {
  <span class="cm">// 1. Check cache first</span>
  <span class="kw">const</span> cached = <span class="kw">await</span> redis.<span class="fn">get</span>(<span class="str">&#96;user:&#36;{id}&#96;</span>);
  <span class="kw">if</span> (cached) <span class="kw">return</span> JSON.<span class="fn">parse</span>(cached);

  <span class="cm">// 2. Cache miss — query DB</span>
  <span class="kw">const</span> user = <span class="kw">await</span> db.<span class="fn">findById</span>(id);

  <span class="cm">// 3. Populate cache (TTL = 5 minutes)</span>
  <span class="kw">await</span> redis.<span class="fn">setex</span>(<span class="str">&#96;user:&#36;{id}&#96;</span>, <span class="num">300</span>, JSON.<span class="fn">stringify</span>(user));

  <span class="kw">return</span> user;
}</pre></div>
    <div class="callout success"><div class="callout-title">Best For</div>Read-heavy workloads. Works well when cache goes down — app falls back to DB. Cache only what's requested (no cold data wasted).</div>
  </div>
  <div class="tab-pane" id="write-through">
    <p><strong>Every write goes to DB AND cache simultaneously.</strong> Cache is always fresh. Write latency doubles. Perfect for read-heavy data that must be consistent (user profiles, product info).</p>
    <div class="callout warn"><div class="callout-title">Trade-off</div>Cache may hold data that's never read (written but not queried again). Wastes cache memory. Write latency is higher than cache-aside.</div>
  </div>
  <div class="tab-pane" id="write-back">
    <p><strong>Writes go to cache ONLY, then async flushed to DB.</strong> Extremely fast writes. Risk: if cache crashes before flush, data is lost. Use only for non-critical writes (click counts, view counts).</p>
    <div class="callout danger"><div class="callout-title">Risk</div>Data loss on cache failure. Never use for financial or compliance data. Only acceptable for ephemeral or reconstructible data.</div>
  </div>
  <div class="tab-pane" id="read-through">
    <p><strong>Cache sits in front of DB and handles DB reads itself.</strong> App only talks to cache. Cache fetches from DB on miss. Simpler app code — caching is infrastructure, not app concern.</p>
    <div class="callout info"><div class="callout-title">Examples</div>AWS ElastiCache with DAX (DynamoDB Accelerator). The cache library handles miss logic transparently.</div>
  </div>
</div>

<h2>Cache Eviction Policies</h2>
<p>When the cache is full, which items get removed? The policy determines this:</p>

<table class="compare-table">
  <tr><th>Policy</th><th>Behavior</th><th>Best For</th></tr>
  <tr><td>LRU (Least Recently Used)</td><td>Evict item not accessed longest</td><td>General purpose — most common</td></tr>
  <tr><td>LFU (Least Frequently Used)</td><td>Evict item accessed fewest times</td><td>Frequency-based hot data (trending)</td></tr>
  <tr><td>TTL (Time-to-Live)</td><td>Evict after fixed duration</td><td>Time-sensitive data (sessions, rates)</td></tr>
  <tr><td>FIFO</td><td>Evict oldest inserted item</td><td>Simple queues — rarely optimal</td></tr>
</table>

<h2>Cache Invalidation — The Hard Problem</h2>
<p>Phil Karlton famously said: <em>"There are only two hard things in CS: cache invalidation and naming things."</em> When do you invalidate?</p>

<h3>The Three Strategies</h3>
<ul>
  <li><strong>TTL-based</strong>: Cache expires automatically. Stale window = TTL duration. Simplest. Good for data that can be slightly stale (product catalog, user profiles).</li>
  <li><strong>Event-driven invalidation</strong>: On write → emit event → cache listener deletes keys. Zero stale window. Requires event bus (Kafka, Redis pub/sub).</li>
  <li><strong>Versioned keys</strong>: <code>user:v3:42</code>. On write, increment version. Old versions expire naturally. No explicit invalidation needed.</li>
</ul>

<h2>Cache Failure Modes</h2>

<div class="scenario-grid">
  <div class="scenario-card">
    <h4>❄️ Cache Stampede</h4>
    <p>A popular cache key expires. Thousands of concurrent requests all hit the DB simultaneously. Solution: use mutex locks, probabilistic early expiry, or <strong>staggered TTLs</strong>.</p>
  </div>
  <div class="scenario-card">
    <h4>👻 Cache Penetration</h4>
    <p>Requests for keys that don't exist in DB OR cache (e.g., probing attack with fake IDs). Cache never helps — every request hits DB. Solution: <strong>bloom filter</strong> or cache null results.</p>
  </div>
  <div class="scenario-card">
    <h4>🌊 Cache Avalanche</h4>
    <p>Many cache keys expire at the same time. Mass DB requests. Solution: randomize TTL (300 ± random(60)) so expirations are spread out.</p>
  </div>
  <div class="scenario-card">
    <h4>🔥 Thundering Herd</h4>
    <p>Cache server restarts cold. All requests miss simultaneously. Solution: gradual warm-up, request coalescing, or circuit breaker patterns.</p>
  </div>
</div>

<div class="code-block">
  <div class="code-label">Redis — Production Patterns</div>
  <pre><span class="cm">// Preventing cache stampede with distributed lock</span>
<span class="kw">async function</span> <span class="fn">getWithLock</span>(key: <span class="type">string</span>) {
  <span class="kw">const</span> cached = <span class="kw">await</span> redis.<span class="fn">get</span>(key);
  <span class="kw">if</span> (cached) <span class="kw">return</span> JSON.<span class="fn">parse</span>(cached);

  <span class="cm">// Only one process recomputes — others wait</span>
  <span class="kw">const</span> lock = <span class="kw">await</span> redis.<span class="fn">set</span>(<span class="str">&#96;lock:&#36;{key}&#96;</span>, <span class="num">1</span>, <span class="str">'NX'</span>, <span class="str">'EX'</span>, <span class="num">5</span>);
  <span class="kw">if</span> (!lock) {
    <span class="kw">await</span> <span class="fn">sleep</span>(<span class="num">100</span>); <span class="cm">// Wait and retry</span>
    <span class="kw">return</span> <span class="fn">getWithLock</span>(key);
  }

  <span class="kw">const</span> data = <span class="kw">await</span> db.<span class="fn">expensiveQuery</span>();
  <span class="cm">// Randomized TTL prevents avalanche</span>
  <span class="kw">const</span> ttl = <span class="num">300</span> + Math.<span class="fn">floor</span>(Math.<span class="fn">random</span>() * <span class="num">60</span>);
  <span class="kw">await</span> redis.<span class="fn">setex</span>(key, ttl, JSON.<span class="fn">stringify</span>(data));
  <span class="kw">await</span> redis.<span class="fn">del</span>(<span class="str">&#96;lock:&#36;{key}&#96;</span>);
  <span class="kw">return</span> data;
}</pre>
</div>

<div class="callout interview">
<div class="callout-title">🎙️ Interview Tip</div>
When asked about caching in a design, always mention: (1) what you're caching and why, (2) which strategy (cache-aside vs write-through), (3) TTL duration and why, (4) how you handle invalidation, and (5) failure modes like stampede. Covering all five signals senior-level thinking.
</div>

<div class="quiz-section">
  <div class="quiz-title">⚡ Knowledge Check</div>
  <div class="quiz-subtitle">Caching mastery.</div>
  <div class="quiz-q" data-answer="1">
    <div class="quiz-question">A competitor bot queries your system with millions of random fake user IDs. Every request hits your database. Which pattern prevents this?</div>
    <div class="quiz-options">
      <div class="quiz-opt" onclick="answerQuiz(this,0)"><span class="quiz-opt-letter">A</span>Increase cache TTL to 1 hour</div>
      <div class="quiz-opt" onclick="answerQuiz(this,1)"><span class="quiz-opt-letter">B</span>Use a Bloom Filter to check existence before querying</div>
      <div class="quiz-opt" onclick="answerQuiz(this,2)"><span class="quiz-opt-letter">C</span>Switch to write-through caching</div>
      <div class="quiz-opt" onclick="answerQuiz(this,3)"><span class="quiz-opt-letter">D</span>Add more DB read replicas</div>
    </div>
    <div class="quiz-explanation">This is a Cache Penetration attack. A Bloom Filter is a probabilistic data structure that tells you with certainty "this ID definitely doesn't exist" (with a tiny false positive rate). If the filter says no → return 404 immediately, no DB query. Used at massive scale by Redis, Cassandra, and Chrome's Safe Browsing.</div>
  </div>
</div>
`

  {

    title:'Message Queues & Event-Driven Architecture',
    desc:'Decouple services, absorb traffic spikes, and build resilient async pipelines.',
    content:`
<h2>Why Async?</h2>
<p>Synchronous architectures create tight coupling: Service A calls Service B and <strong>waits</strong>. If B is slow or down, A is blocked. Message queues break this coupling — A publishes a message and moves on. B processes it when ready.</p>

<div class="diagram">
  <div class="diagram-title">Sync vs. Async Architecture</div>
<pre>
SYNCHRONOUS (tight coupling):
  User Request → API → Email Service → Payment Service → SMS Service
  If SMS is down → request fails → user sees error

ASYNCHRONOUS (loose coupling):
  User Request → API → Queue ──► Email Worker
                              └──► Payment Worker
                              └──► SMS Worker (can retry independently)
  API returns 202 Accepted immediately — user doesn't wait
</pre>
</div>

<h2>Core Concepts</h2>

<h3>Message Queue vs. Message Broker vs. Event Bus</h3>
<table class="compare-table">
  <tr><th>Concept</th><th>Model</th><th>Example</th><th>Best For</th></tr>
  <tr><td>Queue</td><td>1 producer → 1 consumer (point-to-point)</td><td>SQS, RabbitMQ queue</td><td>Task distribution, work queues</td></tr>
  <tr><td>Pub/Sub</td><td>1 producer → N consumers (broadcast)</td><td>Redis pub/sub, SNS</td><td>Notifications, fanout events</td></tr>
  <tr><td>Event Stream</td><td>Durable log, multiple consumer groups, replay</td><td>Kafka, Kinesis</td><td>Event sourcing, audit logs, analytics</td></tr>
</table>

<h2>Apache Kafka — Deep Dive</h2>
<p>Kafka is a <strong>distributed, durable, ordered event log</strong>. Events are written to partitions. Consumer groups read from partitions independently. Events are retained for a configurable period — consumers can replay history.</p>

<div class="diagram">
  <div class="diagram-title">Kafka Architecture</div>
<pre>
Producers                   Kafka Cluster               Consumers
                         ┌─ Topic: orders ──────────────────────┐
Order Service ──────────►│  Partition 0: [e1][e2][e3][e4]...   │──► Billing Service
                         │  Partition 1: [e1][e2][e3]...       │──► Inventory Service
Payment Service ────────►│  Partition 2: [e1][e2]...           │──► Analytics Service
                         └──────────────────────────────────────┘
                              Offset: consumers track their
                              own position — no coupling
</pre>
</div>

<h3>Key Kafka Properties</h3>
<ul>
  <li><strong>Durability</strong>: Messages written to disk, replicated across brokers. Survives node failures.</li>
  <li><strong>Ordering</strong>: Guaranteed within a partition (not across). Use consistent partition keys for related events.</li>
  <li><strong>Consumer Groups</strong>: Multiple instances share work within a group. Adding consumers scales throughput linearly up to partition count.</li>
  <li><strong>Retention</strong>: Default 7 days. New consumers can replay. Enables event sourcing.</li>
</ul>

<div class="code-block">
  <div class="code-label">Kafka Producer + Consumer (Node.js / kafkajs)</div>
  <pre><span class="kw">import</span> { Kafka } <span class="kw">from</span> <span class="str">'kafkajs'</span>;

<span class="kw">const</span> kafka = <span class="kw">new</span> <span class="type">Kafka</span>({ brokers: [<span class="str">'kafka:9092'</span>] });

<span class="cm">// PRODUCER — Order Service</span>
<span class="kw">const</span> producer = kafka.<span class="fn">producer</span>();
<span class="kw">await</span> producer.<span class="fn">send</span>({
  topic: <span class="str">'orders'</span>,
  messages: [{
    key: orderId,        <span class="cm">// Same key → same partition (ordering)</span>
    value: JSON.<span class="fn">stringify</span>({ orderId, userId, amount, status: <span class="str">'created'</span> })
  }]
});

<span class="cm">// CONSUMER — Billing Service (scales horizontally)</span>
<span class="kw">const</span> consumer = kafka.<span class="fn">consumer</span>({ groupId: <span class="str">'billing-service'</span> });
<span class="kw">await</span> consumer.<span class="fn">subscribe</span>({ topic: <span class="str">'orders'</span> });
<span class="kw">await</span> consumer.<span class="fn">run</span>({
  <span class="fn">eachMessage</span>: <span class="kw">async</span> ({ message }) => {
    <span class="kw">const</span> order = JSON.<span class="fn">parse</span>(message.value.<span class="fn">toString</span>());
    <span class="kw">await</span> billingService.<span class="fn">processOrder</span>(order);
    <span class="cm">// Offset committed automatically on success</span>
  }
});</pre>
</div>

<h2>Key Patterns</h2>

<h3>Dead Letter Queue (DLQ)</h3>
<p>When a message fails processing (retried N times), it moves to a DLQ instead of blocking the queue or being lost. Engineers can inspect DLQ messages, fix the bug, and reprocess. Critical for production reliability.</p>

<h3>Saga Pattern — Distributed Transactions</h3>
<p>In microservices, you can't use a single DB transaction across services. Sagas coordinate multi-step business processes via messages, with compensating transactions for rollbacks.</p>

<div class="diagram">
  <div class="diagram-title">Saga Pattern — Order Fulfillment</div>
<pre>
Place Order → Reserve Inventory → Process Payment → Ship Order
                                         │
                              Payment fails?
                              Compensate: Release Inventory
                              → Emit OrderFailed event
</pre>
</div>

<h3>Outbox Pattern — Reliable Event Publishing</h3>
<p>The biggest trap in event-driven systems: you update the DB and then try to publish an event. If the event publish fails, you have inconsistent state. The outbox pattern solves this atomically.</p>

<div class="code-block">
  <div class="code-label">Outbox Pattern — Atomic DB + Event</div>
  <pre><span class="cm">// Single transaction: write business data + event</span>
<span class="kw">await</span> db.<span class="fn">transaction</span>(<span class="kw">async</span> (trx) => {
  <span class="kw">await</span> trx(<span class="str">'orders'</span>).<span class="fn">insert</span>({ id, userId, total });

  <span class="cm">// Outbox: event stored atomically with business data</span>
  <span class="kw">await</span> trx(<span class="str">'outbox'</span>).<span class="fn">insert</span>({
    event_type: <span class="str">'order.created'</span>,
    payload: JSON.<span class="fn">stringify</span>({ id, userId, total }),
    status: <span class="str">'pending'</span>
  });
});

<span class="cm">// Separate relay process publishes outbox → Kafka</span>
<span class="cm">// (CDC or polling — Debezium is great for this)</span></pre>
</div>

<div class="callout interview">
<div class="callout-title">🎙️ Interview Framing</div>
When designing any e-commerce, logistics, or multi-step workflow system, mention Kafka or SQS for async processing. Explain why: "Rather than synchronously calling 5 services and blocking for 3 seconds, I'd emit an event and let each service process independently. This improves resilience and allows each service to scale independently."
</div>

<div class="quiz-section">
  <div class="quiz-title">⚡ Knowledge Check</div>
  <div class="quiz-subtitle">Async systems.</div>
  <div class="quiz-q" data-answer="3">
    <div class="quiz-question">You save a user's order to the DB, then publish an "order.created" Kafka event. The Kafka publish fails. What problem does the Outbox Pattern solve here?</div>
    <div class="quiz-options">
      <div class="quiz-opt" onclick="answerQuiz(this,0)"><span class="quiz-opt-letter">A</span>It retries the Kafka publish indefinitely</div>
      <div class="quiz-opt" onclick="answerQuiz(this,1)"><span class="quiz-opt-letter">B</span>It prevents the DB write from happening without Kafka</div>
      <div class="quiz-opt" onclick="answerQuiz(this,2)"><span class="quiz-opt-letter">C</span>It deletes the order if Kafka fails</div>
      <div class="quiz-opt" onclick="answerQuiz(this,3)"><span class="quiz-opt-letter">D</span>It atomically stores the event in the DB, so a relay can publish it later even after a crash</div>
    </div>
    <div class="quiz-explanation">The outbox pattern saves the event to an outbox table in the same DB transaction as the business data. A separate relay process reads the outbox and publishes to Kafka. This guarantees: if the DB write succeeds, the event will eventually be published. No data loss. No dual-write problem. This is a senior-level pattern interviewers love.</div>
  </div>
</div>
`
  },

  {
    id:6,
    tag:'Distributed Systems',
    title:'Consistency, Consensus & Distributed Transactions',
    desc:'The hardest problems in distributed computing — and what you actually need to know for interviews.',
    content:`
<h2>The Core Problem</h2>
<p>In a distributed system, multiple nodes hold copies of data. Networks fail. Nodes crash. Clocks drift. The question is: <strong>how do we maintain a coherent view of state across all nodes?</strong></p>

<h2>Consistency Models</h2>
<p>Consistency models define the guarantees about what data a reader sees relative to writes. This is a spectrum, not a binary.</p>

<div class="framework-step">
  <div class="step-num">1</div>
  <div class="step-body">
    <h4>Strong Consistency (Linearizability)</h4>
    <p>Every read reflects the most recent write. As if there's a single server. Highest correctness. Highest latency — requires coordination. Example: Zookeeper, etcd, single-region PostgreSQL.</p>
  </div>
</div>
<div class="framework-step">
  <div class="step-num">2</div>
  <div class="step-body">
    <h4>Sequential Consistency</h4>
    <p>Operations appear in the same order on all nodes, but not necessarily real-time order. Weaker than linearizability. Easier to implement.</p>
  </div>
</div>
<div class="framework-step">
  <div class="step-num">3</div>
  <div class="step-body">
    <h4>Eventual Consistency</h4>
    <p>Given no new writes, all replicas will <em>eventually</em> converge to the same value. No real-time guarantee. High availability. Example: Cassandra, DynamoDB, DNS propagation.</p>
  </div>
</div>
<div class="framework-step">
  <div class="step-num">4</div>
  <div class="step-body">
    <h4>Causal Consistency</h4>
    <p>Causally related operations are seen in order. "If A caused B, everyone sees A before B." Stronger than eventual, weaker than strong. Example: MongoDB sessions.</p>
  </div>
</div>

<h2>Consensus Algorithms</h2>
<p>Consensus = getting multiple nodes to agree on a single value. This is the hard problem underlying leader election, distributed locks, and distributed transactions.</p>

<h3>Raft — How Modern Systems Agree</h3>
<p>Raft is the consensus algorithm behind etcd, CockroachDB, and TiKV. It's designed to be understandable (vs. Paxos).</p>

<div class="diagram">
  <div class="diagram-title">Raft Consensus — Key Concepts</div>
<pre>
Nodes: [Leader] [Follower] [Follower] [Follower] [Follower]
                   │
                   │  Heartbeats from Leader prevent election
                   │
Election:          │
  Leader dies ─────┘
  Followers wait random timeout
  First timeout → becomes Candidate → asks for votes
  Gets majority → becomes new Leader
  All writes go through Leader → replicated to followers
  Committed when majority (quorum) acknowledge write
</pre>
</div>

<div class="callout info">
<div class="callout-title">💡 Quorum</div>
For a cluster of N nodes, you need a majority (⌊N/2⌋ + 1) to agree. For 5 nodes: quorum = 3. You can lose 2 nodes and still function. This is why 3 or 5 node clusters are common — never 2 or 4.
</div>

<h2>Distributed Locking</h2>
<p>Sometimes only one process should do something at a time (cron job, payment processing, inventory deduction). Distributed locks coordinate this across nodes.</p>

<div class="code-block">
  <div class="code-label">Redis Distributed Lock (Redlock Pattern)</div>
  <pre><span class="cm">// Acquire lock: SET key value NX EX ttl</span>
<span class="cm">// NX = only set if Not eXists (atomic — no race condition)</span>
<span class="cm">// EX = expire in case process crashes (auto-release)</span>

<span class="kw">const</span> <span class="fn">acquireLock</span> = <span class="kw">async</span> (resource: <span class="type">string</span>, ttl: <span class="type">number</span>) => {
  <span class="kw">const</span> token = crypto.<span class="fn">randomUUID</span>();
  <span class="kw">const</span> result = <span class="kw">await</span> redis.<span class="fn">set</span>(
    <span class="str">&#96;lock:&#36;{resource}&#96;</span>, token, <span class="str">'NX'</span>, <span class="str">'EX'</span>, ttl
  );
  <span class="kw">return</span> result === <span class="str">'OK'</span> ? token : <span class="kw">null</span>;
};

<span class="kw">const</span> <span class="fn">releaseLock</span> = <span class="kw">async</span> (resource: <span class="type">string</span>, token: <span class="type">string</span>) => {
  <span class="cm">// Lua script: only delete if token matches (atomic)</span>
  <span class="kw">const</span> lua = <span class="str">&#96;
    if redis.call('get', KEYS[1]) == ARGV[1] then
      return redis.call('del', KEYS[1])
    end
    return 0
  &#96;</span>;
  <span class="kw">await</span> redis.<span class="fn">eval</span>(lua, <span class="num">1</span>, <span class="str">&#96;lock:&#36;{resource}&#96;</span>, token);
};</pre>
</div>

<h2>Two-Phase Commit (2PC)</h2>
<p>2PC is a protocol for atomically committing a transaction across multiple databases/services. It has two phases: Prepare (all participants say "ready") and Commit (coordinator tells everyone to commit).</p>

<div class="callout danger">
<div class="callout-title">🚫 2PC Problems</div>
<strong>Blocking protocol</strong>: If the coordinator crashes after Prepare but before Commit, participants are locked forever. Slow — requires 2 round trips. This is why modern distributed systems prefer Sagas (compensating transactions) over 2PC.
</div>

<h2>Idempotency at Scale</h2>
<p>In distributed systems, retries are essential (networks fail). Every operation that modifies state must be idempotent — safe to retry without side effects.</p>

<div class="code-block">
  <div class="code-label">Idempotency Key Pattern (Payment API)</div>
  <pre><span class="cm">// Client sends unique idempotency key</span>
<span class="cm">// POST /payments  Idempotency-Key: uuid-abc-123</span>

<span class="kw">async function</span> <span class="fn">processPayment</span>(req) {
  <span class="kw">const</span> key = req.headers[<span class="str">'idempotency-key'</span>];

  <span class="cm">// Check if we've seen this key before</span>
  <span class="kw">const</span> cached = <span class="kw">await</span> redis.<span class="fn">get</span>(<span class="str">&#96;idem:&#36;{key}&#96;</span>);
  <span class="kw">if</span> (cached) <span class="kw">return</span> JSON.<span class="fn">parse</span>(cached); <span class="cm">// Return same response</span>

  <span class="kw">const</span> result = <span class="kw">await</span> stripe.<span class="fn">charge</span>(req.body);

  <span class="cm">// Store result for 24 hours</span>
  <span class="kw">await</span> redis.<span class="fn">setex</span>(<span class="str">&#96;idem:&#36;{key}&#96;</span>, <span class="num">86400</span>, JSON.<span class="fn">stringify</span>(result));
  <span class="kw">return</span> result;
}</pre>
</div>

<div class="callout interview">
<div class="callout-title">🎙️ Interview Tip</div>
When asked about distributed transactions, say: "I'd prefer Sagas over 2PC because 2PC is blocking and fragile under coordinator failure. Sagas allow each step to have a compensating transaction, and the system can make progress even through partial failures." This answer shows deep understanding.
</div>

<div class="quiz-section">
  <div class="quiz-title">⚡ Knowledge Check</div>
  <div class="quiz-subtitle">Distributed systems concepts.</div>
  <div class="quiz-q" data-answer="1">
    <div class="quiz-question">For a Raft cluster to tolerate 2 node failures, how many total nodes are needed?</div>
    <div class="quiz-options">
      <div class="quiz-opt" onclick="answerQuiz(this,0)"><span class="quiz-opt-letter">A</span>3 nodes</div>
      <div class="quiz-opt" onclick="answerQuiz(this,1)"><span class="quiz-opt-letter">B</span>5 nodes</div>
      <div class="quiz-opt" onclick="answerQuiz(this,2)"><span class="quiz-opt-letter">C</span>4 nodes</div>
      <div class="quiz-opt" onclick="answerQuiz(this,3)"><span class="quiz-opt-letter">D</span>7 nodes</div>
    </div>
    <div class="quiz-explanation">To tolerate F failures, you need 2F+1 nodes. To tolerate 2 failures: 2(2)+1 = 5 nodes. With 5 nodes, quorum = 3. You can lose 2 and still have 3 nodes to form a majority. This formula is fundamental to understanding cluster sizing in production systems.</div>
  </div>
</div>
`
  },
